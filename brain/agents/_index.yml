version: 1
updated: "2026-05-20"
purpose: >
  Context router for local WMS agents. Load the coordinator first, then only the
  domain packages whose triggers match the task.

always_load:
  - brain/agents/coordinator.yml

domains:
  reserva:
    file: brain/agents/domain-reserva.yml
    triggers:
      - reserva
      - no reserva
      - stock_res
      - Reserva_Stock_From_MI3
      - MI3 salida
      - i_nav_ped_traslado
      - EA-
      - Qty_to_Receive
      - Quantity_Reserved_WMS
      - picking vs almacenaje
      - FEFO
      - presentacion CJ
      - performance reserva
    also_load:
      - brain/agents/domain-database.yml
  database:
    file: brain/agents/domain-database.yml
    triggers:
      - SQL
      - tabla
      - SP
      - vista
      - stock
      - trans_pe_det
      - trans_pe_enc
      - i_nav
      - log_error_wms
      - identidad
      - identity
  bof:
    file: brain/agents/domain-bof.yml
    triggers:
      - VB
      - WinForms
      - legacy
      - DynamicsNavInterface
      - TOMWMS_BOF
      - frmEjecucion
      - Reference.vb

clients:
  byb:
    file: brain/agents/client-byb.yml
    triggers:
      - BYB
      - IMS4MB_BYB_QAS2
      - EA-153304
      - EA-153305
      - BA0002
      - DILMAR
      - MEGA AHORRO

rules:
  selection:
    - Load client context when a trigger matches a named client or a known reference document.
    - For reservation investigations, domain-reserva plus domain-database is mandatory.
    - For legacy WinForms/UI reserve traces, add domain-bof.
  context_budget:
    - Do not load all brain files by default.
    - Prefer the listed entry points and only expand to source files required by the current hypothesis.
