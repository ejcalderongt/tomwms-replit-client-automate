version: 1
updated: "2026-05-20"
domain: database
scope: "SQL Server validation and blast-radius checks for WMS reservation work."

reservation_tables:
  interface:
    header: i_nav_ped_traslado_enc
    detail: i_nav_ped_traslado_det
    key_fields:
      - No
      - NoEnc
      - Line_No
      - Item_No
      - Quantity
      - Quantity_Reserved_WMS
      - Process_Result
  pedido:
    header: trans_pe_enc
    detail: trans_pe_det
    reservation: stock_res
    key_fields:
      - Referencia
      - IdPedidoEnc
      - IdPedidoDet
      - No_linea
      - Codigo_Producto
      - Cantidad
      - IdPresentacion
      - IdUnidadMedidaBasica
      - IdStock
      - IdTransaccion

validation_queries:
  minimum_checks:
    - trans_pe_det count and SUM(Cantidad) by IdPedidoEnc.
    - stock_res count and SUM(Cantidad) by IdTransaccion.
    - i_nav_ped_traslado_det count, SUM(Quantity), SUM(Quantity_Reserved_WMS) by NoEnc.
    - Per-line stock_res count/sum by trans_pe_det.No_linea.
    - Optional strict parity: IdStock/lote/cantidad by line against a known-good baseline.
  cleanup_rule: >
    Deletes during tests must be scoped to the synthetic reference only, e.g.
    EA-153304WEBAPI, and must delete stock_res by IdTransaccion before deleting
    trans_pe_det/trans_pe_enc.

safe_db_rules:
  - Never print connection string passwords.
  - KILLIOS production is SELECT-only for local agents.
  - BYB QA may be cleaned only for explicitly synthetic WebAPI references.
  - Use transactions and XACT_ABORT for cleanup scripts.
  - Verify zero rows after cleanup.

brain_api_checks:
  use_when:
    - schema/table/view/SP changes
    - public method refactors
    - unknown writer of stock/reservation tables
  endpoints:
    writers_stock: "/writers?symbol=stock&op=update,delete,merge,insert&kind=sql-table"
    impact_view: "/impact?symbol=<symbol>&depth=2"
    dependencies_method: "/dependencies?symbol=<symbol>&depth=2"
