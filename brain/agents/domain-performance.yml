safe_candidate_backlog:
  - id: batch-interface-status-updates
    idea: >
      Reduce per-line Actualizar_Status_Det roundtrips after reservation,
      preserving Process_Result semantics.
    risk: medium
    acceptance: "Must preserve per-line Process_Result and retry/reprocess behavior."
  - id: cache-static-config
    idea: >
      Cache bodega/config/propietario/estado values already shared at document
      level, but do not alter product or stock filters.
    risk: low-medium
    acceptance: "Strict baseline comparison must pass."
  - id: sql-stock-query-plan
    idea: >
      Inspect lStock query plan and indexes for stock/product/presentation
      filters before changing code flow.
    risk: low
    acceptance: "Read-only analysis first; DB schema changes require separate Brain impact check."

tooling:
  compare_baseline_script: tools/webapi-mi3-reserva/compare-mi3-reserva-baseline.ps1
  trace_location_pattern: tools/webapi-mi3-reserva/wmswebapi-*.out.log
  cleanup_expectation: "zero rows for synthetic document after every cycle"
