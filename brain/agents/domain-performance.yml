version: 1
updated: "2026-05-21"
domain: performance
scope: >
  Measurement-first optimization for reservation, WebAPI and SQL paths. Focus on
  repeatable timings, business-invariant checks and rollback of risky changes.

principles:
  - Optimize only one hypothesis per phase.
  - Never accept an optimization on global totals alone.
  - Preserve IdStock/lote/presentation/UM selection when parity with legacy is required.
  - Prefer removing redundant roundtrips over changing reservation rules.
  - Revert experiments that change stock_res partition unless Erik explicitly accepts the new behavior.

baseline_protocol:
  required_inputs:
    - document reference
    - payload file
    - database target/client
    - accepted baseline source, usually legacy
    - expected counts and sums
  metrics:
    api:
      - curl total_time
      - HTTP status
      - exito
      - lineasProcesadas
      - totalSolicitado
      - totalReservado
    db:
      - trans_pe_det count and SUM(Cantidad)
      - stock_res count and SUM(Cantidad)
      - i_nav_ped_traslado_det count and SUM(Quantity_Reserved_WMS)
      - per-line stock_res rows and sums
      - optional strict IdStock/lote/cantidad parity
    logs:
      - "#MI3_PERF_SERVICE_IMPORTAR"
      - "#MI3_PERF_SERVICE_END"
      - "#MI3_PERF_IF_END"
      - "#MI3_PERF_IF_LINE_END"
      - "#MI3_PERF_IF_DETAIL_RESERVAR"
      - "#MI3_PERF_SQL"
      - "#MI3_PERF_PIPELINE_TOTAL"

phase_gate:
  accept:
    - Build passes.
    - API finishes under target timeout.
    - API totals match expected baseline.
    - DB totals match expected baseline.
    - Per-line stock_res partition matches when parity is required.
    - Test document is cleaned.
  reject:
    - Any change in IdStock/lote partition without explicit acceptance.
    - Any orphan stock_res or wrong IdPedidoDet identity linkage.
    - Any hidden leftover test document.
    - Any optimization that relies on disabling a business filter.

