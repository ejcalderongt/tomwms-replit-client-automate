version: 1
updated: "2026-05-20"
domain: reserva
scope: >
  MI3/WebAPI/legacy reservation analysis, no-reserva diagnostics, stock_res
  integrity, presentation/UM conversion, FEFO and picking-vs-almacenaje rules.

entry_points:
  core:
    webapi_endpoint: "POST /api/sync/salidas/mi3/insertar"
    service: WMSWebAPI/Services/Salidas/SyncSalidasService.cs
    import_layer: WMS.DALCore/I_nav_ped_traslado_enc/clsLnI_nav_ped_traslado_enc.cs
    reservation_facade: WMS.DALCore/Reserva_Stock/Compatibility/StockReservationFacade.cs
    pipeline:
      - WMS.DALCore/Reserva_Stock/Core/Services/ValidationStep.cs
      - WMS.DALCore/Reserva_Stock/Core/Services/EntityLoadingStep.cs
      - WMS.DALCore/Reserva_Stock/Core/Services/StockQueryStep.cs
      - WMS.DALCore/Reserva_Stock/Core/Services/DateCalculationStep.cs
      - WMS.DALCore/Reserva_Stock/Core/Services/ReservationLoopStep.cs
      - WMS.DALCore/Reserva_Stock/Core/Services/PostProcessingStep.cs
    document_cache: WMS.DALCore/Reserva_Stock/Core/Domain/StockReservationDocumentCache.cs
    pedido_det: WMS.DALCore/Pedido/clsLnTrans_pe_det.cs
  legacy:
    notes:
      - Legacy is the business oracle when Erik marks a document as correct.
      - Compare Core against the last known-good legacy run for the same document and unchanged stock.

hard_invariants:
  - Quantity requested and Quantity_Reserved_WMS must match the accepted baseline when stock is unchanged.
  - trans_pe_det line count and SUM(Cantidad) must match the accepted baseline.
  - stock_res SUM(Cantidad) must match the accepted baseline.
  - stock_res row count and per-line partition should match the accepted baseline when the goal is parity, not just totals.
  - No test document may remain after a validation cycle unless Erik explicitly asks to keep it.
  - A performance optimization is not stable if it changes FEFO, IdStock selection, stock_res row count, or line partition.

known_stable_fixes:
  - id: core-mi3-presentation-by-um
    summary: >
      When Variant_Code is empty but Unit_of_Measure_Code is a presentation
      code such as CJ, Core resolves the presentation by UM using
      Get_Presentacion_By_IdProductoBodega_And_CodPres.
    files:
      - WMS.DALCore/I_nav_ped_traslado_enc/clsLnI_nav_ped_traslado_enc.cs
  - id: core-mi3-identity-idpedidodet
    summary: >
      After Insertar(trans_pe_det) returns the identity, assign it back to
      pBePedidoDet.IdPedidoDet and pBeStockRes.IdPedidoDet. Do not rely on
      MaxID + 1 when SQL identity seed may be ahead.
    files:
      - WMS.DALCore/Pedido/clsLnTrans_pe_det.cs
  - id: core-mi3-umbas-from-product
    summary: >
      For lines with presentation, reuse clsBeProducto.IdUnidadMedidaBasica
      before falling back to Get_Id_Unidad_Medida_By_Codigo. This removes a
      per-line lookup without changing selection.
    commit: 9e958ecd
    files:
      - WMS.DALCore/I_nav_ped_traslado_enc/clsLnI_nav_ped_traslado_enc.cs

rejected_or_high_risk_optimizations:
  - id: reuse-full-product-inside-pipeline
    result: rejected
    reason: >
      Passing the fully loaded product object from the interface into the
      reservation pipeline changed stock_res partition/IdStock selection even
      when totals still matched. Totals alone are not enough.
  - id: cache-bodega-only-in-lstock
    result: not_committed
    reason: >
      Looked safe but the final cycle was interrupted. Re-test from clean state
      before considering it stable.

analysis_workflow:
  - Stop any existing WebAPI process before build/run.
  - Clean the test reference from trans_pe_enc, trans_pe_det, stock_res and i_nav_ped_traslado tables.
  - Build WMSWebAPI with dotnet build before each run.
  - Generate a test payload whose document number clearly marks WebAPI, e.g. EA-153304WEBAPI.
  - Run curl with --max-time 120.
  - Validate API fields: exito, mensaje, lineasProcesadas, totalSolicitado, totalReservado.
  - Validate DB fields: trans_pe_det count/sum, stock_res count/sum, i_nav_ped_traslado_det count/sum.
  - Compare per-line stock_res partition against the accepted legacy baseline when available.
  - Inspect #MI3_PERF traces for service/import/pipeline/SQL step timing.
  - Clean the test reference again.

performance_reading:
  trace_tags:
    - "#MI3_PERF_SERVICE_IMPORTAR"
    - "#MI3_PERF_SERVICE_COUNT_LINES"
    - "#MI3_PERF_SERVICE_DETALLES"
    - "#MI3_PERF_IF_END"
    - "#MI3_PERF_IF_LINE_LOOKUP_PRODUCT"
    - "#MI3_PERF_IF_LINE_LOOKUP_UM"
    - "#MI3_PERF_IF_LINE_LOOKUP_PRESENTACION"
    - "#MI3_PERF_IF_DETAIL_RESERVAR"
    - "#MI3_PERF_SQL"
    - "#MI3_PERF_PIPELINE_TOTAL"
  interpretation:
    - If StockQueryStep is repeated per line, first confirm DocumentCache is active.
    - A 0 ms lookup after cache is expected; do not remove fallback paths.
    - Do not optimize by weakening FEFO or presentation filters.
    - Batch status updates are lower priority unless profiling shows they dominate.

no_reserva_taxonomy:
  - SOLO_NO_PICKING_SIN_EXPLOSION: stock exists only in almacenaje/no-picking and cannot be used by the current rule.
  - FEFO_BLOQUEA_PICKING: older non-picking stock blocks picking unless the accepted fallback rule allows picking to cover.
  - SIN_STOCK_APLICABLE: no stock survives filters for product/state/UM/presentation/location/date.
  - SIN_VENCIMIENTO_VALIDO: stock exists but fails expiration/life rules.
  - SIN_FECHA_MANUFACTURA_VALIDA: manufacturing mode needs valid fecha_manufactura.
  - UBICACION_CLIENTE_OBLIGATORIA: required location is not satisfied.

do_not_forget:
  - Presentation lines often reserve in base units in stock_res while interface reports document units.
  - For BYB, CJ can arrive as Unit_of_Measure_Code with empty Variant_Code.
  - IdPresentacion, IdUnidadMedida and Factor are part of the business contract.
  - The legacy baseline may include exact IdStock/lote partitions; compare those when parity is required.
