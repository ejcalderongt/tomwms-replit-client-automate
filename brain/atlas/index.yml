version: 1
updated: "2026-06-11"
purpose: >
  Atlas maestro del Brain local WMS. Centraliza discovery de paquetes de
  conocimiento y reduce carga de contexto innecesaria.

entrypoints:
  coordinator: brain/agents/coordinator.yml
  router: brain/agents/_index.yml
  handoffs_index: brain/handoffs/_index.yml
  automation_backlog: brain/atlas/AUTOMATION-BACKLOG-2026-06-04.md
  lint_script: brain/tools/lint_brain_indexes.ps1

knowledge_packages:
  agents_router:
    path: brain/agents/_index.yml
    type: router
    priority: p0
    freshness_days: 30
    owner: wms-core
  coordinator:
    path: brain/agents/coordinator.yml
    type: governance
    priority: p0
    freshness_days: 30
    owner: wms-core
  domain_bof:
    path: brain/agents/domain-bof.yml
    type: domain
    priority: p1
    freshness_days: 45
    owner: bof
    tags: [vb, winforms, legacy]
  domain_hh_android:
    path: brain/agents/domain-hh-android.yml
    type: domain
    priority: p1
    freshness_days: 30
    owner: hh
    tags: [android, hh, picking, reemplazo, etiquetas, talla_color]
  domain_database:
    path: brain/agents/domain-database.yml
    type: domain
    priority: p1
    freshness_days: 45
    owner: dba
    tags: [sql, sp, tabla]
  domain_reserva:
    path: brain/agents/domain-reserva.yml
    type: domain
    priority: p1
    freshness_days: 30
    owner: operaciones
    tags: [reserva, mi3, stock_res]
  domain_webapi:
    path: brain/agents/domain-webapi.yml
    type: domain
    priority: p1
    freshness_days: 30
    owner: api
    tags: [webapi, endpoint, payload]
  domain_performance:
    path: brain/agents/domain-performance.yml
    type: domain
    priority: p1
    freshness_days: 30
    owner: performance
    tags: [rendimiento, timeout, trace]
  client_byb:
    path: brain/agents/client-byb.yml
    type: client
    priority: p2
    freshness_days: 30
    owner: soporte
    tags: [byb, qa]

skills_backup:
  path: brain/skills
  policy: >
    Mantener skills en ~/.codex/skills como runtime y brain/skills como backup
    versionado en repo.

routing_policy:
  - Cargar primero coordinator y router.
  - Cargar solo domains por trigger matching.
  - Cargar handoff solo si el sintoma/caso coincide con handoffs_index.
  - Evitar cargar handoffs historicos por defecto.

governance:
  stale_policy:
    warn_after_days: 45
    critical_after_days: 90
  metadata_required:
    - owner
    - updated
    - tags
    - freshness_days
  review_cycle:
    - Revisar atlas e indices en cada cierre de incidente reusable.
