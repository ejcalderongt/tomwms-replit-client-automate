colas_pendientes:
  - id: COLA-AJCANTN-RECONCILIACION-MASIVA
    prioridad: alta
    descripcion: |
      Generar masivamente AJCANTN (IdTipoTarea=17) en trans_movimientos para los 10,565
      pickings con dañado_picking=1 sin movimiento asociado, descontando las 318k UM
      fantasma de stock. Requiere:
      - Script SQL que itere sobre danados-sin-ajcantn-asociado.csv
      - Insertar en trans_movimientos con cantidad negativa, IdTipoTarea=17, referencia trazable
      - Insertar paralelo en trans_ajuste_enc/det con motivo='Conciliación dañado_picking masiva'
      - Validar con audit-saldo-neto.py post-ejecución (debe seguir en 0 negativos)
      - Ejecutar fuera de horario operativo, transacción por bloques de 500
      - Backup previo de trans_movimientos + stock + producto_bodega_stock
    bloqueante_de: ["patch BOF .NET (sino el bug sigue acumulando)"]
    referencia_caso: CP-013-killios-wms164
  - id: COLA-PATCH-FUNCIONAL-BOF-VBNET
    prioridad: critica
    descripcion: |
      Modificar el flujo VB.NET del BOF que marca dañado_picking=1 para que:
      1. Genere AJCANTN automático (IdTipoTarea=17) en trans_movimientos con cantidad negativa = cantidad_solicitada
      2. Inserte en trans_ajuste_enc/det con motivo predeterminado 'Producto dañado en picking'
      3. Mueva la mercadería a ubicación lógica MERMA (IdUbicacion según config cliente)
      4. Descuente de stock viva (UPDATE stock SET cantidad = cantidad - X WHERE IdStock=...)
      5. Loggee en stock_hist el snapshot post-descuento
      Requiere acceso al fork del BOF .NET y testing en QA antes de prod.
      Bug crónico desde 2019 (1,653 ajustes manuales históricos compensándolo).
    referencia_caso: CP-013-killios-wms164
    referencia_doc: brain/debuged-cases/CP-013-killios-wms164/PLAYBOOK-FIX.md
  - id: COLA-INVENTARIOS-CICLICOS
    prioridad: media
    descripcion: |
      Implementar plan de inventarios cíclicos (no esperar al inventario anual) que:
      - Identifique productos con mayor rotación + mayor gap stock teórico vs físico
      - Audite mensualmente top-N productos (sugerido N=50)
      - Compare conteo físico vs producto_bodega_stock
      - Genere ajustes formales (ajuste_por_inventario=1) en lugar de manuales
      Killios actualmente NO los hace (cero registros con ajuste_por_inventario=1 entre 2023-2025).
      Beneficio: detección temprana de bugs como CP-013 antes de que acumulen 6 meses sin descubrir.
    referencia_caso: CP-013-killios-wms164
