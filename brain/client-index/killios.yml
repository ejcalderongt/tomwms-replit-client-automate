bugs_documentados:
  - id: BUG-DANADO-PICKING-SIN-DESCUENTO
    severidad: critica
    transversal: true  # confirmado en MERCOPAN, BYB tambien — ver CP-014
    referencia_cruzada: debuged-cases/CP-014-bug-danado-picking-transversal/REPORTE-MULTI-BD.md
    descripcion: |
      Cuando se marca dañado_picking=1 desde el BOF VB.NET, el flujo:
      - Pone dañado_picking=1, cantidad_verificada=0, cantidad_despachada=0, encontrado=True, activo=1
      - NO genera movimiento AJCANTN (IdTipoTarea=17)
      - NO mueve la mercadería a ubicación MERMA
      - NO descuenta de stock viva
      Resultado: stock fantasma. Impacto cuantificado: >320,000 UM en 25 usuarios y 10 meses.
    cronicidad:
      desde_estimado: 2019
      evidencia: "trans_ajuste_enc/det muestra 1,653 ajustes manuales históricos compensando el patrón. 925 negativos en período 2019-2023 + 122 negativos recientes."
    caso_de_estudio: CP-013-killios-wms164

