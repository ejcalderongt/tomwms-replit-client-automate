id: dataway-analysis/04-ecuacion-de-balance/divergencia-reportes-paralelos
title: Divergencia entre reportes especializados por cliente
public: machine-structure
version: 2
created_in_wave: wave-13-1
last_updated: 2026-04-29
last_erratum_wave: wave-13-7

erratum:
  wave: wave-13-7
  cambio: |
    Version 1 describio frmMovimiento_Reporte como clon experimental abandonado.
    Lectura corregida (input Erik wave 13-7): los dos reportes son especializaciones
    legitimas para dos formas distintas de llevar el cardex (estandar vs control de poliza).
    La deuda tecnica del fiscal sigue siendo deuda, pero el marco no es clon olvidado.

bug:
  id: V-DATAWAY-002
  severidad: alta
  estado: pendiente_investigacion
  titulo: |
    frmStockEnUnaFecha y frmMovimiento_Reporte calculan balance teorico con logica
    divergente. Especializaciones legitimas con deuda tecnica acumulada en el fiscal.

reportes:
  estandar:
    archivo: TOMWMS_BOF/TOMIMSV4/TOMIMSV4/Reportes/Stock_En_Una_Fecha/frmStockEnUnaFecha.vb
    proposito: inventario teorico al cierre
    audiencia: mayoria de clientes
    lineas_aproximadas: 1111
    matching_logica: exacto_3_keys
    guard_idmovimiento: ausente
    modo_depuracion: presente (V-DATAWAY-001)
    bug_aritmetico_salidas: no
    legitimidad: canonico para flujo sin poliza

  fiscal_poliza:
    archivo: TOMWMS_BOF/TOMIMSV4/TOMIMSV4/Reportes/Fiscales/frmMovimiento_Reporte.vb
    proposito: reporte fiscal de movimientos con trazabilidad de poliza
    audiencia:
      confirmados: [Cealsa, Idealsa, Cumbre]
      pendiente_completar_lista: true
    lineas_aproximadas: 705
    matching_logica: cascada_4_niveles
    guard_idmovimiento: comentado_abandonado
    modo_depuracion: ausente
    bug_aritmetico_salidas: V-DATAWAY-004 (linea 201)
    legitimidad: |
      especializado para clientes con control de poliza. La cascada de matching
      4 niveles es feature, no bug, derivada de variaciones de granularidad
      introducidas por la dimension poliza.

modelo_de_negocio:
  cliente_sin_poliza:
    granularidad_balance: Codigo + EstadoOrigen + Fecha_Vence
    matching_requerido: exacto
    reporte_apropiado: estandar
  cliente_con_poliza:
    granularidad_balance: Codigo + EstadoOrigen + Fecha_Vence + Poliza
    matching_requerido: cascada (poliza puede introducir variaciones de Lote o Fecha_Vence)
    reporte_apropiado: fiscal_poliza
    pendiente_caracterizar:
      - es campo en trans_movimientos? tabla aparte? eje implicito?
      - quien lo escribe, quien lo lee?
      - sub_wave_dedicada: 02-particionamiento-licencia o nuevo 08-control-poliza

deuda_tecnica_real_del_fiscal:
  no_es_deuda_es_feature:
    - cascada de matching 4 niveles (necesaria por poliza)
    - ausencia de ModoDepuracion (correcto para reporte fiscal, que no debe mutar)
  
  si_es_deuda:
    - id: deuda_1
      titulo: re-matching que detecta pero no corrige
      ubicacion: frmMovimiento_Reporte.vb:127-131
      cita: |
        If RepMovEnUnaFecha(Idx).Fecha_Vence.Date > BeStockEnFecha.Fecha_Vence.Date Then
            'BeStockEnFecha.Fecha_Vence = RepMovEnUnaFecha(Idx).Fecha_Vence.Date
            Debug.Print(BeStockEnFecha.Codigo)
        End If
      diagnostico: la linea de fix esta comentada, solo escribe Debug.Print
    
    - id: deuda_2
      titulo: guard IdMovimiento comentado sin documentar por que
      lineas: [178, 200]
    
    - id: deuda_3
      titulo: bug aritmetico V-DATAWAY-004 (Salidas posiblemente en cero)
      linea: 201
    
    - id: deuda_4
      titulo: hardcodes TheGoalDate + Wait a second + Magia por EJC + Por error JP
      lineas: [87, 95, 99, 126, 128]
      case_pointers: [CP-002, CP-003, CP-004, CP-005, CP-006]

divergencias:
  - id: divergencia_1
    titulo: logica de matching
    estandar:
      tipo: matching_exacto
      keys: [Codigo, IdEstadoOrigen, Fecha_Vence]
      lineas: 113-117
    fiscal:
      tipo: cascada_4_niveles
      lineas: 113-148
      legitimidad: feature por poliza, no bug
      caveat: re-matching por fecha_vence comentado (deuda_1)
  
  - id: divergencia_2
    titulo: guard IdMovimiento abandonado
    estandar:
      estado: nunca_existio
    fiscal:
      estado: comentado
      lineas: [178, 200]
    proposito_original: anti_doble_conteo
    pregunta_abierta: por_que_se_abandono
    hipotesis:
      - hipotesis_a: IdMovimiento cambio de semantica (PK movimiento -> PK lote/poliza)
      - hipotesis_b: VW_Movimientos genera varias filas con mismo IdMovimiento legitimamente (presentacion, ubicacion, poliza)
      - hipotesis_c: Get_Lista_Movimientos ya hacia DISTINCT
  
  - id: divergencia_3
    titulo: bug aritmetico V-DATAWAY-004
    bug:
      id: V-DATAWAY-004
      severidad: alta
      ubicacion:
        archivo: frmMovimiento_Reporte.vb
        linea: 201
      cita: BeStockEnFecha.Salidas += ObjM.Salidas
      hipotesis: |
        ObjM viene de Get_Lista_Movimientos. Si en el fiscal consume vista
        diferente (especifica para poliza) o tabla raw donde Salidas viene null/0,
        las salidas nunca acumulan.
      consecuencia_si_confirmado: |
        Balance teorico fiscal artificialmente alto. Analistas atribuyen a robo/merma
        lo que es campo no leido.
      pendiente_confirmar: localizar Get_Lista_Movimientos en cada archivo
  
  - id: divergencia_4
    titulo: ModoDepuracion ausente en fiscal
    lectura_corregida: no es virtud, es diferencia de origen funcional
    razon: reporte fiscal nunca debio mutar (violaria requisito regulatorio)

recomendaciones:
  - id: R1
    titulo: caracterizar formalmente control de poliza como capa del modelo
    plazo: previo_a_R2
    sub_wave_propuesta: nuevo 08-control-poliza
    preguntas:
      - es campo en trans_movimientos?
      - es tabla aparte joined por IdPoliza?
      - es eje de particionamiento implicito por cliente?
      - quien lo escribe, quien lo lee?
  
  - id: R2
    titulo: extraer logica calculo a clase unica parametrizada por estrategia matching
    plazo: medio_largo
    propuesta: |
      IEstrategiaMatching: contrato comun
      clsMatchingExacto: estandar
      clsMatchingCascadaPoliza: fiscal
      clsCalculadorBalance: clase unica que recibe estrategia inyectada
  
  - id: R3
    titulo: confirmar V-DATAWAY-004 con datos reales
    plazo: corto
    accion: ejecutar reporte fiscal sobre cliente con poliza y despachos conocidos
  
  - id: R4
    titulo: documentar case-pointers CP-002 a CP-007
    plazo: inmediato
    estado: en_curso_wave_13_7

bugs_relacionados:
  - V-DATAWAY-002
  - V-DATAWAY-004
  - V-DATAWAY-001 (solo en estandar)

case_pointers_relacionados:
  - CP-002 (frmmovreporte fecha_vence=now por error JP)
  - CP-003 (frmmovreporte Magia por EJC)
  - CP-004 (frmmovreporte declaracion TheGoalDate)
  - CP-005 (frmmovreporte breakpoint por fecha)
  - CP-006 (frmmovreporte breakpoint triple condicion)

