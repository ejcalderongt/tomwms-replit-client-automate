queries_propuestas:
  - id: query_07
    titulo: detectar otros productos con DESP desde SIN REGISTRO
    target_archivo: tools/case-seed/queries/data-discrepancy/07_movimientos_sin_registro_desp.sql
    sql: |
      SELECT TOP 100
          M.Fecha,
          M.IdMovimiento,
          P.Codigo,
          P.Producto,
          M.IdEstadoOrigen,
          EO.Descripcion AS EstadoOrigenDesc,
          M.Cantidad,
          M.Salidas,
          M.Fecha_Vence,
          M.IdStock
      FROM trans_movimientos M
      INNER JOIN producto P ON P.IdProducto = M.IdProducto
      LEFT JOIN producto_estado EO ON EO.IdEstado = M.IdEstadoOrigen
      WHERE M.TipoTarea = 'DESP'
        AND EO.Descripcion = 'SIN REGISTRO'
        AND M.Fecha BETWEEN @From AND @To
      ORDER BY M.Fecha DESC
    read_only: true
    parametros: [From, To]
    pendiente_implementar: true
    nota: ajustar nombre de columna Descripcion segun schema cliente

  - id: query_08
    titulo: verificacion especifica del caso historico
    target_archivo: tools/case-seed/queries/data-discrepancy/08_caso_cp001_codigo_030772033524.sql
    sql: |
      SELECT
          M.Fecha,
          M.IdMovimiento,
          M.TipoTarea,
          M.Cantidad,
          M.Salidas,
          M.Fecha_Vence,
          M.IdStock,
          M.IdEstadoOrigen,
          M.Lote
      FROM trans_movimientos M
      INNER JOIN producto P ON P.IdProducto = M.IdProducto
      WHERE P.Codigo = '030772033524'
        AND M.Fecha_Vence = '2019-08-30'
      ORDER BY M.Fecha
    read_only: true
    parametros: []
    pendiente_implementar: true

