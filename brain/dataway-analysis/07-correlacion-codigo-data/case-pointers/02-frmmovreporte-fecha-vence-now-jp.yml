reconstruccion_bug:
  operacion_involucrada: cambio de ubicacion (probable HH Android UBIC)
  bug_descripto:
    sintoma: Fecha_Vence del registro destino queda en Now() en vez de heredarse del origen
    consecuencia_data: |
      trans_movimientos tiene registros para mismo IdProducto+IdLote con
      Fecha_Vence distintas (la real y la Now() del cambio de ubicacion).
      Cardex queda fragmentado en dos puntos del balance.
    consecuencia_reporte: |
      Cascada de matching del fiscal detecta dos entradas para mismo
      Codigo+IdEstadoOrigen+Lote con Fecha_Vence distintas. Bloque de fix
      L128-130 esta comentado. Solo escribe Debug.Print y sigue.

queries_propuestas:
  - id: query_09
    titulo: detectar lotes con Fecha_Vence sospechosamente igual a Fecha movimiento
    target_archivo: tools/case-seed/queries/data-discrepancy/09_fecha_vence_now_jp_bug.sql
    sql: |
      SELECT TOP 100
          M.IdProducto,
          P.Codigo,
          M.IdLote,
          M.Fecha,
          M.Fecha_Vence,
          DATEDIFF(SECOND, M.Fecha, M.Fecha_Vence) AS DeltaSegundos,
          M.TipoTarea,
          M.IdMovimiento
      FROM trans_movimientos M
      INNER JOIN producto P ON P.IdProducto = M.IdProducto
      WHERE ABS(DATEDIFF(SECOND, M.Fecha, M.Fecha_Vence)) < 60
        AND M.TipoTarea IN ('UBIC', 'UBIC1', 'UBIC2')
      ORDER BY M.Fecha DESC
    read_only: true
    parametros: []
    pendiente_implementar: true
    nota: ajustar valores TipoTarea segun enum real tTipoTarea del cliente

importancia: |
  Unico rastro documentado del bug en codigo fuente. Sin este comment, el bug seria
  invisible. Datos en trans_movimientos individualmente parecen coherentes; solo la
  lectura agregada del reporte fiscal lo expone.

