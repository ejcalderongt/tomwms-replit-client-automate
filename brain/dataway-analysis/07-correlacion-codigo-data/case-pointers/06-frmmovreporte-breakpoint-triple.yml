      Cliente recibio mercaderia antes de tener la poliza tramitada. Se asigno
      EstadoOrigen=SIN REGISTRO temporal. Si entre tanto se despacho legitimamente
      contra otro estado, el DESP queda con EstadoOrigen=SIN REGISTRO en
      trans_movimientos aunque no deberia.
