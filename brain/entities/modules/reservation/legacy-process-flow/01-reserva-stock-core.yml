  parameters_lost:
    - pExcluirUbicacionPicking: "vuelve a False default → posible inconsistencia si la llamada original era True"
    - BeConfigEnc: "vuelve a Nothing → relectura de BD innecesaria"
  bug_warnings:
    - "no captura return value: si la fracción falla, se pierde silenciosamente"
    - "no propaga config → relectura redundante de BD"
    - "no propaga ExcluirUbicacionPicking → posible reserva en zona prohibida"

