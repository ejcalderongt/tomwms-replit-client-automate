open_questions:
  - { id: "Q-CORE-01", text: "¿Es intencional que vIdxConfig nunca cambie de -1? El else de B003 nunca se ejecuta.", blocks_block: B003, severity: media }
  - { id: "Q-CORE-02", text: "La recursión por fracción decimal NO captura return value. ¿Es bug latente o se asume que siempre va a funcionar?", blocks_block: B010, severity: alta }
  - { id: "Q-CORE-03", text: "¿Por qué reservar la fracción decimal por separado en UMBas en vez de un solo set? Hipótesis: trazabilidad ERP / unidad básica del producto.", blocks_block: B010, severity: media }
  - { id: "Q-CORE-04", text: "Estado = 'UNCOMMITED' tiene un typo (debería ser UNCOMMITTED). ¿Está así también en BD y en el resto del codebase? Si sí, es contrato.", blocks_block: B009, severity: baja }
  - { id: "Q-CORE-05", text: "Si lBeStockAReservar.Count = 0 después del loop (caso edge), retorna False sin throw. ¿Es esperado?", blocks_block: B010, severity: media }
  - { id: "Q-CORE-06", text: "Get_Cantidad_ReservadaUMBas_By_IdStock solo resta UMBas; ¿qué pasa si hay reservas activas en otra presentación del mismo IdStock? Posible doble-reserva.", blocks_block: B005, severity: alta }
  - { id: "Q-CORE-07", text: "La recursión NO propaga pExcluirUbicacionPicking ni BeConfigEnc. ¿Bug o feature? Si la llamada original excluía picking, la recursión sí podría reservar en picking.", blocks_block: B010, severity: alta }
  - { id: "Q-CORE-08", text: "Color, Talla, IdProductoTallaColor (agregados #GT09012025) son recientes. ¿Existen en el motor nuevo .NET 8?", blocks_block: B009, severity: alta }

