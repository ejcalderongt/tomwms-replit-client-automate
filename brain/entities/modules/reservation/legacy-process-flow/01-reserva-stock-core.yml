recursion:
  exists: true
  trigger: "vCantidadDecimalUMBas > 0 después de Inserta_Stock_Reservado exitoso"
  marker_used: false
  marker_note: "NO usa No_bulto = 1965 (ese marker es exclusivo del adapter MI3)"
  return_value_captured: false
