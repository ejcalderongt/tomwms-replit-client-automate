  - { name: lBeStockAReservar, type: List(Of clsBeStock_res), purpose: "acumulador de reservas a persistir" }
  - { name: BeProducto, type: clsBeProducto, purpose: "instancia llenada ByRef por lStock" }
  - { name: BeStockRes, type: clsBeStock_res, purpose: "acumulador iterativo" }
  - { name: vIdPresentacion, type: Integer, purpose: "alias de pStockRes.IdPresentacion" }
  - { name: BeConfigEnc, type: clsBeI_nav_config_enc, purpose: "config inicial con IdPropietario; sobreescrita despues por config por IdEmpresa" }
  - { name: pBeConfigEnc, type: clsBeI_nav_config_enc, purpose: "config encabezado real obtenida por IdEmpresa (B008)" }
  - { name: vCantidadReservada, type: Double, purpose: "cantidad ya reservada UMBas (resta inicial)" }
  - { name: vPesoReservado, type: Double, purpose: "peso ya reservado UMBas (resta inicial)" }
  - { name: vCantidadStock, type: Double, purpose: "cantidad disponible iterativa" }
  - { name: vPesoStock, type: Double, purpose: "peso disponible iterativo" }
  - { name: vCantidadStockEnPres, type: Double, purpose: "cantidad disponible expresada en unidades de presentacion (Stock/Factor)" }
