  - { id: R003, rule: "Restar reservas pendientes incluye cantidad Y peso (no solo cantidad)", depends_on: [stock_res existente], legacy_anchor: "L483-493", parity_status: unknown }
  - { id: R004, rule: "Si Explosion_Automatica=True: la cantidad solicitada se separa en parte entera (en presentacion) y fraccion decimal; la fraccion se reserva en UMBas via recursion", depends_on: [config.Explosion_Automatica, presentacion.Factor], legacy_anchor: "L568-585", parity_status: unknown }
  - { id: R005, rule: "Si Explosion_Automatica=False: la cantidad solicitada se multiplica directamente por Factor (sin split)", depends_on: [config.Explosion_Automatica], legacy_anchor: "L587-598", parity_status: unknown }
  - { id: R006, rule: "Validacion de stock suficiente se hace en unidades de PRESENTACION cuando IdPresentacion<>0 y Explosion_Automatica=True (no en UMBas)", depends_on: [presentacion, config.Explosion_Automatica], legacy_anchor: "L647-665", note: "tira ErrorS0002A (variante 0002+A) en este caso", parity_status: unknown }
  - { id: R007, rule: "HOTFIX BYB (Codigo_proveedor_produccion='1060315'): cuando vCantidadPendiente > vCantidadStock y vStock tiene fraccion decimal, NO reservar parcial; saltar al siguiente stock", depends_on: [config.Codigo_proveedor_produccion (HARDCODED)], legacy_anchor: "L708-757", note: "VIOLACION L-035; deberia ser flag de config", parity_status: unknown }
  - { id: R008, rule: "Indicador en stock_res HARDCODED a 'PED' (no respeta pStockRes.Indicador)", depends_on: [], legacy_anchor: "L692", parity_status: unknown, divergence_from_core: "core respeta pStockRes.Indicador post #CKFK20210221" }
  - { id: R009, rule: "Estado inicial = 'UNCOMMITED' (mismo typo del core)", depends_on: [], legacy_anchor: "L776", parity_status: unknown }
  - { id: R010, rule: "Color/Talla/IdProductoTallaColor NO se propagan en este adapter", depends_on: [], legacy_anchor: "ausencia en B009", parity_status: missing_in_adapter, note: "el core post #GT09012025 si los propaga; gap entre adapters" }
  - { id: R011, rule: "Peso se reserva proporcional al stock asignado; #EJC20220303 marca esto como specific de Cealsa pero esta en el adapter BYB", depends_on: [], legacy_anchor: "L793", parity_status: unknown, note: "comentario fuera de lugar; verificar si Cealsa usa este adapter o si fue copy-paste" }
  - { id: R012, rule: "La recursion por fraccion solo ocurre si Explosion_Automatica=True (gating extra vs core)", depends_on: [config.Explosion_Automatica], legacy_anchor: "L817-831", parity_status: unknown }

