callees:
  - { target: clsLnStock.lStock, type: db_read, location: B004, table: stock, note: "no pasa pExcluirUbicacionPicking" }
  - { target: Get_Cantidad_Y_Peso_ReservadaUMBas_By_IdStock, type: db_read, location: B005, table: stock_res, note: "interna del archivo; retorna cantidad Y peso (vs core que solo retorna cantidad)" }
  - { target: clsLnProducto_presentacion.GetSingle, type: db_read, location: B008, table: producto_presentacion }
  - { target: clsLnI_nav_config_enc.Get_Single_By_IdBodega_And_IdEmpresa, type: db_read, location: B008, table: i_nav_config_enc, note: "DIFERENTE al core: usa IdEmpresa, no IdPropietario" }
  - { target: Split_Decimal, type: math, location: B008 }
  - { target: clsLnProducto.Tiene_Control_Por_Peso_By_IdProductoBodega, type: db_read, location: B008 }
  - { target: Inserta_Stock_Reservado, type: db_write, location: B010, table: stock_res }
  - { target: Reserva_Stock_NAV_BYB, type: recursion, location: B010, note: "auto-llamada para fraccion decimal con IdPresentacion=0" }
  - { target: clsLnLog_error_wms.Agregar_Error, type: db_write, location: B011 }

blocks:
  - { id: B001, lines: "452-456", type: init, summary: "Reserva_Stock_NAV_BYB=False; pListStockResOUT=Nothing; vIdxConfig=-1 (dead var)" }
  - { id: B002, lines: "458-853", type: try_catch, summary: "Wrapper Try/Catch principal" }
  - { id: B003, lines: "468", type: init, summary: "BeConfigEnc inicializado con Idnavconfigenc=1, IdPropietario=pIdPropietario (placeholder, sobreescrito en B008)" }
  - { id: B004, lines: "470-475", type: db_read, summary: "lStock SIN pExcluirUbicacionPicking (siempre incluye picking)" }
  - { id: B005, lines: "481-497", type: loop + db_read, summary: "Restar reservas UMBas pendientes (cantidad Y peso)" }
  - { id: B006, lines: "499", type: branch, summary: "Si lBeStockExistente.Count = 0 -> ErrorS0004 (B011 implicito)" }
  - id: B007
    lines: "532-618"
    type: branch + math
    summary: "Normalizacion cantidad/peso solicitado por presentacion"
    sub_branches:
      - { condition: "IdPresentacion = 0", on_true: "vCantidadSolicitadaPedido = Math.Round(pStockRes.Cantidad,6); vPesoSolicitadoPedido = Math.Round(pStockRes.Peso,6)" }
      - { condition: "IdPresentacion <> 0 AND BePres.EsPallet", on_true: "multiplicar por Factor*CajasPorCama*CamasPorTarima", on_throw: "factor pallet <= 0" }
      - condition: "IdPresentacion <> 0 AND NOT EsPallet"
        on_true: "lookup pBeConfigEnc por (IdBodega, IdEmpresa); si Explosion_Automatica entonces Split_Decimal y separar entera/fraccion; sino multiplicar directo por Factor"
        sub_sub_branches:
          - { condition: "Explosion_Automatica AND vCantidadEnteraPres > 0", on_true: "vCantidadSolicitadaPedido = vCantidadEnteraPres * BePres.Factor" }
          - { condition: "Explosion_Automatica AND vCantidadEnteraPres = 0", on_true: "vCantidadSolicitadaPedido = vCantidadDecimalUMBas (la fraccion entera)" }
          - { condition: "NOT Tiene_Control_Por_Peso", on_true: "Integer.TryParse o Math.Truncate (siempre entero)" }
          - { condition: "Tiene_Control_Por_Peso", on_true: "Math.Round(.., 6)" }
  - id: B008
    lines: "636-676"
    type: branch
    summary: "Validacion stock suficiente segun Explosion_Automatica"
    sub_branches:
      - condition: "Explosion_Automatica AND IdPresentacion = 0"
        on_true: "comparar UMBas vs UMBas; throw ErrorS0002 si insuficiente"
      - condition: "Explosion_Automatica AND IdPresentacion <> 0"
        on_true: "convertir Stock y Solicitado a unidades de presentacion (/Factor); throw ErrorS0002A si insuficiente en presentacion"
      - condition: "NOT Explosion_Automatica"
        on_true: "comparar UMBas vs UMBas directo; throw ErrorS0002 si insuficiente"
  - id: B009
    lines: "681-808"
    type: loop + branch
    summary: "Iteracion de stock candidato armando clsBeStock_res; HOTFIX BYB hardcoded"
    inner_loop_per_iteration:
      - "redondear cantidad y peso a 6 decimales"
      - "if Cantidad > 0 -> construir BeStockRes copiando de pStockRes y vStock"
      - "branch cantidad pendiente vs cantidad stock (3 ramas: =, <, >)"
      - "rama vCantidadPendiente > vCantidadStock: HOTFIX BYB (Codigo_proveedor_produccion=1060315) evita reservas parciales fraccionales; si no hay parte entera -> Continue For (skip stock)"
      - "Estado='UNCOMMITED' (mismo typo del core)"
      - "Indicador HARDCODED='PED' (vs core que respeta pStockRes.Indicador)"
      - "NO propaga Color/Talla/IdProductoTallaColor (core si lo hace post #GT09012025)"
  - id: B010
    lines: "812-843"
    type: db_write + recursion
    summary: "Persistencia + recursion por fraccion decimal (gated por Explosion_Automatica)"
    sub_branches:
      - { condition: "lBeStockAReservar.Count > 0", on_true: "Inserta_Stock_Reservado", on_throw_else: "ErrorS0005" }
      - { condition: "Explosion_Automatica AND vCantidadDecimalUMBas > 0", on_true: "RECURSION: Reserva_Stock_NAV_BYB(BeStockRes con fraccion, IdPresentacion=0, ..)" }
      - { condition: "Inserta_Stock_Reservado retorna False", on_throw: "ErrorS0006" }
      - on_success: "pListStockResOUT = lBeStockAReservar; return True"
  - { id: B011, lines: "849-852", type: catch, summary: "Log via clsLnLog_error_wms.Agregar_Error sin prefijo timestamp; re-throw" }

