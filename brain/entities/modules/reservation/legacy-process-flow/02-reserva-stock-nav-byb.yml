  - { name: vPesoAReservarPorIdStock, type: Double }
  - { name: vCantidadEnteraPres, type: Double, purpose: "parte entera del Split_Decimal" }
  - { name: vCantidadDecimalUMBas, type: Double, purpose: "parte decimal x Factor (trigger de recursion)" }
  - { name: vCantidadEnteraStockPres, type: Double, purpose: "parte entera del stock disponible expresado en presentacion (B009 hotfix BYB)" }
  - { name: vCantidadDecimalStockUMBas, type: Double }
  - { name: vPesoEnteroPres, type: Double }
  - { name: vPesoDecimalUMBas, type: Double }
  - { name: vPesoEnteroPresStock, type: Double }
  - { name: vPesoDecimalStockUMBas, type: Double }
  - { name: vCantidadSolicitadaPedidoEnPres, type: Double }
  - { name: vCantidadEnStockEnPres, type: Double }

