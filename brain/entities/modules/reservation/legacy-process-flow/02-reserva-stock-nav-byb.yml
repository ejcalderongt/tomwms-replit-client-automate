function:
  name: Reserva_Stock_NAV_BYB
  alias: byb-adapter
  file: TOMIMSV4/DAL/Transacciones/Stock_Reservado/clsLnStock_res_Partial.vb
  line_start: 442
  line_end: 855
  size_lines: 414
  visibility: Public Shared
  return_type: Boolean
  scanned_at: 2026-04-29
  source_commit: pending_capture
  introduced_at: "2022-05-23 (#EJC20220523)"
  client_specific: true
  client_id_marker: "BYB (deducido de la sigla y del Codigo_proveedor_produccion=1060315)"
  one_liner: >
    Adapter especifico para el cliente BYB. Opera con i_nav_config_enc resuelta por
    (IdBodega, IdEmpresa) en vez de (IdBodega, IdPropietario). Maneja Peso ademas de
    Cantidad (reserva proporcional de peso). Tiene logica de Explosion_Automatica y un
    hotfix HARDCODED para el Codigo_proveedor_produccion='1060315' que evita reservas
    parciales en presentaciones que generan fracciones decimales.

critical_violations:
  - id: V-001
    severity: critica
    rule_violated: "L-035 (no codificar por cliente; parametrizar via Bodega/Producto/i_nav_config_enc)"
    location: L708
    evidence: 'If pBeConfigEnc.Codigo_proveedor_produccion = "1060315" Then'
    impact: "el comportamiento de reserva por fracciones decimales esta atado al string '1060315' embedido en el codigo fuente; un cliente nuevo con la misma necesidad obliga a recompilar el WMS"
    proposed_fix: "exponer el comportamiento como flag boolean en i_nav_config_enc (ej. Reserva_Solo_Cantidad_Entera_En_Presentacion) y migrar la condicion a leer ese flag"

signature:
  parameters:
    - { name: pStockRes, type: clsBeStock_res, mode: ByRef, optional: false, purpose: "solicitud de reserva (entrada y mutacion)" }
    - { name: DiasVencimiento, type: Double, mode: ByVal, optional: false, purpose: "dias para filtrar fecha vencimiento" }
    - { name: MaquinaQueSolicita, type: String, mode: ByVal, optional: false, purpose: "host PC auditoria" }
    - { name: pListStockResOUT, type: List(Of clsBeStock_res), mode: ByRef, optional: false, purpose: "OUT: lista de reservas creadas devuelta al caller (asignada en B010)" }
    - { name: pIdEmpresa, type: Integer, mode: ByVal, optional: false, purpose: "empresa contable (clave para Get_Single_By_IdBodega_And_IdEmpresa, NO IdPropietario)" }
    - { name: pIdBodega, type: Integer, mode: ByVal, optional: false, purpose: "bodega target (separado del pStockRes.IdBodega; potencial inconsistencia)" }
    - { name: pIdPropietario, type: Integer, mode: ByVal, optional: false, purpose: "propietario contable (no usado para resolver config en este adapter, solo se inicializa BeConfigEnc.IdPropietario)" }
    - { name: lConnection, type: SqlConnection, mode: ByRef, optional: false, purpose: "conexion SQL ambiente" }
    - { name: ltransaction, type: SqlTransaction, mode: ByRef, optional: false, purpose: "transaccion ambiente" }

