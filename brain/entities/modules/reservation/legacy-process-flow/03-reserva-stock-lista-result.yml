  - { target: clsLnProducto_bodega.Get_IdProducto_By_IdProductoBodega, type: db_read, location: B009, table: producto_bodega }
  - { target: clsLnProducto_presentacion.Get_Presentacion_Defecto_By_IdProducto, type: db_read, location: B009, table: producto_presentacion }
  - { target: clsLnStock.Insertar, type: db_write, location: B009, table: stock, note: "MUTA stock fisico: inserta nuevo registro con marker No_bulto=1989 cuando se splittea fraccion decimal" }
  - { target: clsLnStock.Actualizar_Cantidad, type: db_write, location: B009, table: stock, note: "decrementa cantidad del stock origen tras split" }
  - { target: clsLnStock.Eliminar_By_IdStock, type: db_write, location: B009, table: stock, note: "elimina stock origen si la cantidad post-split queda en 0" }
