  - { id: R003, rule: "lStock se llama hasta dos veces: primera con Conmutar del caller, segunda con Conmutar=True como fallback si primera dio vacio y Explosion_Automatica", depends_on: [config.Explosion_Automatica, primer_resultado_lStock], legacy_anchor: "L909-920", note: "esta logica de fallback NO existe en el core" }
