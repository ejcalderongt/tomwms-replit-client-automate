  - { target: Inserta_Stock_Reservado, type: db_write, location: B010, table: stock_res }
  - { target: clsLnLog_error_wms.Agregar_Error, type: db_write, location: B011 }

blocks:
  - { id: B001, lines: "868", type: init, summary: "Reserva_Stock_Lista_Result = Nothing (default return)" }
  - { id: B002, lines: "870-end", type: try_catch, summary: "Wrapper Try/Catch principal" }
  - { id: B003, lines: "885-896", type: branch + db_read, summary: "Resolucion BeConfigEnc por (IdBodega, IdPropietario); usa cache lBeConfigInMemory; misma rama dead que el core (vIdxConfig=-1 siempre)" }
  - id: B004
    lines: "898-920"
    type: db_read + retry
    summary: "lStock con dos modos: si la primera lectura retorna vacio Y NOT Conmutar Y Explosion_Automatica, segunda lectura con Conmutar=True"
    sub_branches:
      - { condition: "primera lStock retorna lista vacia AND NOT Conmutar_Umbas_A_Presentacion AND Explosion_Automatica", on_true: "segunda llamada a lStock con Conmutar=True" }
  - id: B005
    lines: "925-961"
    type: loop + db_read
    summary: "Restar reservas UMBas pendientes; cuando IdPresentacion<>0 lookup BePres en cache (lectura del comentario CKFK20220321 indica que se decidio NO multiplicar por Factor porque lo reservado se obtiene en UMBas)"
  - id: B006
    lines: "963, 845-847"
    type: branch
    summary: "Si lBeStockExistente.Count = 0 -> ErrorS0004"
  - id: B007
    lines: "979-1057"
    type: branch + math
    summary: "Normalizacion cantidad solicitada (similar al core pero usa pBeConfigEnc.Explosion_Automatica del caller, no relectura)"
    sub_branches:
      - { condition: "IdPresentacion = 0", on_true: "vCantidadSolicitadaPedido = pStockRes.Cantidad" }
      - { condition: "IdPresentacion <> 0 AND BePres.EsPallet", on_true: "Factor*CajasPorCama*CamasPorTarima" }
      - condition: "IdPresentacion <> 0 AND NOT EsPallet"
        sub_sub_branches:
          - { condition: "Explosion_Automatica", on_true: "Split_Decimal; if entero>0 use entero*Factor, else use vCantidadDecimalUMBas" }
          - { condition: "NOT Explosion_Automatica", on_true: "vCantidadSolicitadaPedido = pStockRes.Cantidad * BePres.Factor" }
          - { condition: "NOT Tiene_Control_Por_Peso", on_true: "TryParse o Truncate" }
          - { condition: "Tiene_Control_Por_Peso", on_true: "Round(.., 6)" }
  - id: B008
    lines: "1064-1087"
    type: branch + db_write
    summary: "Validacion stock suficiente con politica Despachar_existencia_parcial"
    sub_branches:
      - condition: "vCantidadSolicitadaPedido > vCantidadDispStock AND Despachar_existencia_parcial = No"
        on_true: "throw ErrorS0002"
      - condition: "vCantidadSolicitadaPedido > vCantidadDispStock AND Despachar_existencia_parcial <> No"
        on_true: "actualizar pBeTrasladoDet (Qty_to_Receive=disp, Is_Partially_Processed=True); SI continua reserva parcial"
        side_effect: "clsLnI_nav_ped_traslado_det.Actualizar_Partially_Processed"
      - condition: "vCantidadSolicitadaPedido <= vCantidadDispStock"
        on_true: "pBeTrasladoDet.Is_Partially_Processed = False (explicito)"
  - id: B009
    lines: "1099-end_loop"
    type: loop + branch + db_write
    summary: "Iteracion: para cada vStockOrigen, copia a BeStockDestino; valida cantidad >=0 (tira ERROR_202302061300D si negativa); si es presentacion + hardcode BYB y hay fraccion decimal: SPLITTEA stock fisico (inserta nuevo IdStock con marker No_bulto=1989, actualiza/elimina origen); arma BeStockRes; aplica Color/Talla NO documentado aqui"
    inner_loop_per_iteration:
      - "CopyObject(vStockOrigen, BeStockDestino)"
      - "if Cantidad < 0 -> throw ERROR_202302061300D"
      - "if Cantidad > 0 -> construir BeStockRes con Indicador hardcoded 'PED'"
      - "branch cantidad pendiente vs cantidad disponible (3 ramas)"
      - "rama < (cantidad alcanza): si Codigo_proveedor_produccion='1060315' AND IdPresentacion stock<>0 -> SPLIT FISICO de stock con marker No_bulto=1989; sino: tomar pendiente directo"
      - "rama > (cantidad insuficiente): mismo split fisico para BYB; sino: tomar todo el stock disponible"
      - "Estado='UNCOMMITED'"
      - "asignar campos clsBeStock_res; SIN Color/Talla/IdProductoTallaColor"
      - "vCantidadCompletada = (vCantidadPendiente = 0); Exit For si true"
  - id: B010
    lines: "post_loop_end"
    type: db_write
    summary: "Persistencia via Inserta_Stock_Reservado y return de la lista"
  - { id: B011, lines: "post_catch", type: catch, summary: "Log + re-throw" }

