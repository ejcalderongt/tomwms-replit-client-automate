  - { id: R010, rule: "Si pStockRes.IdPresentacion=0 (caller pidio UMBas) y stock tiene presentacion, busca presentacion default del producto via Get_Presentacion_Defecto_By_IdProducto", depends_on: [producto.presentacion_defecto], legacy_anchor: "L1137-1147" }
  - { id: R011, rule: "Indicador hardcoded 'PED' (igual que NAV_BYB, distinto al core)", depends_on: [], legacy_anchor: "L1121", parity_status: unknown }
  - { id: R012, rule: "Estado='UNCOMMITED' (mismo typo)", depends_on: [], legacy_anchor: "L776-equiv (BeStockRes.Estado en B009)" }
  - { id: R013, rule: "NO propaga Color/Talla/IdProductoTallaColor (igual que NAV_BYB, distinto al core post-#GT09012025)", depends_on: [], legacy_anchor: "ausencia en B009" }
  - { id: R014, rule: "vRecursionSolicitud (private shared) declarada pero no se usa para gobernar nada visible; posible vestigio de control de recursion antiguo", depends_on: [], legacy_anchor: L857 }

