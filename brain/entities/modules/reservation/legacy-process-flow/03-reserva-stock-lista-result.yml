  - { id: R006, rule: "Politica de reserva parcial: si Despachar_existencia_parcial=No -> throw; si <>No -> reserva parcial Y actualiza i_nav_ped_traslado_det.Is_Partially_Processed=True con Qty_to_Receive=disponible", depends_on: [config.Despachar_existencia_parcial], legacy_anchor: "L1064-1081" }
  - { id: R007, rule: "Despachar_existencia_parcial es enum tDespacharExistenciaParcial (.No es valor explicito)", depends_on: [enum tDespacharExistenciaParcial], legacy_anchor: "L1067" }
  - { id: R008, rule: "HOTFIX BYB hardcode: si Codigo_proveedor_produccion='1060315' y stock origen tiene fraccion decimal en presentacion, SPLITTEA el stock fisico: inserta nuevo IdStock con cantidad UMBas (marker No_bulto=1989), decrementa o elimina el stock origen", depends_on: [config.Codigo_proveedor_produccion (HARDCODED)], legacy_anchor: "L1133-1225, L1236-1300", note: "VIOLACION L-035 + side-effect grave: una reserva muta stock fisico" }
