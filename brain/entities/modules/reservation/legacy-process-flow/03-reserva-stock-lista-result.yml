  - { target: clsLnI_nav_config_enc.GetSingle_By_IdBodega_And_IdPropietario, type: db_read, location: B003, table: i_nav_config_enc }
  - { target: clsLnStock.lStock, type: db_read, location: B004, table: stock, note: "se llama hasta DOS veces: primero con Conmutar_Umbas_A_Presentacion del caller, segunda vez con true si la primera fue vacia y Explosion_Automatica" }
  - { target: Get_Cantidad_ReservadaUMBas_By_IdStock, type: db_read, location: B005, table: stock_res }
