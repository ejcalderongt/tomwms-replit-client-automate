function:
  name: Reserva_Stock_Lista_Result
  alias: traslado-adapter
  file: TOMIMSV4/DAL/Transacciones/Stock_Reservado/clsLnStock_res_Partial.vb
  line_start: 858
  line_end: 1458
  size_lines: 601
  visibility: Public Shared
  return_type: List(Of clsBeStock_res)
  scanned_at: 2026-04-29
  source_commit: pending_capture
  client_specific: true
  client_id_marker: "BYB hardcoded (Codigo_proveedor_produccion='1060315') Y dependencia de pBeTrasladoDet (flujo TRASLADO)"
  one_liner: >
    Adapter para el flujo de TRASLADOS internos (bodega-a-bodega). Devuelve la lista de
    reservas (no boolean) y modifica pBeTrasladoDet.Is_Partially_Processed segun el
    flag Despachar_existencia_parcial. MUTA la tabla stock (Insertar/Actualizar_Cantidad/
    Eliminar) cuando hay fraccion decimal: parte cajas en cantidad UMBas separada con
    marker No_bulto=1989. Vuelve a llamar lStock una segunda vez si Explosion_Automatica
    y la primera lectura volvio vacia.

critical_violations:
  - id: V-002
    severity: critica
    rule_violated: "L-035 (no codificar por cliente)"
    location: "L1133, L1236"
    evidence: 'If pBeConfigEnc.Codigo_proveedor_produccion = "1060315" Then'
    impact: "mismo literal '1060315' que en NAV_BYB; la logica de splitear stock fisico esta atada al string del cliente"
    proposed_fix: "migrar a flag dedicado en i_nav_config_enc (ej. Permite_Split_Stock_Por_Fraccion)"
  - id: V-003
    severity: alta
    rule_violated: "single responsibility (la funcion modifica stock fisico ademas de stock_res)"
    location: "L1175, L1181, L1183, L1262, L1268, L1270"
    evidence: "clsLnStock.Insertar / Actualizar_Cantidad / Eliminar_By_IdStock dentro del flujo de reserva"
    impact: "una funcion supuesta de 'reservar' tambien REPARTE stock fisico (split de cajas a unidades), efecto colateral no obvio para el caller"

