side_effects_on_stock:
  description: "esta funcion MUTA la tabla stock fisico, no solo stock_res"
  operations:
    - { op: "INSERT INTO stock", trigger: "Codigo_proveedor_produccion='1060315' AND fraccion decimal en presentacion", marker: "No_bulto=1989", purpose: "crear stock UMBas separado a partir del split de cajas" }
