function:
  name: Reserva_Stock_Especifico
  alias: especifico-ov1-puntual
  overload_index: 1
  file: TOMIMSV4/DAL/Transacciones/Stock_Reservado/clsLnStock_res_Partial.vb
  line_start: 1459
  line_end: 1611
  size_lines: 153
  visibility: Public Shared
  return_type: Boolean
  scanned_at: 2026-04-29
  source_commit: pending_capture
  one_liner: >
    Reserva forzada sobre UN UNICO stock especifico provisto por el caller
    (pBeStockEspecifico). NO consulta lStock, NO itera, NO tiene recursion.
    Caso de uso tipico: handheld escanea LP/ubicacion y el operador decide
    reservar de ese stock puntualmente. La funcion mas chica del archivo y la
    mas simple. Sirve como template minimo de reserva.

