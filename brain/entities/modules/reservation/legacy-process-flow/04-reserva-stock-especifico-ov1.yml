  - { id: B002, lines: "1468-end", type: try_catch, summary: "Wrapper try/catch" }
  - { id: B003, lines: "1477-1483", type: db_read, summary: "Get_Cantidad_Reservada_By_IdStock (NO UMBas-only); resta de pBeStockEspecifico.Cantidad" }
  - id: B005
    lines: "1494-1534"
    type: branch + math + db_read
    summary: "Normalizacion cantidad (sin Explosion_Automatica gating; siempre multiplica por Factor)"
    sub_branches:
      - { condition: "IdPresentacion = 0", on_true: "vCantidadSolicitadaPedido = pStockRes.Cantidad" }
      - { condition: "IdPresentacion <> 0 AND BePres.EsPallet", on_true: "Factor*CajasPorCama*CamasPorTarima" }
      - condition: "IdPresentacion <> 0 AND NOT EsPallet"
        on_true: "vCantidadSolicitadaPedido = pStockRes.Cantidad * BePres.Factor (sin Split_Decimal, sin Explosion_Automatica)"
        sub_sub_branches:
          - { condition: "NOT Tiene_Control_Por_Peso", on_true: "TryParse o Truncate" }
          - { condition: "Tiene_Control_Por_Peso", on_true: "Round(.., 6)" }
  - { id: B006, lines: "1536-1538", type: assign, summary: "vCantidadPendiente=solicitado; vCantidadStock=pBeStockEspecifico.Cantidad" }
  - id: B007
    lines: "1540-1591"
    type: branch + assign
    summary: "Construccion de UN solo BeStockRes; sin loop, sin iteracion"
    sub_branches:
      - { condition: "vCantidadPendiente = vCantidadStock", on_true: "vCantidadAReservarPorIdStock = vCantidadStock; vCantidadPendiente = 0" }
      - { condition: "vCantidadPendiente < vCantidadStock", on_true: "vCantidadAReservarPorIdStock = vCantidadPendiente; vCantidadPendiente = 0" }
      - { condition: "vCantidadPendiente > vCantidadStock", on_true: "vCantidadAReservarPorIdStock = vCantidadStock; vCantidadPendiente = (solicitado - stock) (queda residuo SIN reservar y SIN throw, no hay quien continue)" }
    side_effects:
      - "CopyObject(pBeStockEspecifico, BeStockRes) (copia campos de stock origen a reserva)"
      - "Indicador HARDCODED 'PED'"
      - "Estado='UNCOMMITED'"
      - "IdPicking=0, IdDespacho=0"
      - "NO propaga Color/Talla/IdProductoTallaColor"
  - id: B008
    lines: "1593-1603"
    type: branch + db_write
    summary: "Persistencia"
    sub_branches:
      - { condition: "lBeStockAReservar.Count > 0 (siempre true porque B007 siempre Add)", on_true: "Inserta_Stock_Reservado", dead_else: true }
      - { condition: "Inserta_Stock_Reservado retorna False", on_throw: "ErrorS0006" }
  - { id: B010, lines: "1605-1608", type: catch, summary: "Log + re-throw" }

