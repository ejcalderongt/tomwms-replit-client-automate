violaciones_y_bugs:
  - id: "V-FROMR-001"
    description: "Debug code hardcoded en produccion: If IdProductoBodega = 183 Then Debug.Print('Hola'). Tambien con = 82."
    lines: [9943, 9968]
    severity: "BAJA"
    nota: "Inofensivo en produccion (Debug.Print no aparece en Release) pero indica falta de cleanup."

  - id: "V-FROMR-002"
    description: |
      Hardcode Indicador='PED' con patron defensive null check:
      'If BeStockRes.Indicador = '' Then BeStockRes.Indicador = 'PED''.
      Variante de la violacion V-001 piloto. Mismo efecto: viola L-035.
    lines: [10570, 10736]
    severity: "MEDIA"
    cross_ref: "V-001 piloto, V-OV1-001, V-OV2-001"

  - id: "V-FROMR-003"
    description: |
      Validacion oscura Math.Abs(CantidadStockDestino - Fix(CantidadStockDestino))
      en multiples lugares como condicion de Throw. Si != 0 (tiene decimal), throw.
      Funcionalmente correcto pero expresion criptica. Refactor sugerido:
      'If CantidadStockDestino <> Math.Floor(CantidadStockDestino) Then Throw'.
    lines: [10635, 10699, 10780, 10895, 11118, 11394, 11459, 11553, 11671, 11914, 12178, 12248, 12332, 12444, 12682]
    severity: "BAJA"
    nota: "Codigo defensivo legitimo pero mal escrito."

  - id: "V-FROMR-004"
    description: |
      Catch genericooo: 'Catch ex As Exception | Throw ex | End Try'.
      'Throw ex' (vs 'Throw' a secas) PIERDE el stack trace original — el caller
      no puede ver donde fallo realmente. Ademas NO agrega el contexto de funcion
      como hacen las otras funciones del pipeline (que usan
      clsLnLog_error_wms.Agregar_Error con MethodBase.GetCurrentMethod.Name).
      Inconsistencia con resto del pipeline.
    line: 13105
    severity: "MEDIA"
    cross_ref: "patron correcto en piloto Catch L431, NAV_BYB Catch L856, Lista_Result Catch L1456, Especifico ov1/ov2"

  - id: "V-FROMR-005"
    description: "Typo en marker: '#EJC30220525' (year 3022) en vez de '#EJC20220525'. Ruido para grep/audits."
    line: 10594
    severity: "TRIVIAL"

  - id: "V-FROMR-006"
    description: |
      Muta pStockRes ByRef reemplazandolo por BeStockRes al final del flujo exitoso:
      'pStockRes = BeStockRes' (multiples puntos). El caller pierde su solicitud
      original — recibe el objeto reservado. Comportamiento intencional pero MUY
      oculto. Comment lo confirma: '#EJC20210707: Igualar el stock reservador con
      la solicitud.'
    lines: [12804, 12954, 13075]
    severity: "ALTA"
    nota: "Si el caller mantiene una referencia a la solicitud original esperando que persista, perdera info. Patron similar al V-OV2-005 pero mas drastico (replace vs decrement)."

  - id: "V-FROMR-007"
    description: |
      pListStockResOUT se asigna con SEMANTICAS DISTINTAS segun el path de exito:
        L12735: pListStockResOUT.AddRange(lBeStockAReservar)  ' APPEND
        L12813: pListStockResOUT = lBeStockAReservar          ' REPLACE
        L12940: pListStockResOUT = lBeStockAReservar          ' REPLACE
        L12963: pListStockResOUT = lBeStockAReservar          ' REPLACE
        L13084: pListStockResOUT = lBeStockAReservar          ' REPLACE
      Si el caller pre-llena pListStockResOUT, recibe append en algunos paths y
      replace en otros — comportamiento NO determinista para sus expectativas.
    severity: "ALTA"
    sugerencia: "Estandarizar a una sola semantica (probablemente AddRange para preservar inputs del caller)."

  - id: "V-FROMR-008"
    description: |
      Recursion C (L12765, post-INSERT principal) NO usa marker No_bulto=1965 a
      diferencia de las otras dos (A y B). Si la recursion interna disparase
      ulterior recursion (cosa improbable pero posible), no hay guard anti-loop.
    line: 12765
    severity: "MEDIA"
    nota: "Bug latente, depende de paths que actualmente no se ejecutan."

  - id: "V-FROMR-009"
    description: |
      Setea Estado='UNCOMMITED' (typo persistente, deberia ser UNCOMMITTED).
      Hardcode magic string sin enum.
    lines: [10680, 10756]
    severity: "BAJA"
    cross_ref: "V-002 piloto, V-OV1-002, V-OV2-002"

mutaciones_de_estado:
  - tabla: "stock"
    operacion: "INSERT"
    via: "clsLnStock.Insertar(BeStockDestino) en CASO_#2 ELSE de cada loop"
    cantidad_filas_por_call: "1 fila (split fisico de 1 caja a UMBas)"
    severity: "ALTA — mismo patron que V-002 de Lista_Result, generalizado a todos los clientes"

  - tabla: "stock"
    operacion: "UPDATE"
    via: "clsLnStock.Actualizar_Cantidad(vStockOrigen)"
    descripcion: "Decrementa cantidad del stock origen post-split"

  - tabla: "stock"
    operacion: "DELETE"
    via: "clsLnStock.Eliminar_By_IdStock(vStockOrigen.IdStock)"
    descripcion: "Elimina stock origen si quedo cantidad 0 post-split"
    severity: "ALTA — eliminar IdStock dentro de funcion 'Reservar' es contraintuitivo"

  - tabla: "stock_res"
    operacion: "INSERT (multiple via Insertar y Inserta_Stock_Reservado)"
    via: "Insertar(BeStockRes) directo + Inserta_Stock_Reservado(lBeStockAReservar) batch"
    cantidad_filas_por_call: "variable, dependiendo de cuantas iteraciones Clavaud completaron"

  - tabla: "i_nav_ped_traslado_det"
    operacion: "UPDATE Quantity_Reserved_WMS"
    via: "clsLnI_nav_ped_traslado_det.Actualizar_Quantity_Reserved_WMS"
    condicion: "solo si pBeTrasladoDet presente (traslado NAV ERP)"

  - parametro: "pStockRes (ByRef)"
    operacion: "REPLACE — pStockRes = BeStockRes al final"
    line: 12804
    severity: "documentado en V-FROMR-006"

  - parametro: "pListStockResOUT (ByRef)"
    operacion: "MIX — append en algunos paths, replace en otros"
    severity: "documentado en V-FROMR-007"

  - parametro: "pCantidadDisponibleStock (ByRef)"
    operacion: "ASIGNA cuando dispara error S0002 (out parameter para mensajes contextualizados)"

callees_outbound:
  modulo_propio:
    - "clsLnStock.lStock — funcion central que devuelve stock disponible"
    - "Restar_Stock_Reservado_EJC — descuenta reservas existentes de la lista"
    - "clsLnStock.Insertar — INSERT fisico nuevo IdStock (split)"
    - "clsLnStock.Actualizar_Cantidad — UPDATE stock origen (decremento)"
    - "clsLnStock.Eliminar_By_IdStock — DELETE stock origen (si queda 0)"
    - "clsLnStock.Get_Single_By_IdStock — GET stock original pre-split"
    - "Inserta_Stock_Reservado — INSERT batch stock_res (helper privado del modulo)"
    - "Insertar — INSERT individual stock_res (helper privado del modulo)"
    - "Reserva_Stock_From_Reabasto — SELF (3 puntos de recursion)"
    - "Split_Decimal — helper para separar parte entera y decimal"
