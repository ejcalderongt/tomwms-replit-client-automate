id: "06-reserva-stock-from-reabasto"
title: "Reserva_Stock_From_Reabasto"
file: "TOMIMSV4/DAL/Transacciones/Stock_Reservado/clsLnStock_res_Partial.vb"
line_range: "L9856-L13108"
size_lines: 3253
classification: "ENTRY POINT alternativo / CALLEE recursivo — flujo de reserva durante reabasto"
documented_in: "Wave 12 sub-wave 12B-2, 2026-04-29 (deep mode)"
arquitectura: |
  Funcion mas grande y mas compleja del pipeline de reserva. Implementa explicitamente
  el ALGORITMO CLAVAUD con tres listas separadas (pallets completos, pallets en zona
  picking, resto), respeta granularmente la configuracion del propietario, ejecuta
  SPLIT FISICO de stock con markers de auditoria, y se llama a si misma 3 veces como
  fallback de degradacion gradual a unidades de medida basica.

signature:
  language: "VB.NET"
  declaration: |
    Public Shared Function Reserva_Stock_From_Reabasto(
        ByRef pStockRes As clsBeStock_res,
        ByVal DiasVencimiento As Double,
        ByVal MaquinaQueSolicita As String,
        ByVal pBeConfigEnc As clsBeI_nav_config_enc,
        ByRef pCantidadDisponibleStock As Double,
        ByVal pIdPropietarioBodega As Integer,
        ByRef pListStockResOUT As List(Of clsBeStock_res),
        ByRef lConnection As SqlConnection,
        ByRef ltransaction As SqlTransaction,
        Optional No_Linea As Integer = 0,
        Optional pTarea_Reabasto As Boolean = False,
        Optional ByVal pBeTrasladoDet As clsBeI_nav_ped_traslado_det = Nothing
    ) As Boolean

novedades_de_firma_vs_pipeline_anterior:
  - param: "pBeConfigEnc"
    novedad: "Recibe la config COMPLETA del propietario (no solo IdPropietario). Habilita lectura granular de flags."
  - param: "pCantidadDisponibleStock ByRef"
    novedad: "OUT parameter — devuelve cantidad disponible al caller cuando dispara error S0002 (para mensajes de error contextualizados)."
  - param: "No_Linea (Optional)"
    novedad: "Parametro CKFK20221019 'para poder enviar la linea para B&B'. Si > 0, se almacena en BeStockRes.Serial. Referencia a BYB pero NO es hardcode 1060315."
  - param: "pTarea_Reabasto (Optional)"
    novedad: "Flag que se propaga al call clsLnStock.lStock cambiando su comportamiento de busqueda."
  - param: "pBeTrasladoDet (Optional)"
    novedad: "Si esta presente, despues del INSERT actualiza Quantity_Reserved_WMS en el detalle del pedido traslado NAV ERP."

bloques:
  - id: "B1"
    line_range: "L9856-L9879"
    nombre: "Firma + init"
    descripcion: "Declara 50+ variables locales (cantidad, peso, presentacion, ubicacion, listas, flags). Init Reserva_Stock_From_Reabasto = False."

  - id: "B2"
    line_range: "L9880-L9945"
    nombre: "Lookup IdPropietario + DEBUG CODE EN PRODUCCION"
    descripcion: |
      Resuelve IdPropietario via clsLnPropietarios.Get_IdPropietario.
      ADVERTENCIA: contiene debug code hardcoded:
        If pStockRes.IdProductoBodega = 183 Then Debug.Print("Hola")  ' L9943
      Es V-FROMR-001 (debug muerto en produccion).

  - id: "B3"
    line_range: "L9947-L9988"
    nombre: "Carga lista inicial de stock + filtros tempranos"
    descripcion: |
      Llama clsLnStock.lStock (la funcion central que devuelve stock disponible).
      Llama Restar_Stock_Reservado_EJC para descontar reservas existentes.
      Filtra cantidades = 0. Setea vEncontroExistenciaEnPresentacion si encontro.

  - id: "B4"
    line_range: "L9990-L10025"
    nombre: "Calcula cantidad de tarimas completas Clavaud (zona picking)"
    descripcion: |
      Marker EJC202211081012: 'Buscar cantidad de tarimas por conservar zona de picking
      merhonsa clavaud'. Usa BePresentacionStock.CajasPorCama * CamasPorTarima para saber
      cuantas tarimas COMPLETAS pediria el pedido. Esto se usa despues para no fragmentar
      pallets innecesariamente.

  - id: "B5"
    line_range: "L10029-L10192"
    nombre: "Branch EXPLOSION AUTOMATICA (vSimplificado)"
    descripcion: |
      Si Explosion_Automatica O Explosion_Automatica_Desde_Ubicacion_Picking estan ON
      Y (no hay stock O pedido sin presentacion):
        - Carga producto y presentacion por defecto
        - Si no hay stock y pidio en unidades: marca para buscar de nuevo en presentacion
        - Si pidio en presentacion y no encontro: respeta Rechazar_pedido_incompleto
        - Re-llama clsLnStock.lStock con flag de explosion (parametro 8 = True)
        - Setea vRestoInventarioEnUmBas = True
      Multiples Throw Error_202302021127, Error_202212140140D, Error_202302021128.

  - id: "B6"
    line_range: "L10194-L10421"
    nombre: "Calculo cantidad solicitada segun presentacion + validacion exceso"
    descripcion: |
      Paralelo a Especifico ov1/ov2 pero MUCHO mas complejo:
        - Si IdPresentacion = 0: cantidad directa en UMBas
        - Si EsPallet: cantidad * (Factor * CajasPorCama * CamasPorTarima)
        - Si Explosion_Automatica ON: usa Split_Decimal y multiplica decimal por Factor
        - Sino: cantidad * Factor (con redondeos por control por peso)
      Despues valida: si solicitado > stock disponible, respeta Rechazar_pedido_incompleto
      o ajusta vCantidadSolicitadaPedido = vDisponibleStockEnPres (degradacion silenciosa).

  - id: "B7"
    line_range: "L10423-L10446"
    nombre: "Setup ALGORITMO CLAVAUD"
    descripcion: |
      Calcula vCantidadDispStock total. Setea vCantidadPendiente = vCantidadSolicitadaPedido.
      Si Conservar_Zona_Picking_Clavaud ON, particiona lBeStockExistente en dos sub-listas:
        lBeStockConPalletsCompletosClavaud = stocks con Pallet_Completo=True AND UbicacionPicking=False
        lBeStockConPalletsInCompletosClavaud = stocks con UbicacionPicking=True
      Esta es la implementacion EXPLICITA del algoritmo Clavaud en codigo.

  - id: "B8"
    line_range: "L10448-L11156"
    nombre: "LOOP 1 — Pallets Completos Clavaud (~709 lineas)"
    descripcion: |
      For Each vStockOrigen In lBeStockConPalletsCompletosClavaud.
      Cuerpo: validacion ubicacion + Continue For si supera Explosion_Automatica_Nivel_Max,
      luego CASO_#1 (cant pendiente == disp), CASO_#2B (decimal pres = 0 = multiplo exacto),
      CASO_#2 ELSE (split fisico de 1 caja a UMBas, INSERT nuevo stock con No_bulto=1989,
      decremento o eliminacion del stock origen, 2 stock_res creados con markers
      Uds_lic_plate=20220525 y =20220526).
      Termina con Exit For si vCantidadPendiente = 0.

  - id: "B9"
    line_range: "L11160-L11965"
    nombre: "LOOP 2 — Pallets Incompletos Clavaud (~785 lineas)"
    descripcion: |
      Estructura paralela a Loop 1 pero sobre lBeStockConPalletsInCompletosClavaud
      (los que ya estan en zona de picking). Mismos casos #1, #2B, #2 ELSE.
      Throw Error_202303101448E,F,G,H y Error_202302061305A,B con codigos diferenciados.

  - id: "B10"
    line_range: "L11982-L12725"
    nombre: "LOOP 3 — Stock Existente general (~740 lineas)"
    descripcion: |
      Estructura paralela. Recorre lBeStockExistente entero (no particionado).
      Es el fallback si Conservar_Zona_Picking_Clavaud esta OFF, o si los Loops 1-2
      no completaron la cantidad.

  - id: "B11"
    line_range: "L12729-L12823"
    nombre: "INSERT principal + RECURSION C (UMBas si quedo decimal)"
    descripcion: |
      Inserta_Stock_Reservado(lBeStockAReservar). Si Explosion_Automatica ON Y queda
      vCantidadDecimalUMBas > 0:
        - Crea BeStockResUMBas clonando BeStockRes
        - Llamada RECURSIVA a Reserva_Stock_From_Reabasto con BeStockResUMBas
        - Acumula resultado en vlBeStockAReservarUMBas
      pStockRes = BeStockRes (V-FROMR-006: muta el parametro de entrada por completo).
      pListStockResOUT = lBeStockAReservar (REPLACE — V-FROMR-007 inconsistencia).
      Reserva_Stock_From_Reabasto = True.

  - id: "B12"
    line_range: "L12825-L12985"
    nombre: "Branch alternativo + RECURSION B (cantidad pendiente con presentacion)"
    descripcion: |
      Si pStockRes.IdPresentacion <> 0 Y Explosion_Automatica Y vCantidadDecimalUMBas > 0:
        - Marca BeStockResUMBas con No_bulto = 1965 ('Identificacion para solicitud recursiva')
        - GUARD: solo si BeStockResUMBas.No_bulto = 0 antes (previene recursion infinita)
        - Llamada RECURSIVA
      Misma logica de pStockRes = BeStockRes / pListStockResOUT replace.

  - id: "B13"
    line_range: "L12987-L13007"
    nombre: "Validacion Despachar_existencia_parcial"
    descripcion: |
      Si Despachar_existencia_parcial = No: Throw S0004 con mensaje contextualizado
      (variante 'Sin pres' o con presentacion).

  - id: "B14"
    line_range: "L13008-L13099"
    nombre: "Branch fallback + RECURSION A (sin presentacion, hay que explosionar)"
    descripcion: |
      Si Explosion_Automatica ON Y pStockRes.IdPresentacion = 0 Y hay stock:
        - Marca BeStockResUMBas con No_bulto = 1965
        - GUARD: solo si BeStockResUMBas.No_bulto = 0 antes
        - Llamada RECURSIVA

  - id: "B15"
    line_range: "L13103-L13108"
    nombre: "Catch + End Try"
    descripcion: |
      Catch ex As Exception
          'Throw ex
          Throw ex
      End Try
      V-FROMR-004: Throw ex (vs Throw) PIERDE STACK TRACE original. Y NO agrega
      contexto de funcion como hacen otras funciones del pipeline.

algoritmo_clavaud:
  descripcion: |
    Conservar_Zona_Picking_Clavaud es una politica de ALMACENAMIENTO que dice:
    los pallets completos en zona DE ALMACENAMIENTO no deben fragmentarse mientras
    haya stock equivalente en zona DE PICKING. Esto preserva:
      - Eficiencia operativa (montacargas no debe romper pallets sellados)
      - Trazabilidad (pallet completo = lote unico, lote unico = sello del proveedor)
      - Ergonomia (zona picking diseñada para extraccion fragmentada)
  prioridad_legacy:
    - "1ro: Loop 1 sobre lBeStockConPalletsCompletosClavaud (Pallet_Completo=True AND NOT UbicacionPicking)"
    - "2do: Loop 2 sobre lBeStockConPalletsInCompletosClavaud (UbicacionPicking=True)"
    - "3ro: Loop 3 sobre lBeStockExistente entero (fallback general)"
  cross_ref: "ya documentado en brain/entities/modules/reservation/05-mi3-algoritmo-fefo-clavaud.md (modulo MI3) — Reabasto y MI3 comparten estrategia"

recursividad:
  cantidad: 3
  patron: "Degradacion gradual a unidades de medida basica (UMBas) cuando la presentacion no completa la cantidad pedida"
  guard_anti_loop: |
    Las recursiones B y A usan marker No_bulto = 1965 para identificarse.
    GUARD pre-recursion: 'If BeStockResUMBas.No_bulto = 0 Then ... mark = 1965 ... recurse'
    Si la recursion entrante ya viene marcada con 1965, NO recursiona mas.
    BUG ARQUITECTONICO: la recursion C (L12765, despues del INSERT principal) NO usa
    marker 1965 — usa vlBeStockAReservarUMBas como acumulador. Si esa recursion
    interna dispara recursion ulterior, no hay guard.
  puntos:
    - id: "RECURSION_A"
      line: 13041
      contexto: "Branch fallback: pStockRes vino sin presentacion y hay que explosionar"
      marker: "No_bulto = 1965"
    - id: "RECURSION_B"
      line: 12899
      contexto: "Branch alternativo: pStockRes con presentacion y queda decimal pendiente"
      marker: "No_bulto = 1965"
    - id: "RECURSION_C"
      line: 12765
      contexto: "Despues del INSERT principal exitoso: queda vCantidadDecimalUMBas > 0"
      marker: "ninguno (usa vlBeStockAReservarUMBas como acumulador)"
      bug: "Sin guard anti-loop"

split_fisico_de_stock:
  descripcion: "Igual patron que Reserva_Stock_Lista_Result (V-002 + V-003 ahi documentadas), pero generalizado a cualquier cliente"
  marcador_stock_creado: "No_bulto = 1989 (mismo marcador que Lista_Result BYB)"
  marcadores_stock_res_creados:
    - "Uds_lic_plate = 20220525 — 'tomado a partir de una caja explosionada'"
    - "Uds_lic_plate = 20220526 — 'tomado a partir de cajas de una solicitud en unidades'"
  pasos_dentro_loop_1_caso_2_else:
    - "1. Crear BeStockDestino con cantidad = (1 * Factor) UMBas, IdPresentacion = 0, No_bulto = 1989"
    - "2. Math.Abs(... - Fix(...)) check: validacion paranoica que cantidad sea entera"
    - "3. clsLnStock.Insertar(BeStockDestino) — crea fisicamente el nuevo IdStock"
    - "4. vStockOrigen.Cantidad = BeStockOriginal.Cantidad - (1 * Factor)"
    - "5. Si vStockOrigen.Cantidad > 0: clsLnStock.Actualizar_Cantidad — UPDATE"
    - "6. Si vStockOrigen.Cantidad <= 0: clsLnStock.Eliminar_By_IdStock — DELETE"
    - "7. Insertar(BeStockRes) — primer stock_res con marker Uds_lic_plate=20220525"
    - "8. Crear segundo BeStockRes para las cajas restantes (marker Uds_lic_plate=20220526)"
    - "9. Acumular ambos en lBeStockAReservar"
  hallazgo_clave: |
    Esto demuestra que el patron 'split fisico de stock dentro de funcion de RESERVA'
    NO es exclusivo del cliente BYB (como sugeria V-002 de Lista_Result). Es un patron
    SISTEMICO del modulo. La diferencia es que Reabasto lo activa por config
    (Explosion_Automatica + Conservar_Zona_Picking_Clavaud), mientras que Lista_Result
    lo activa por hardcode 1060315 (GAP-12-001).

