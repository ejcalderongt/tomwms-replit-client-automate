    line: 18321

  - id: "R-MI3-002"
    description: "State machine reanudable: Iniciar_En = 1/2/3 → Select Case → GoTo INICIAR_EN_X. Permite invocar MI3 desde un estado parcial."
    line: 19453
    severity: "ANTI-PATRON pero intencional"

  - id: "R-MI3-003"
    description: "Algoritmo Clavaud aplicado siempre que pBeConfigEnc.Conservar_Zona_Picking_Clavaud=True (igual que Reabasto, NO hardcoded)."
    config: "Conservar_Zona_Picking_Clavaud"

  - id: "R-MI3-004"
    description: "Respeta considerar_paletizado_en_reabasto (config ausente en otras funciones del pipeline)."
    config: "considerar_paletizado_en_reabasto"
    novedad: true

  - id: "R-MI3-005"
    description: "Respeta Interface_SAP — sugiere que MI3 discrimina behavior cuando el ERP es SAP."
    config: "Interface_SAP"
    novedad: true
    pendiente_validacion: "¿Que cambia exactamente cuando Interface_SAP=True? Hay que rg para ver las ramas."

  - id: "R-MI3-006"
    description: "Respeta Despachar_existencia_parcial (consistente con Lista_Result y Reabasto)."
    config: "Despachar_existencia_parcial"

  - id: "R-MI3-007"
    description: "Respeta Rechazar_pedido_incompleto (consistente con Reabasto)."
    config: "Rechazar_pedido_incompleto"

  - id: "R-MI3-008"
    description: "Respeta Explosion_Automatica + Explosion_Automatica_Desde_Ubicacion_Picking + Explosion_Automatica_Nivel_Max (igual que Reabasto)."

  - id: "R-MI3-009"
    description: "Audita cada path elegido en vNombreCasoReservaInternoWMS y persiste a i_nav_trans_pe_det_log_reserva via Agregar_Log_Reserva. Capacidad UNICA de MI3."

  - id: "R-MI3-010"
    description: "Recursion PresFaltante (L25900): si hay stock pero en presentacion distinta a la solicitada, recursa con BeStockResPresFalt para usarlo como fallback."

  - id: "R-MI3-011"
