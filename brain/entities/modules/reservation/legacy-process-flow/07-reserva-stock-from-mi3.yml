violaciones_y_bugs:
  - id: "V-MI3-001"
    description: |
      Debug code hardcoded en produccion:
      'If pStockResSolicitud.IdProductoBodega = 616 Then Debug.Print("Aqui " & DiasVencimiento)'.
      Equivalente al V-FROMR-001 pero con IdProductoBodega = 616 en vez de 183/82.
    line: 18313
    severity: "BAJA"

  - id: "V-MI3-002"
    description: |
      Uso intensivo de GoTo + labels (10+ labels distintas). Anti-patron de programacion
      estructurada moderna. Aunque permite reanudacion del proceso (intencional),
      vuelve el control de flujo extremadamente dificil de seguir. Cualquier refactor
      a .NET 8 con C#/F# debera usar metodos separados o state pattern explicito.
    severity: "ALTA — riesgo de mantenimiento"
    cross_ref: "no aparece en ninguna otra funcion del pipeline; MI3 es la unica con GoTo"

  - id: "V-MI3-003"
    description: |
      Magic numbers en ListaEstadosDeProceso: 100, 101, 102, 103. Sin enum o constante
      que documente que significan. Codigos opacos que dificultan debugging y trace.
    severity: "MEDIA"

  - id: "V-MI3-004"
    description: |
      Nombres de label CASI-IDENTICOS:
        EJC_202308081248_RESERVAR_DESDE_ZONA_NO_PICKING1
        EJC_202308081248_RESERVAR_DESDE_ZONA_NO_PICKING
      Diferenciados solo por sufijo '1'. Riesgo alto de error de mantenimiento (un dev
      futuro podria GoTo al equivocado y disparar bug logico). Tambien typo en el
      nombre de #Region: 'Reserverar' (doble 'r') en la 1ra iteracion vs 'Reservar'
      en la 2da.
    severity: "MEDIA"

  - id: "V-MI3-005"
    description: |
      BUG GRAVE en L26283:
        vMensajeNoExplosionEnZonasNoPicking = vMensajeNoExplosionEnZonasNoPicking = String.Format(...)
      Doble '=' — el segundo es comparacion (devuelve Boolean), el primero asigna ese
      Boolean a la variable. La intencion era CONCATENAR ('+=' o '&=' en VB.NET).
      Resultado: el mensaje de error nunca se concatena bien en este path, queda como
      String "True" o "False" segun comparison.
    line: 26283
    severity: "ALTA — bug funcional confirmado"
    sugerencia: "Cambiar a 'vMensajeNoExplosionEnZonasNoPicking &= String.Format(...)' o '+= ...'"

  - id: "V-MI3-006"
    description: |
      Catch generico (heredado de Reabasto): 'Catch ex As Exception | Throw ex | End Try'.
      Pierde stack trace original. NO agrega contexto via clsLnLog_error_wms.Agregar_Error
      como hacen las funciones del pipeline pre-Reabasto.
    line: 26336
    severity: "MEDIA"
    cross_ref: "V-FROMR-004"

  - id: "V-MI3-007"
    description: |
      Hardcode Indicador='PED' (estimado, requiere lectura puntual de cada Indicador-set).
      23 ocurrencias detectadas en sweep de anchors.
    severity: "MEDIA"
    cross_ref: "V-001 piloto, V-FROMR-002, V-OV1-001, V-OV2-001"
    pendiente_validacion: "Confirmar que las 23 son hardcode 'PED' (probable) o si hay alguna que use enum/variable."

  - id: "V-MI3-008"
    description: |
      Estado='UNCOMMITED' (typo persistente, magic string sin enum).
      29 ocurrencias detectadas en sweep.
    severity: "BAJA"
    cross_ref: "V-002 piloto, V-FROMR-009, V-OV1-002, V-OV2-002"

  - id: "V-MI3-009"
    description: |
      Acronimo opaco LLR en markers _LLR_CASO_#XX_. Sin documentacion en codigo.
      Dificulta interpretar logs de auditoria sin conocimiento tribal.
    severity: "BAJA"
    pendiente: "Q-MI3-02 (que significa LLR)"

