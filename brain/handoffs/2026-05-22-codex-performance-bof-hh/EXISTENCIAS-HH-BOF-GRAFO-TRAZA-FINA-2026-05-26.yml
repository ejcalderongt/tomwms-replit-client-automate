riesgos_principales:
  - "Errores de sintaxis SQL en conversión/aliases impactan pantalla HH/BOF."
  - "Filtros por nombre/lote sin parametrización pueden romper consulta."
  - "Confusión funcional entre licencia operativa de stock y licencia de packing."

mejoras_ya_existentes_detectadas:
  - "Corrección de sintaxis SQL (`Convert(Date, Fecha_Ingreso)`) y robustecimiento de filtros."
  - "Separación funcional de filtro por licencia packing en flujo de packing."

quick_wins:
  - "Estándar de filtros parametrizados en todas las variantes de consulta."
  - "Indicador visual de tipo de licencia aplicada (stock vs packing)."
  - "Métrica de tiempo por filtro y tamaño de resultado."
