  fecha: "2026-05-26"
  objetivo:
    - "Mapear flujo de consulta de existencias por ubicación, código y licencia."
    - "Separar claramente licencia de stock vs licencia de packing según proceso."

flujo:
  - "HH.EXI.ESCANEAR_UBICACION_O_CODIGO"
  - "WS.EXI.CONSULTA_STOCK"
  - "DAL.EXI.VW_STOCK_RES/consultas CI"
  - "HH/BOF render de lista detallada"

nodos:
  - id: "HH.EXI"
    capa: "HH"
    archivo: "app/src/main/java/com/dts/tom/Transacciones/ConsultaStock/frm_consulta_stock.java"
  - id: "WS.EXI"
    capa: "WSHHRN"
    archivo: "C:/Users/yejc2/source/repos/TOMWMS/WSHHRN/TOMHHWS.asmx.vb"
  - id: "DAL.EXI.STOCK"
    capa: "DAL"
