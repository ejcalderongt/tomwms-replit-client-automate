      capa: DAL
      tipo: class
      archivo: C:/Users/yejc2/source/repos/TOMWMS/TOMIMSV4/DAL/Inventario/InvCiclico/clsLnTrans_inv_ciclico_Partial.vb
      metodos_clave:
        - Actualiza_Inventario_Ciclico_Andr
        - Actualiza_Inventario_Ciclico_Reconteo
        - Actualiza_Conteo_Ciclico_Caja_Master_HH
