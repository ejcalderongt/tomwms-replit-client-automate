        - "Comparacion stock/conteo/reconteo."
        - "Regularizacion y cierre."
    - id: BOF.FRM_RECONTEO
      capa: BOF
      tipo: form
      archivo: C:/Users/yejc2/source/repos/TOMWMS/TOMIMSV4/TOMIMSV4/Transacciones/Inventario/frmReConteo.vb
      responsabilidad:
