meta:
  modulo: inventario_ciclico
  fecha: 2026-05-26
  autor: Codex
  objetivo: >
    Grafo fino end-to-end del proceso de inventario ciclico con reconteo y regularizacion,
    incluyendo HH, WebService, BOF, DAL y persistencia para acelerar diagnostico y cambios.
  enfoque_modelado:
    estrategia: "un solo archivo segmentado/ramificado"
    motivo:
      - "Permite ver de un vistazo el flujo cross-layer completo (HH->WS->DAL->BD->BOF)."
      - "Evita drift entre dos documentos separados para BOF y HH."
      - "Facilita impacto de cambios cuando una regla nace en HH y se materializa en DAL/BD."
    reglas_lectura:
      - "Segmentos por canal: HH, WS, BOF, DAL, BD."
      - "Cada nodo incluye archivo real y operacion principal."
      - "Aristas con condicion de negocio y datos que viajan."
  decision_funcional_vigente:
    caja_master:
      gate: Control_Talla_Color
      estado: vigente
      nota: "Mantener visibilidad/uso ligado a talla-color hasta nueva definición formal de negocio."

entradas_parametros_clave:
  bodega:
    - Control_Talla_Color
    - Control_Gondola
    - Crea_Presentacion_Conteo
    - Crea_Estado_Conteo
    - Crea_Ubicacion_Conteo
  inventario:
    - Idinventarioenc
    - Pendientes_vs_Contados
    - Reconteo_activo
  producto:
    - IdProductoBodega
    - IdProductoTallaColor
    - IdPresentacion
    - Factor
    - Lote
    - Fecha_vence
    - Licence_plate
    - CodigoSKU

