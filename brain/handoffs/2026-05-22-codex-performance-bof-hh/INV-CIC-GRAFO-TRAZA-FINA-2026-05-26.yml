    - id: DAL.INV_CIC_VW
      capa: DAL
      tipo: class
      archivo: C:/Users/yejc2/source/repos/TOMWMS/TOMIMSV4/DAL/Inventario/InvCiclico/clsLnTrans_inv_ciclico_vw_Partial.vb
      metodos_clave:
        - GetAllByInventarioEncOperador
        - Get_Detalle_Gondola_Ciclico
    - id: DAL.PRODUCTO
      capa: DAL
      tipo: class
      archivo: C:/Users/yejc2/source/repos/TOMWMS/TOMIMSV4/DAL/Mantenimientos/Producto/Producto/clsLnProducto_Partial.vb
      metodos_clave:
        - Get_List_Product_By_CodigoBarra_By_Cilcico

    # BD
    - id: BD.TRANS_INV_CICLICO
      capa: BD
      tipo: tabla
      nombre: trans_inv_ciclico
      columnas_relevantes:
        - idinvciclico
        - idinventarioenc
        - IdProductoBodega
        - IdUbicacion
        - IdUnidadMedida
        - IdPresentacion
        - IdProductoEstado
        - IdProductoTallaColor
        - lic_plate
        - gondola
        - cantidad
        - contado
        - cant_stock
        - cant_reconteo
        - peso
        - peso_reconteo
    - id: BD.TRANS_INV_RECONTEO
      capa: BD
      tipo: tabla
      nombre: trans_inv_reconteo
    - id: BD.TRANS_INV_ENC_RECONTEO
      capa: BD
      tipo: tabla
      nombre: trans_inv_enc_reconteo
    - id: BD.STOCK
      capa: BD
      tipo: tabla
      nombre: stock
    - id: BD.PRODUCTO_TALLA_COLOR
      capa: BD
      tipo: tabla
      nombre: producto_talla_color

  aristas:
    # HH -> WS
    - from: HH.INV_CIC_CONTEO
      to: WS.LISTAR_CONTEO
      accion: listar
      datos: [Idinventarioenc, IdOperador, Pendientes]
    - from: HH.INV_CIC_CONTEO
      to: WS.RECONTEOS
      accion: detectar_reconteo_activo
      datos: [Idinventarioenc]
    - from: HH.INV_CIC_CONTEO
      to: WS.BUSCAR_BARRA_CICLICO
      accion: resolver_producto_por_barra
      datos: [CodigoEscaneado, IdBodega, Idinventarioenc]
    - from: HH.INV_CIC_ADD
      to: WS.ACT_CONTEO
      accion: actualizar_conteo_linea
      datos: [IdInvCiclico, Cantidad, Presentacion, Estado, Ubicacion, Licencia, Gondola, IdProductoTallaColor]
    - from: HH.CAJA_MASTER
      to: WS.CAJA_MASTER
      accion: conteo_masivo_por_licencia
      condicion: "Control_Talla_Color = true (regla vigente)"
      datos: [lista(IdInvCiclico, IdProductoBodega, Idinventarioenc)]
    - from: HH.DETALLE_GONDOLA
      to: WS.DETALLE_GONDOLA
      accion: consultar_detalle
      datos: [Idinventarioenc, Gondola, IdBodega]

    # WS -> DAL
    - from: WS.LISTAR_CONTEO
      to: DAL.INV_CIC_VW
      accion: query_vista_consolidada
    - from: WS.RECONTEOS
      to: DAL.INV_CIC
      accion: listar_reconteos
    - from: WS.ACT_CONTEO
      to: DAL.INV_CIC
      accion: update_conteo
    - from: WS.ACT_RECONTEO
      to: DAL.INV_CIC
      accion: update_reconteo
    - from: WS.CAJA_MASTER
      to: DAL.INV_CIC
      accion: update_masivo_contado
    - from: WS.DETALLE_GONDOLA
      to: DAL.INV_CIC_VW
      accion: query_detalle_gondola
    - from: WS.BUSCAR_BARRA_CICLICO
      to: DAL.PRODUCTO
      accion: resolver_producto_ciclico

    # DAL -> BD
    - from: DAL.INV_CIC
      to: BD.TRANS_INV_CICLICO
      accion: read_write
    - from: DAL.INV_CIC
      to: BD.STOCK
      accion: conciliacion_stock_en_regularizacion
    - from: DAL.INV_CIC_VW
      to: BD.TRANS_INV_CICLICO
      accion: read
    - from: DAL.INV_CIC_VW
      to: BD.TRANS_INV_RECONTEO
      accion: read
    - from: DAL.INV_CIC_VW
      to: BD.PRODUCTO_TALLA_COLOR
      accion: read
    - from: DAL.PRODUCTO
      to: BD.TRANS_INV_CICLICO
      accion: filtro_existencia_en_inventario_actual
      condicion: "Idinventarioenc + IdProductoBodega + unidad"

    # BOF -> DAL
    - from: BOF.FRM_INVENTARIO
      to: DAL.INV_CIC
      accion: operaciones_admin_ciclico
    - from: BOF.FRM_INVENTARIO
      to: DAL.INV_CIC_VW
      accion: carga_grid_teorico_vs_conteo
    - from: BOF.FRM_RECONTEO
      to: DAL.INV_CIC
      accion: ajuste_reconteo_puntual
    - from: BOF.FRM_REGULARIZAR
      to: DAL.INV_CIC
      accion: regularizacion_masiva

subflujos:
  HH_conteo_basico:
    pasos:
      - HH.INV_CIC_CONTEO -> WS.LISTAR_CONTEO -> DAL.INV_CIC_VW -> BD.TRANS_INV_CICLICO
      - HH.INV_CIC_CONTEO -> WS.RECONTEOS
      - HH.INV_CIC_CONTEO -> HH.INV_CIC_ADD -> WS.ACT_CONTEO -> DAL.INV_CIC
  HH_reconteo:
    pasos:
      - HH.INV_CIC_CONTEO detecta reconteo activo (WS.RECONTEOS)
      - HH.INV_CIC_ADD actualiza valores de reconteo segun regla de diferencia
      - WS.ACT_RECONTEO / DAL.INV_CIC persisten reconteo
  HH_caja_master:
    gate: Control_Talla_Color
    pasos:
      - HH.INV_CIC_CONTEO filtra por Licence_plate
      - HH.CAJA_MASTER confirma lote
      - WS.CAJA_MASTER -> DAL.INV_CIC.Actualiza_Conteo_Ciclico_Caja_Master_HH
      - DAL marca contado y cantidad = cant_stock por línea
    riesgos:
      - "si lista vacía no validada, error índice"
      - "puede pisar conteos manuales si no se discrimina origen"
  BOF_regularizacion:
    pasos:
      - BOF.FRM_INVENTARIO/BOF.FRM_REGULARIZAR calcula diferencias teorico-conteo-reconteo
      - DAL.INV_CIC aplica ajustes sobre stock/transacciones
      - validacion posterior de consistencia

reglas_negocio_modeladas:
  - id: R-INV-CIC-001
    regla: "Caja Master visible/usable solo con Control_Talla_Color activo."
  - id: R-INV-CIC-002
    regla: "Conteo y reconteo persisten en UMBAS; presentación es vista/captura de usuario."
  - id: R-INV-CIC-003
    regla: "Si hay Control_Gondola, la línea debe conservar/validar gondola."
  - id: R-INV-CIC-004
    regla: "Escaneo por barra en ciclico debe acotarse al Idinventarioenc vigente."
  - id: R-INV-CIC-005
    regla: "Regularizacion BOF no debe ejecutarse sin precheck y postcheck."

puntos_finossensibles:
  - nombre: "Resolución producto por barra y unidad"
    riesgo: "Filtro estricto por unidad básica puede excluir presentaciones válidas."
    nodos: [WS.BUSCAR_BARRA_CICLICO, DAL.PRODUCTO]
  - nombre: "Caja Master overwrite"
    riesgo: "cantidad = cant_stock puede sobrescribir conteo manual."
    nodos: [WS.CAJA_MASTER, DAL.INV_CIC]
  - nombre: "Gate funcional de caja master"
    riesgo: "Cambiar gate sin acuerdo rompe contrato de negocio cliente."
    nodos: [HH.INV_CIC_CONTEO, HH.CAJA_MASTER]

