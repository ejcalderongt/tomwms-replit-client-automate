    # BOF
    - id: BOF.FRM_INVENTARIO
      capa: BOF
      tipo: form
      archivo: C:/Users/yejc2/source/repos/TOMWMS/TOMIMSV4/TOMIMSV4/Transacciones/Inventario/frmInventario.vb
      responsabilidad:
