    - id: HH.DETALLE_GONDOLA
      capa: HH
      tipo: activity
      archivo: C:/Users/yejc2/StudioProjects/TOMHH2025/app/src/main/java/com/dts/tom/Transacciones/InventarioCiclico/frm_detalle_gondola.java
