    - id: WS.ACT_CONTEO
      capa: WS
      tipo: webmethod
      archivo: C:/Users/yejc2/source/repos/TOMWMS/WSHHRN/TOMHHWS.asmx.vb
      metodo: Inventario_Ciclico_Act_Conteo_Andr
    - id: WS.ACT_RECONTEO
      capa: WS
      tipo: webmethod
      archivo: C:/Users/yejc2/source/repos/TOMWMS/WSHHRN/TOMHHWS.asmx.vb
      metodo: Inventario_Ciclico_Actualiza_Reconteo
    - id: WS.CAJA_MASTER
      capa: WS
      tipo: webmethod
      archivo: C:/Users/yejc2/source/repos/TOMWMS/WSHHRN/TOMHHWS.asmx.vb
      metodo: Inventario_Ciclico_Conteo_Caja_Master
    - id: WS.DETALLE_GONDOLA
      capa: WS
      tipo: webmethod
      archivo: C:/Users/yejc2/source/repos/TOMWMS/WSHHRN/TOMHHWS.asmx.vb
      metodo: Get_Detalle_Ciclic_By_Gondola
