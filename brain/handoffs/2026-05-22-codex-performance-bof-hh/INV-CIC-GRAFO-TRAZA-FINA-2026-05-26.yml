    - id: HH.CAJA_MASTER
      capa: HH
      tipo: activity
      archivo: C:/Users/yejc2/StudioProjects/TOMHH2025/app/src/main/java/com/dts/tom/Transacciones/InventarioCiclico/frm_conteo_caja_master.java
      responsabilidad:
