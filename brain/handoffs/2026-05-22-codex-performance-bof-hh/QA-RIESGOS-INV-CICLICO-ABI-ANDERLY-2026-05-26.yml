queries_sugeridas_validacion_post_fix:
  - nombre: "Lineas ciclico con unidad distinta a UMBas (para validar R003)"
    sql: |
      SELECT TOP 200 d.idinventarioenc, d.IdProductoBodega, d.IdUnidadMedida, p.IdUnidadMedidaBasica
      FROM trans_inv_ciclico d
      INNER JOIN producto_bodega pb ON pb.IdProductoBodega = d.IdProductoBodega
      INNER JOIN producto p ON p.IdProducto = pb.IdProducto
      WHERE d.IdUnidadMedida <> p.IdUnidadMedidaBasica
      ORDER BY d.idinventarioenc DESC;
  - nombre: "Conteos potencialmente pisados por caja master"
    sql: |
      SELECT TOP 200 idinventarioenc, idinvciclico, cantidad, contado, fec_mod, user_mod
      FROM trans_inv_ciclico
      WHERE contado = 1
      ORDER BY fec_mod DESC;
