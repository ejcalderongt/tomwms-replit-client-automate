hallazgos:
  - id: INV-CIC-R001
    severidad: alta
    categoria: crash
    checklist_relacionado:
      - "Regresion tecnica: filtros/escaneo no regresen errores de indice/lista vacia"
      - "Caja Master / reconteo"
    evidencia:
      archivo: "C:/Users/yejc2/StudioProjects/TOMHH2025/app/src/main/java/com/dts/tom/Transacciones/InventarioCiclico/frm_conteo_caja_master.java"
      lineas: [52]
      detalle: "Uso directo de ListaCajaMasterConteo.get(0) sin validar lista vacia."
    riesgo: "Si entra sin elementos (filtro no coincide o estado de lista cambia), revienta con IndexOutOfBounds."
    fix_propuesto:
      - "Validar null/empty antes de get(0)."
      - "Si vacia: toast + finish() controlado."

  - id: INV-CIC-R002
    severidad: alta
    categoria: crash
    checklist_relacionado:
      - "Escaneo por codigo normal/presentacion/SKU/talla-color"
      - "Regresion tecnica: errores de indice/lista vacia"
    evidencia:
      archivo: "C:/Users/yejc2/StudioProjects/TOMHH2025/app/src/main/java/com/dts/tom/Transacciones/InventarioCiclico/frm_inv_cic_conteo.java"
      lineas: [1296, 1297]
      detalle: "Valida lBeProducto.items != null, pero no valida items.isEmpty() antes de items.get(0)."
    riesgo: "Escaneo sin match real puede devolver lista vacia y romper flujo."
    fix_propuesto:
      - "Condicion robusta: lBeProducto != null && lBeProducto.items != null && !lBeProducto.items.isEmpty()."
      - "Fallback: mensaje claro + no cambiar seleccion actual."

  - id: INV-CIC-R003
    severidad: alta
    categoria: negocio
    checklist_relacionado:
      - "Escanear por codigo de presentacion debe resolver producto correcto del ciclico"
    evidencia:
      archivo: "C:/Users/yejc2/source/repos/TOMWMS/TOMIMSV4/DAL/Mantenimientos/Producto/Producto/clsLnProducto_Partial.vb"
      lineas: [11358, 11361, 11362]
      detalle: "Filtro EXISTS fuerza d.IdUnidadMedida = v.IdUnidadMedidaBasica."
    riesgo: "Puede excluir productos contados en unidad/presentacion distinta a UMBas, afectando escaneo por presentacion."
    fix_propuesto:
      - "Cambiar filtro a IdUnidadMedida del inventario segun producto escaneado o remover restriccion a UMBas."
      - "Si se mantiene restriccion, documentar que solo escaneo UMBas es valido (contradice checklist actual)."

  - id: INV-CIC-R004
    severidad: media
    categoria: negocio
    checklist_relacionado:
      - "Caja Master / reconteo: no sobreescribir cantidades manuales en escenarios mixtos"
    evidencia:
      archivo: "C:/Users/yejc2/source/repos/TOMWMS/TOMIMSV4/DAL/Inventario/InvCiclico/clsLnTrans_inv_ciclico_Partial.vb"
      lineas: [7966, 7967]
      detalle: "En caja master se fuerza Contado=True y Cantidad = Cant_stock para cada registro."
    riesgo: "Puede pisar conteos manuales previos si lista incluye lineas ya intervenidas."
    fix_propuesto:
      - "Agregar guard clause para no sobrescribir si ya tenia conteo manual valido (o bandera de origen CM)."
      - "Auditar por campo extra: origen_conteo = 'CM'/'MANUAL'."

  - id: INV-CIC-R005
    severidad: media
    categoria: flujo
    checklist_relacionado:
      - "Caja Master / reconteo"
      - "BOF/HH columnas claras y sin ambiguedad"
    evidencia:
      archivo: "C:/Users/yejc2/StudioProjects/TOMHH2025/app/src/main/java/com/dts/tom/Transacciones/InventarioCiclico/frm_inv_cic_conteo.java"
      lineas: [137, 140, 144]
      detalle: "Visibilidad de chkCajaMaster atada a gl.Control_Talla_Color."
    riesgo: "Si caja master aplica en productos sin talla/color, la opcion queda oculta indebidamente."
    fix_propuesto:
      - "Desacoplar visibilidad de CajaMaster de Control_Talla_Color."
      - "Controlarlo por parametro especifico (ej. Control_Caja_Master) o por existencia de licencia."

  - id: INV-CIC-R006
    severidad: baja
    categoria: calidad_datos
    checklist_relacionado:
      - "Escaneo SKU/talla-color consistente"
    evidencia:
      archivo: "C:/Users/yejc2/source/repos/TOMWMS/TOMIMSV4/DAL/Mantenimientos/Producto/Producto/clsLnProducto_Partial.vb"
      lineas: [11413]
      detalle: "lBeProducto.Distinct.ToList() en objetos sin comparer (posible deduplicacion no efectiva)."
    riesgo: "Resultados duplicados en retorno WS cuando hay combinaciones equivalentes."
    fix_propuesto:
      - "Deduplicar por llave de negocio (IdProductoBodega + IdProductoTallaColor)."

