# RES-016: Como RES-015 pero solicitado = 26: cubre alm completo y completa con picking
id: RES-016
version: 1
category: reservation
severity: high
title: "Como RES-015 pero solicitado = 26: cubre alm completo y completa con picking"
summary: |
  Mismo modelado que RES-015 con solicitado 26 UDS. Después de reservar 15 + 10 desde alm faltan 1 UDS, que debe tomarse desde picking.

requires_config:
  - Control_vencimiento: true
  - IdTipoRotacion: FEFO

input:
