notas:
  - fecha: "2026-05-21"
    area: "WebAPI MI3 payload reserva BYB EA-153304"
    detalle: >
      Para comparar WebAPI contra el baseline legacy correcto de BYB, se genero
      tools/webapi-mi3-reserva/mi3-salida-ea153304-webapi.json desde
      i_nav_ped_traslado_enc/det de EA-153304 reimportado desde NAV. El payload
      conserva las 29 lineas y 1370 unidades solicitadas, separadas en
      PV2-364400=19 lineas/690 y PV2-364399=10 lineas/680, pero resetea campos
      de proceso para entrada WebAPI: Status=0, Process_Result vacio,
      IdPedidoDet=0 y Quantity_Reserved_WMS=0. Tambien se genero
      tools/webapi-mi3-reserva/baseline-ea153304-legacy-summary.json con el
      resumen de interface legacy: 29/29 lineas completas y
      Quantity_Reserved_WMS=1370 antes de la eliminacion. Al intentar capturar
      snapshot detallado de trans_pe_det/stock_res, el documento ya habia sido
      eliminado/liberado en DB, por lo que no quedo evidencia exacta de lotes o
      IdStock legacy en archivo.
      Snapshot posterior capturado cuando Erik reimporto/reservo nuevamente:
      tools/webapi-mi3-reserva/baseline-ea153304-legacy-stockres.json contiene
      29 trans_pe_det, 48 filas stock_res, total interface=1370,
      total pedido_det=1370, total stock_res=12703 y 0 lineas sin stock_res.
      Este archivo queda como baseline fino para comparar Core despues de
      liberar/eliminar EA-153304 antes de ejecutar el payload WebAPI.
      Prueba Core con documento EA-153304WEBAPI: primero fallo contrato por
      Manufacturing_Process boolean y luego por Transfer_from_Code=1060315; el
      payload de corrida debe usar Manufacturing_Process=0 y
      Transfer_from_Code=BA0002 para BYB QA. Core reservaba inicialmente 903/1370
      porque las lineas CJ venian con Variant_Code vacio; se ajusto DALCore para
      resolver presentacion desde Unit_of_Measure_Code cuando Variant_Code viene
      vacio, y para usar la unidad basica del producto en stock_res cuando hay
      presentacion. Tambien se corrigio el bug identity de trans_pe_det en ambos
      overloads de Reservar_Stock_Por_Linea_Interface: despues de Insertar se
      propaga el IdPedidoDet identity real a pBePedidoDet y pBeStockRes antes de
      reservar, evitando stock_res huerfano en la primera linea tras deletes con
      identity adelantado.
  - fecha: "2026-05-21"
    area: "WebAPI/Core reserva MI3 BYB StockQueryStep single-query"
    detalle: >
      Fix de performance aplicado en StockQueryStep: antes consultaba lStock
      dos veces por cada linea (picking y no-picking) y ejecutaba
      Restar_Stock_Reservado dos veces, aunque lStock(false) ya trae todo el
      stock y el propio codigo lo filtraba despues. Ahora consulta lStock una
      sola vez con pExcluirUbicacionPicking=false, resta reservado una sola vez
      sobre la lista completa y separa picking/no-picking en memoria. Compila
      WMSWebAPI sin errores; quedan solo advertencias previas de nullability.
      Optimizacion posterior: en la interface se cachean producto, unidad de
      medida y presentacion por documento; StockReservationFacade pasa al
      pipeline el IdProducto y la presentacion ya resueltos para evitar
      consultas repetidas en Validation/EntityLoading; e
      Importar_Traslado_A_Tabla_Intermedia cachea bodega/config/producto-bodega
      y omite el Exist por linea cuando el encabezado es nuevo. Validacion local
      contra WebAPI BYB QA: documento EA153305F42028 respondio HTTP 200,
      Exito=true, 63 lineas, sin timeout, en 100.3s de cliente / 98.1s de
      servicio; la importacion intermedia bajo a 9.1s y el procesamiento WMS
      quedo en 87.4s.
      Fase 2 iniciada: se agrego StockReservationDocumentCache para reutilizar
      lStock/Restar_Stock_Reservado por documento y descontar en memoria las
      reservas ya insertadas del mismo documento. La premisa de validacion
      queda fija: comparar contra el Core/legacy listo usando EA-153305 con el
      mismo stock liberado; se agrego
      tools/webapi-mi3-reserva/comparar-mi3-reserva-documentos.sql para revisar
      linea por linea pedido_det, stock_res y cantidad reservada entre baseline
      y optimizado.
      Validacion con stock liberado indicada por Erik: documento EA153305O203916
      respondio HTTP 200 Exito=true en 85.6s cliente, 63 lineas,
      totalSolicitado=591.940478 y totalReservado API=804.547622. La BD quedo
      con 63 trans_pe_det, 77 stock_res y 9833.000034 unidades reales. Se
      detecto y corrigio un bug del DTO de respuesta: Get_Detalles_Reserva
      unia stock_res por IdProductoBodega, duplicando reservas en productos
      repetidos; ahora une por IdPedidoDet + IdTransaccion. Se agrego
      tools/webapi-mi3-reserva/diagnosticar-mi3-reserva-documento.sql para
      auditar no-reservas/parciales por documento. Casos actuales no completos:
      lineas 10000/20000/30000 sin stock aplicable; linea 70000 parcial con
      42 unidades = 7 CJ; linea 370000 sin stock aplicable para 00050608.
  - fecha: "2026-05-21"
    area: "WebAPI/Core reserva MI3 BYB performance trace"
    detalle: >
      Se agrego tracelog de performance para reserva MI3 en WebAPI/Core:
      #MI3_PERF_API_*, #MI3_PERF_SERVICE_*, #MI3_PERF_IF_* y
      #MI3_PERF_SQL/#MI3_PERF_STEP_* en el pipeline. El trace se escribe en
      consola y en WMSWebAPI/bin/Debug/net10.0/Logs/reserva-mi3-trace-YYYYMMDD.txt.
      La corrida EA-153305-TRACE2-200235 completo server-side en 205.7s, pero
      el cliente corto y ASP.NET registro 499. No hubo loop infinito: las 63
      reservas terminaron en 1 iteracion por linea. El cuello inicial era
      clsLnStock_res.Restar_Stock_Reservado: hacia consulta por cada IdStock
      candidato y llego a 15-61s por linea. Se optimizo para consultar
      stock_res agrupado por batches de IdStock y cachear presentaciones; tras
      el cambio RestarStockReservadoPicking/NonPicking bajo aprox. a 130-250ms
      por llamada. Queda pendiente optimizar la capa interface por linea
      (producto, UM, presentacion, estado, updates de status/process_result),
      que aun deja la corrida completa alrededor de 3.4 min para 63 lineas.
      Optimizacion adicional aplicada despues del trace: la interface cachea
      bodega, propietario y estado de producto por documento; Inserta_Linea
      reutiliza producto/UM/presentacion ya resueltos y evita la consulta de
      talla/color cuando ambos valores vienen vacios. Compila; falta corrida
      completa limpia posterior para medir el nuevo total.
  - fecha: "2026-05-21"
    area: "WebAPI/Core reserva MI3 BYB optimizaciones legacy"
    detalle: >
      Al probar EA-153305-WAPI01 en WebAPI/Core aparecia spam de debug
      "El pallet esta completo..." desde clsLnStock_res.Restar_Stock_Reservado
      y el pipeline no tenia todas las defensas legacy #EJC20260520_RESERVA_BYB_FIX.
      Se homologo en Core: las decisiones del loop usan listas normalizadas con
      Cantidad > 0; las fechas minimas se resetean a 1900 si una zona queda sin
      cantidad util; si NonPicking tiene FEFO mas viejo pero requiere explosion
      y picking cubre la solicitud, se fuerza picking como en legacy; se removio
      el Debug.WriteLine por IdStock; y clsLnStock_res.Insertar ahora omite
      Cantidad <= 0 y recorta contra el pendiente real de trans_pe_det solo
      cuando la linea esta en UM base (IdPresentacion NULL/0).
  - fecha: "2026-05-21"
    area: "WebAPI/Core log_error_wms identity"
    detalle: >
      En EA-153305-WAPI01, al registrar fallo de reserva la WebAPI lanzo
      "Cannot insert explicit value for identity column ... log_error_wms".
      Validado en BYB QA: dbo.log_error_wms.IdError tiene IsIdentity=1. Se
      ajusto EntityCore para marcar IdError como Key/Identity y DALCore para
      omitir IdError en los inserts de clsLnLog_error_wms. Tambien se quitaron
      asignaciones MaxID+1 en la interface de traslado y StockReservationFacade;
      update/select siguen usando IdError como llave.
  - fecha: "2026-05-21"
    area: "WebAPI MI3 traslado BYB Variant_Code presentacion"
    detalle: >
      En WebAPI/Core para EA-153305-WAPI01, la linea 00020502 fallo con
      "La Presentacion de producto no existe ... CJ". En BYB QA
      IMS4MB_BYB_QAS2 la presentacion si existe: IdPresentacion=7,
      producto_presentacion.codigo=00020502, nombre=CJ, factor=96. La causa
      era que Get_Presentacion_By_IdProductoBodega_And_CodPres buscaba solo
      pp.codigo=@Variant_Code. Se ajusto WMS.DALCore para aceptar codigo o
      nombre, priorizando codigo, y el armado de stock_res ahora tambien hace
      fallback por nombre cuando Variant_Code corresponde a la presentacion.
  - fecha: "2026-05-20"
    area: "BYB MI3 reserva baseline EA-153305 00444100"
    detalle: >
      En la corrida de C:\Users\yejc2\Downloads\Erores_WMS_140526_media para
      pedido 37320 / EA-153305 se establecio una linea base reproducible:
      63 payloads analizados, 59 OK y 4 FALSE. Las lineas ya OK deben quedar
      como punto de retorno para futuras pruebas. Pendientes focales:
      00020502 linea 10000, 00140702 linea 20000 y 00444100 lineas 300000 y
      600000. Para 00444100 no hay falta de stock: la traza encontro 13 stocks
      en picking y 2044 UMBas disponibles; el fallo real es el constraint
      Cons_restriccion en stock_res ([cantidad] > 0), lo que indica un camino
      que intenta insertar una reserva con cantidad 0 o negativa despues de la
      normalizacion CJ -> UMBas (7.75 CJ = 31 UNI, 7.25 CJ = 29 UNI).
      Se dejo script de diagnostico en
      tools/diagnostics/byb-reserva-ea153305-baseline.sql para comparar payload,
      trans_pe_det y stock_res sin tocar datos.
      Correccion aplicada: en Reserva_Stock_From_MI3 se corta el loop final de
      candidatos cuando vCantidadPendiente ya es 0, evitando que una segunda
      iteracion intente insertar stock_res con cantidad 0; ademas
      Inserta_Stock_Reservado omite y traza candidatos con Cantidad <= 0 como
      defensa general antes del CHECK de SQL. DAL compilo en Debug|x86 con
      BuildProjectReferences=false; la compilacion completa sigue bloqueada por
      PerceptronUbicacion.csproj sin OutputPath Debug|x86.
      La corrida posterior 18:22 siguio fallando con Cons_restriccion y no
      genero el evento stock_res_omitido_cantidad_no_positiva, demostrando que
      el candidato invalido entraba por llamadas directas a
      clsLnStock_res.Insertar(BeStockRes), antes del helper de lista. Se agrego
      defensa en clsLnStock_res.Insertar para omitir y trazar
      stock_res_insertar_omitido_cantidad_no_positiva cuando Cantidad <= 0,
      evitando rollback por un candidato agotado posterior a reservas validas.
      Nueva meta posterior: 00444100 ya reserva pero la linea 300000 quedo
      sobre-reservada por duplicidad del mismo IdStock 778392 en CASO_#6 y
      CASO_#7. La meta correcta para EA-153305 es linea 300000 = 31 y linea
      600000 = 29. Se agrego en clsLnStock_res.Insertar un ajuste transaccional
      por IdPedidoDet que compara trans_pe_det.Cantidad contra SUM(stock_res)
      ya insertado; si el candidato excede el pendiente se recorta, y si ya no
      hay pendiente se omite. Esto evita que casos consecutivos del mismo flujo
      de explosion sobre-reserven una linea ya satisfecha.
      Ajuste posterior por stepback: ese tope solo debe aplicar cuando
      trans_pe_det.IdPresentacion esta NULL/0, porque ahi la linea ya esta
      normalizada a UM base. En lineas con presentacion (CJ, etc.) la cantidad
      de trans_pe_det y los candidatos de stock_res pueden estar en semanticas
      distintas durante la conversion, por lo que topar ahi puede producir
      reservas decimales como 0.104167/10.41667. La defensa quedo acotada a UM
      base para conservar el fix de 00444100 sin afectar presentaciones.
      Validacion funcional posterior confirmada por Erik: tras cerrar/reabrir
      WMS con el DAL actualizado, el payload EA-153305 se considera exitoso.
      Al revisar los YAML disponibles en
      C:\Users\yejc2\Downloads\Erores_WMS_140526_media, la ultima tanda escrita
      en disco seguia siendo 18:42/18:43 y corresponde al binario previo:
      63 lineas, 62 OK, 1 FALSE (00020502) y ajustes indebidos aun visibles en
      lineas con presentacion. Para auditoria futura, no usar esos YAML como la
      evidencia final del exito si no se genera una tanda mas nueva. En las 62
      lineas OK de esa tanda, Quantity/PedidoDet_Cantidad/StockRes_Cantidad
      coinciden, por lo que las cantidades parciales del payload que si quedaron
      OK eran consistentes; el problema residual de esa tanda era la linea falsa
      y los eventos de ajuste del binario viejo.
  - fecha: "2026-05-20"
    area: "Legacy VB MI3 reserva BYB 00050608 NULL presentacion"
    detalle: >
      En EA-153305 item 00050608 las lineas 70000 y 370000 entraban con
      Variant_Code=CJ, se convertian a UMBas y quedaban con IdPresentacion=0,
      pero Atributo_Variante_1 seguia lleno. clsLnStock.lStock armaba entonces
      stock.idpresentacion=@idpresentacion, lo que no encontraba stock UMBas
      base porque en BYB esos registros tienen IdPresentacion NULL, no 0. En
      QA habia stock elegible en #5042 (ej. IdStock 778759/778758/778362/778357)
      con ubicacion_picking=1, nivel=1 y vencimiento valido. Se ajusto lStock y
      lStock_SAP con #EJC20260520_RESERVA_BYB_FIX para que cuando la solicitud
      esta en UMBas (IdPresentacion=0) busque stock.idpresentacion IS NULL OR 0,
      aunque venga Variant_Code. El stock de #10350 con 42 UNI/7 CJ existe pero
      esta en no-picking nivel 2 y no debe usarse para explosion.
  - fecha: "2026-05-20"
    area: "Legacy VB reserva BYB fix #EJC20260520_RESERVA_BYB_FIX"
    detalle: >
      En clsLnStock_res_Partial se marco cada cambio con
      #EJC20260520_RESERVA_BYB_FIX para cherry-pick y homologacion posterior
      en .NET Core. Cambios: se agregaron helpers Stock_Disponible_MI3,
      Cantidad_Stock_Disponible_MI3 y Picking_Cubre_NoPicking_NoExplosionable_MI3
      para decidir por cantidad util y no por filas; despues de Restar_Stock_Reservado
      el fallback picking y ALM/no-picking descartan filas con Cantidad <= 0 antes
      de calcular FEFO; la regla de "picking cubre no-picking no explosionable"
      se centralizo; y se agrego una segunda defensa despues del recalculo FEFO
      para evitar retornos falsos SOLO_NO_PICKING_SIN_EXPLOSION cuando picking
      cubre la solicitud. Se declaran variables fuera del bloque con etiqueta
      ANALIZAR_FECHAS_DE_VENCIMIENTO por restricciones VB con GoTo y lambdas.
  - fecha: "2026-05-20"
    area: "CEALSA HH recepcion detalle identity"
    detalle: >
      En CEALSA QAP se corrigieron datos de recepcion donde stock_rec quedo
      sin IdRecepcionDet valido: 163 stock_rec huerfanos fueron reatados a
      trans_re_det y para la recepcion 17140 se reconstruyeron 2 detalles
      faltantes desde stock_rec/OC. El hueco de codigo estaba en
      clsLnTrans_re_det.Guarda_Trans_re_det: el overload por lista ponia el
      detalle en 0 tras el cambio a identity y no reasignaba el identity real
      a stock_rec. Blindaje aplicado: propagar el IdRecepcionDet identity a
      stock_rec, cortar GuardarHH_S/GuardarHH_BOF si no se obtiene identity y
      rechazar Guarda_Stock_Rec cuando una recepcion intenta guardar stock_rec
      sin IdRecepcionDet.
  - fecha: "2026-05-20"
    area: "BYB MI3 reserva diagnostico corrida 162325"
    detalle: >
      La corrida de trazas en
      C:\Users\yejc2\Downloads\reserva-mi3-20260520-162325 para pedido 37320
      dejo 29 lineas: 18 OK y 11 FALSE. Patron principal: hay stock en picking,
      pero FEFO detecta vencimiento mas viejo en ALM/no-picking y el flujo
      termina priorizando no-picking, donde no puede explosionar, aunque picking
      cubre la solicitud. Ejemplo 00232538 linea 130000: solicitud 62 UMBas,
      fallback picking encontro 83 stocks / 1296 unidades, pero ALM/no-picking
      tenia fecha minima menor y la reserva finalizo FALSE. El codigo local ya
      contiene defensa #EJCCKFK20260520 alrededor de
      clsLnStock_res_Partial.vb:19303, pero en los YAML no aparecio el evento
      fallback_picking_por_no_picking_no_explosionable, por lo que esa corrida
      probablemente no uso ese binario o la condicion aun no esta entrando.
      Caso especial 00050608: fallback picking trae 17 stocks en presentacion,
      Restar_Stock_Reservado los deja con cantidad 0, y luego el flujo reutiliza
      lBeStockExistenteZonaPicking por tener registros aunque no cantidad,
      bloqueando el fallback UMBas picking con conmutar. En QA si hay UMBas
      disponibles en picking, por ejemplo IdStock 778078 con 1000 UNI en
      ubicacion #5042. Blindaje pendiente: tratar listas con registros pero
      Cantidad <= 0 como vacias antes de decidir reutilizarlas, para permitir
      continuar al fallback correcto.
  - fecha: "2026-05-20"
    area: "Legacy VB picking reversa ubicacion staging"
    detalle: >
      En CEALSA se diagnostico que licencias como KA000329 podian quedar en la
      ubicacion picking/staging 4149 antes de una reserva posterior, aun cuando
      el picking actual no tuviera cantidad recibida/verificada/despachada. La
      causa probable esta en caminos de reversa/liberacion que borran
      picking_ubic o movimientos auxiliares sin restaurar stock.IdUbicacion a
      stock.IdUbicacion_anterior cuando no hubo ejecucion fisica que preservar.
      Se agrego el helper
      clsLnTrans_picking_ubic.Restaurar_Ubicacion_Stock_Picking_No_Ejecutado,
      invocado antes de limpiar evidencia en Marcar_Linea_No_Verificada y en
      liberaciones de producto no pickeado; solo actua si el picking ubic no
      tiene cantidad recibida, verificada ni despachada y el stock vivo sigue en
      la ubicacion picking configurada. La validacion quedo endurecida para no
      restaurar si el mismo IdStock tiene otro picking_ubic activo con cantidad
      recibida, verificada o despachada.
  - fecha: "2026-05-20"
    area: "Legacy VB MI3 reserva continua por ubicacion"
    detalle: >
      En Reserva_Stock_From_MI3 para BYB/EA-153304 item 00050608, una ubicacion
      no apta para explosion (ej. #5042) no debe cortar la evaluacion completa
      cuando rechazar_pedido_incompleto=No. El flujo debe registrar el motivo
      y continuar con el siguiente stock/ubicacion candidato; asi no obvia
      existencias posteriores como presentacion disponible en otra ubicacion.
  - fecha: "2026-05-20"
    area: "WebAPI DALCore stock identity"
    detalle: >
      En WMS.DALCore stock.IdStock debe tratarse como identity: clsLnStock.Insertar
      e Insertar_3pl insertan sin mandar idstock, usan Ins.SQLIdentity("IdStock"),
      asignan el identity al objeto y retornan el IdStock real. Los updates de
      stock no deben incluir IdStock en el SET, solo en el WHERE. En recepcion,
      cualquier FK posterior a stock_parametro/stock_se debe usar el identity
      retornado por Insertar, no MaxID()+1. En reserva/salidas Core la explosion
      UMBas no crea stock destino; stock_res.IdStock se llena desde el stock
      existente que se esta reservando.
  - fecha: "2026-05-20"
    area: "SAPSYNCMAMPA visor log interface"
    detalle: >
      Se agrego en SAPSYNCMAMPA un visor WinForms RibbonForm para el log de
      interface basado en i_nav_ejecucion_enc, i_nav_ejecucion_res e
      i_nav_ejecucion_det_error. La consulta estructurada vive en
      clsLnI_nav_ejecucion_enc.GetLogEjecucionesDataSet y devuelve DataSet con
      relaciones Encabezado -> Resultados y Encabezado -> Errores para un grid
      expandible. El formulario frmLogEjecucionesInterface incluye filtros por
      fecha, transaccion/idnavconfigdet/proceso y texto libre; se abre desde el
      menu principal de SAPSYNCMAMPA como "Log Ejecuciones".
  - fecha: "2026-05-20"
    area: "Legacy VB bitacora enc/res/det identity"
    detalle: >
      Las tres tablas del log de interface quedaron alineadas al script de
      identity: i_nav_ejecucion_enc, i_nav_ejecucion_res e
      i_nav_ejecucion_det_error insertan sin mandar la PK, usan
      Ins.SQLIdentity(<pk>), asignan el identity al objeto y lo retornan. Se
      eliminaron los metodos MaxID/Max_IdEjecucionRes de las clases de bitacora
      y se quitaron los precalculos en SAPSYNCMAMPA y en los flujos de pedido
      compra/traslado; res y det_error toman el IdEjecucionEnc ya devuelto por
      el insert real del encabezado.
  - fecha: "2026-05-20"
    area: "Legacy VB bitacora detalle error identity"
    detalle: >
      i_nav_ejecucion_det_error se adapto para llave identity:
      clsLnI_nav_ejecucion_det_error.Insertar e Insertar_From_Interface ya no
      insertan idejecuciondet manualmente ni usan MaxID()+1 desde Inserta_Log.
      Ambos usan Ins.SQLIdentity("idejecuciondet"), ExecuteScalar, copian el
      nuevo Idejecuciondet al objeto y retornan el identity. No se encontraron
      usos activos donde idejecuciondet se use como FK despues del insert; las
      relaciones de bitacora siguen por idejecucionenc/idnavconfigdet.
  - fecha: "2026-05-20"
    area: "SAPSYNCMAMPA TRANSAC_WMS traza operativa"
    detalle: >
      clsSyncTransacWMS fase 1 debe tratar cada documento de TRANSAC_WMS con
      traza por contexto: PROCESO, TIPO_DOC, NOENC, REF, DOCENTRY, ETAPA,
      RESULTADO, CAUSA y MSG. Los fallos por documento se registran best-effort
      en i_nav_ejecucion_det_error/log_error_wms y se intentan devolver a SAP
      Service Layer con U_Procesado_WMS=2 y U_Process_Result resumido; los
      exitos siguen marcando U_Procesado_WMS=1 y ahora tambien U_Process_Result.
      No cambiar reglas de negocio de reserva/picking/ajustes en esta fase.
  - fecha: "2026-05-20"
    area: "Legacy VB bitacora interface identity"
    detalle: >
      i_nav_ejecucion_res se adapto en DAL legacy para llave identity:
      clsLnI_nav_ejecucion_res.Insertar/InsertarFromIn ya no insertan
      idejecucionres manualmente; usan Ins.SQLIdentity("idejecucionres"),
      ExecuteScalar y copian el nuevo IdEjecucionRes al objeto para que los
      updates posteriores usen la llave real. En los flujos TOMIMSV4 de pedido
      compra y pedido traslado se quito el pre-cálculo Max_IdEjecucionRes; en
      traslado IdNavConfigDet queda explícito como 102 (pedido cliente) y ya no
      se deriva accidentalmente de IdEjecucionRes.
  - fecha: "2026-05-20"
    area: "Brain gestion de agentes"
    detalle: >
      Brain ya define un modelo de gestion de agentes en
      brain/agents/: coordinador central + paquetes YAML por dominio, no varios
      agentes runtime independientes. Para tareas complejas, Mary Jane/Codex
      debe leer brain/agents/_index.yml y coordinator.yml, matchear triggers y
      cargar solo los domain-*.yml necesarios. Mapeo rapido: reserva/no-reserva
      MI3 usa domain-reserva + domain-database + cliente; indicadores/KPI usa
      domain-indicadores + domain-integration-services + domain-database y
      eventualmente domain-portal; WinForms BOF usa domain-bof; HH Android usa
      domain-hh-android + domain-integration-services. Regla clave: no cargar
      todo wms-brain ni crear taxonomias paralelas; los domain YAML son indices
      y entry-points hacia handoffs/patterns.
  - fecha: "2026-05-19"
    area: "SAP HANA SL estados picking MAMAPA"
    detalle: >
      Se agrego flujo cherry-pickable etiquetado con
      #EJCCKF20260519_Notificar_SAP_Hana_MAMAPA para notificar estados SAP HANA
      SL en MAMAPA sin romper la operacion local WMS. En frmPicking, al crear
      picking se notifica estado 2=Asignado y al anular picking se notifica
      estado 1=Nueva/disponible para reasignar. En WSHHRN/TOMHHWS, HH notifica
      estado 3=Pickeando al primer pickeo real, 4=Pickeado al finalizar picking,
      5=Verificando al primer registro de verificacion, y 6=Verificado al
      finalizar verificacion; si el picking tiene verificacion automatica, el
      cierre de picking avanza tambien a 6. En frmPedido_List y frmPedido, los
      flujos exitosos de anular/eliminar pedido notifican estado 11=Anulada
      para documentos Factura_Deudor/Factura_Reserva_Cliente compatibles con
      Cambiar_Estado_Traslado_SLAsync. Estados documentados: 1 Nueva,
      2 Asignado, 3 Pickeando, 4 Pickeado, 5 Verificando, 6 Verificado,
      8 Cerrada/entregada, 11 Anulada y 12 Back order. Las llamadas a SAP
      quedan protegidas con try/catch y log_error_wms_pick/log_error_wms_pe
      para no abortar el flujo local si SAP falla.
