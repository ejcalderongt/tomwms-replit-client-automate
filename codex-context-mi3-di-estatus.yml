      VW_Indicador_Picking_Detalle, VW_Tiempos_Picking_Operador, los tableros XML
      Indicador_Picking, Progreso_Picking_By_Operador y
      Productividad_Picking_Por_Operador, y el SQL de
      WMSWebAPI.Services.KPI.KpiReportService.GetPickingAsync. Se agregaron en
      clsLnTrans_pe_det metodos seguros para consultar KPI picking por
      IdPedidoEnc/IdBodega y tiempos por operador; frmPedido_List ahora abre el
      drilldown con pestanas Progreso pedido, KPI portal y Tiempos cuando hay
      datos. La lista principal sigue opt-in por chkMostrarIndicadores para no
      cargar consultas costosas en el flujo normal.
  - fecha: "2026-05-19"
    area: "Legacy VB drilldown indicadores pedido fase visual"
    detalle: >
      frmPedido_List.Mostrar_Indicadores_Pedido evoluciono a tablero operativo:
      header con totales, seis tarjetas compactas para picking, verificacion,
      despacho, tiempo promedio pick-verif, operadores y reprocesos, grids con
      formato numerico/fechas, summaries, agrupacion por operador y coloreo por
      diferencia, porcentaje y reemplazos. Se agregaron pestanas Operadores y
      Reprocesos construidas en memoria a partir de Progreso pedido y KPI portal.
      clsLnTrans_pe_det.Get_KPI_Picking_Portal_By_IdPedidoEnc_And_IdBodega ahora
      expone Lic_Plate_Reemplazo, IdStock_Reemplazo e IdUbicacion_Reemplazo desde
      trans_picking_ubic para detectar reprocesos/reemplazos sin cambiar la
      logica de picking. Build DAL y WMS Debug pasaron; WMS mantiene warnings
      existentes de referencias/versiones System.Text.Json y metadata publish.
  - fecha: "2026-05-19"
    area: "Analitica portal React/Replit para Forms"
    detalle: >
      Erik aclaro que "portal" se refiere al React publicado en
      https://tomwmsreact-dtsolutionsgt.replit.app/ y no a los tableros XML
      legacy. Se inspecciono el bundle React y se confirmaron endpoints
      /kpi/Kpi/picking, /verificacion, /recepcion, /despacho,
      /tendencias/despacho, /tendencias/operacion/heatmap-diahora y
      /stock/res, soportados localmente por WMSWebAPI.Controllers.KpiController
      y WMSWebAPI.Services.KPI.KpiReportService. No se debe consumir el endpoint
      publicado de Replit directamente desde frmPrincipal02 ni agregar un tab
      nuevo sin validar antes la estrategia: la direccion correcta es replicar
      la inteligencia usando WebAPI/servicios propios o consultas locales
      controladas. Hallazgo: GetPickingAsync recibe from/to pero su SQL actual
      no aplica esos parametros, a diferencia de otros endpoints; revisar como
      mejora quirurgica porque puede cargar muchos datos aunque el usuario
      seleccione un rango corto.
  - fecha: "2026-05-19"
    area: "Legacy VB drilldown pedido resumen visual"
    detalle: >
      frmPedido_List.Mostrar_Indicadores_Pedido ahora abre primero una pestana
      "Resumen visual" antes de los grids. Incluye ChartControl DevExpress para
      productividad por operador/rol, linea de tiempo de eventos del pedido
      (picking, verificacion, despacho cuando existan fechas validas), comparativo
      solicitado/picking/verificacion/despacho y panel de operadores/roles. Los
      grids de Progreso pedido, Operadores, Reprocesos, Detalle picking y
      Tiempos se mantienen como drilldown de soporte. La pestaña ya no usa el
      nombre KPI portal para no sugerir consumo externo; sigue usando datos
      locales. Las cantidades del tablero, graficas y footers toman formato
      parametrizado por empresa si existe una propiedad de decimales en AP.Empresa
      y, si no, caen a AP.Bodega.Permitir_Decimales (2 o 0 decimales para
      dashboard, evitando mostrar 6 decimales operativos cuando no aportan).
      Se ampliaron captions, sumatorias operativas y group footers; el resumen
      visual ahora muestra estado global del pedido por etapa y ranking real de
      operadores ordenado por cantidad procesada. Ajuste posterior: los grids
      del drilldown agregan una barra explicita de totales visibles bajo el grid,
      Operadores incluye Rank y % orden (participacion contra el total solicitado
      del pedido), y el detalle picking no se mezcla en el ranking si ya existe
      Progreso pedido para evitar duplicar la productividad. Build a OutDir
      temporal paso.
  - fecha: "2026-05-20"
    area: "Legacy VB reserva stock identity IdStock"
    detalle: >
      En clsLnStock_res_Partial se corrigio el patron de explosion de stock
      donde BeStockDestino.IdStock se inicializaba en 0 por identity y
      BeStockRes.IdStock se copiaba antes de clsLnStock.Insertar. La reserva
      debe asignar BeStockRes.IdStock despues del insert de BeStockDestino,
      porque clsLnStock.Insertar actualiza el objeto con el identity real.
  - fecha: "2026-05-20"
    area: "Legacy VB MI3 reserva picking vs ALM"
    detalle: >
      En Reserva_Stock_From_MI3, cuando el fallback encuentra stock ALM/no
      picking mas antiguo por FEFO pero ese stock requiere explosion no
      permitida y la zona picking cubre la solicitud, se debe mantener la lista
      de picking. Esto evita falsos SOLO_NO_PICKING_SIN_EXPLOSION como en BYB
      para productos con stock util en picking y lotes ALM/no picking que no
      pueden explotarse.
      Ajuste posterior: la misma regla debe aplicarse tambien despues del
      recalculo de fecha minima, porque ese segundo bloque puede volver a
      preferir ALM/no picking por FEFO y retornar falso aunque picking cubra la
      cantidad solicitada.
  - fecha: "2026-05-20"
    area: "WebAPI MI3 payload reserva BYB"
    detalle: >
      Se dejo kit reproducible en tools/webapi-mi3-reserva para probar
      POST /api/sync/salidas/mi3/insertar con el payload EA-153305. Para BYB QA
      el WebAPI debe apuntar ConnectionStrings:CST a IMS4MB_BYB_QAS2, usar
      Transfer_from_Code/Transfer_to_Code BA0002 y Product_Owner_Code 01. El
      payload mantiene Unit_of_Measure_Code UNI + Variant_Code CJ para activar
      la misma normalizacion Core de presentacion/UM base y comparar resultado
      contra trans_pe_det, stock_res e i_nav_ped_traslado_det.
  - fecha: "2026-05-20"
    area: "WebAPI Core MI3 reserva BYB performance"
    detalle: >
      Fase estable 2: en Inserta_Linea_Detalle_Pedido el Core usa primero
      clsBeProducto.IdUnidadMedidaBasica cuando la linea tiene presentacion
      (por ejemplo UM CJ resuelta desde Unit_of_Measure_Code) y solo cae a
      clsLnProducto.Get_Id_Unidad_Medida_By_Codigo si el producto llega sin
      unidad basica cargada. Prueba EA-153304WEBAPI en BYB QA: HTTP 200 en
      ~50 s, 29 lineas completas, total solicitado/reservado 1370/1370,
      trans_pe_det 29/1370, stock_res 48/12703, i_nav_ped_traslado_det
      29/1370; documento de prueba eliminado al cerrar la fase.
  - fecha: "2026-05-20"
    area: "Brain agents reserva MI3"
    detalle: >
      Se inicializo brain/agents con coordinator, domain-reserva,
      domain-database, domain-bof y client-byb. Para casos complejos de reserva
      el agente debe cargar domain-reserva + domain-database y, si el documento
      es BYB/EA-153304/EA-153305, client-byb. Regla nueva de validacion:
      totals iguales no prueban paridad; cuando legacy es el baseline correcto,
      comparar tambien stock_res por linea y, si aplica, IdStock/lote/cantidad.
      Se descarto como fase estable reutilizar el producto completo precargado
      dentro del pipeline porque cambio la particion de stock_res aunque los
      totales globales seguian coincidiendo.
  - fecha: "2026-05-21"
    area: "Brain agents orquestacion WebAPI/performance"
    detalle: >
      Se agregaron brain/agents/domain-webapi.yml y
      brain/agents/domain-performance.yml, y se actualizaron _index.yml y
      coordinator.yml. Para reserva WebAPI MI3 el router debe cargar
      domain-reserva + domain-database + domain-webapi + domain-performance y,
      si aplica BYB/EA-153304/EA-153305, client-byb. Quedo definido doble
      control: check local versionado/build/secret scan y check Brain API
      health/repos-sync/index cuando exista BRAIN_IMPORT_TOKEN. Si no hay token,
      se debe hacer push a origin y dejar el comando exacto para sincronizar.
  - fecha: "2026-05-21"
    area: "Codex skills WMS"
    detalle: >
      Se crearon skills reales de Codex en C:/Users/yejc2/.codex/skills y copia
      versionada en brain/skills: wms-reserva-diagnostics, wms-webapi-debug y
      wms-bof-hh-guardrails. Las skills son workflows cortos que cargan
      selectivamente brain/agents y herramientas existentes; no duplican todo
      el conocimiento. _index.yml ahora mapea triggers/domains a estas skills
      para acelerar diagnostico, correccion y mejoras de reserva, WebAPI y
      BOF/HH.
  - fecha: "2026-05-22"
    area: "BOF frmPedido performance read-model"
    detalle: >
      Fase experimental en rama codex/mejora-pedido-readmodel: se agrego el SP
      dbo.usp_wms_pedido_readmodel_v1 en tools/pedido-readmodel para precargar
      producto_bodega, presentaciones, estados, clientes de detalle y reservas
      por linea de frmPedido. La forma consume ese SP solo como acelerador y
      mantiene fallback al DAL puntual si el SP no existe, falla o no devuelve
      alguna fila. En la DB local TOMWMS_LA_CUMBRE_PRD el SP fue creado con
      autenticacion integrada y validado contra pedido 2360/bodega 89.
  - fecha: "2026-05-22"
    area: "BOF frmPedido performance stock lazy"
    detalle: >
      En frmPedido, al editar pedido, Cant.Disp se estaba precargando por cada
      linea con Get_Existencia_Disp_By_IdProducto y luego se le sumaba la
      cantidad actual de la linea; por eso visualmente podia coincidir con lo
      pedido cuando la disponibilidad externa era cero. Se agrego carga lazy de
      stock disponible en edicion: durante la apertura muestra la cantidad del
      documento y marca la celda como pendiente; si el usuario edita/valida la
      linea, recalcula la disponibilidad real antes de aplicar las validaciones.
      Toggle de rollback: TOMWMS_PEDIDO_STOCK_LAZY_EDITAR=0.
  - fecha: "2026-05-22"
    area: "BOF frmOrdenCompra performance read-model"
    detalle: >
      Se agrego dbo.usp_wms_ordencompra_readmodel_v1 en
      tools/ordencompra-readmodel para cargar el detalle de OC con producto,
      clasificacion, unidad, presentacion, embarcador y talla/color en un solo
      roundtrip. clsLnTrans_oc_det.Get_Detalle_OC_By_IdOrdenCompraEnc usa el SP
      como acelerador con fallback al flujo anterior, y clsLnTrans_oc_det.Cargar
      acepta omitir la carga puntual de presentacion para evitar doble query por
      linea. frmOrdenCompra agrega traza local en
      %TEMP%/TOMWMS/ordencompra-load-trace.log y bloquea validaciones/repintado
      mientras llena el grid. Toggle de traza: TOMWMS_OC_TRACE=0.
  - fecha: "2026-05-22"
    area: "BOF frmOrdenCompra performance producto lookup lazy"
    detalle: >
      En frmOrdenCompra, ProductoGridLookUpEdit estaba cargando al inicio
      clsLnProducto.Get_Lista_For_Grid_By_IdBodega(cmbBodega.EditValue), lo que
      en clientes con ~39k productos por bodega agrega un roundtrip/carga pesada
      aunque el usuario solo consulte una OC existente. Se cambio a DataSource
      vacio durante la configuracion inicial y carga lazy al abrir el editor de
      producto o al refrescar luego de crear producto manual. La lista se cachea
      por propietario/bodega y deja marca producto_lookup_load en la traza local
      de OC para medir filas y milisegundos.
  - fecha: "2026-05-22"
    area: "BOF frmPicking performance fase 1"
    detalle: >
      En frmPicking se inicio fase conservadora sobre rama
      codex/mejora-frmpicking-performance: trace local en
      %TEMP%/TOMWMS/picking-load-trace.log, batching de grids durante
      Cargar_Datos, bloqueo de eventos/validaciones de dgridDetallePicking
      mientras la carga es programatica, cache por bodega para
      clsLnOperador_bodega.Get_All_By_IdBodega_DT y cache por pedido/detalle
      para clsLnTrans_pe_det.Tiene_Manufactura_Asociada. Set_Stock_Res mantiene
      el comportamiento por defecto y solo difiere asignar DataSource cuando
      Cargar_Datos procesa varios pedidos para asignarlo una vez al final.
      Toggle de traza: TOMWMS_PICKING_TRACE=0.
  - fecha: "2026-06-02"
    area: "BOF Stock en una fecha regularizacion inventario"
    detalle: >
      Fase 2 del reporte de stock en fecha para contemplar regularizaciones
      intermedias de inventario ciclico. Se ajusto
      dbo.usp_Reporte_StockEnFecha_Consolidado para incluir tipos de tarea de
      reclasificacion por lote/vencimiento/estado (AJLOTE*/AJVENC*/CEST*), y se
      robustecio el mapper clsLnVW_Movimientos.Cargar_StockEnFecha para mapear
      Presentacion con/sin tilde y guardar TTarea desde TipoTarea. Se documento
      la traza en tools/stock-en-fecha/STOCK_EN_FECHA_REGULARIZACION_TRACE_20260602.md.
