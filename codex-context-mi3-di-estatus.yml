      de Cantidad/Peso por IdStock. No usar MAX(IdStockRes) como invalidacion:
      IdStockRes es IDENTITY y esa consulta global agrega costo innecesario.
      La invalidacion debe ocurrir por evento real de insercion en stock_res y
      al cerrar el trace. La logica de seleccion no cambia.
  - fecha: "2026-05-19"
    area: "MI3 reserva stock"
    detalle: >
      Nueva traza confirmo que la cache ya estaba en Hit y las consultas batch
      duraban 0 ms, pero el proceso seguia reentrando a
      ANALIZAR_FECHAS_DE_VENCIMIENTO. La causa probable era el bloque
      INICIAR_EN_3 / zona picking: en el ElseIf de fecha mayor a la minima,
      hacia GoTo aunque ListaEstadosDeProceso ya contenia 102. El fix mueve el
      GoTo dentro de la condicion Not Contains(102), para reanalizar solo una
      vez y luego continuar con la reserva normal.
