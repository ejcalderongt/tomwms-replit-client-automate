  - fecha: "2026-05-19"
    area: "MI3 reserva stock"
    detalle: >
      En Reserva_Stock_From_MI3 para pedido EA-153305 linea 50000 item 00025004,
      la solicitud ya entra normalizada a UMBas (CantidadSolicitud=62,
      IdPresentacionSolicitud=0). La traza mostro muchas llamadas repetidas a
      Restar_Stock_Reservado sobre las mismas listas de stock (331, 179, 34/35).
