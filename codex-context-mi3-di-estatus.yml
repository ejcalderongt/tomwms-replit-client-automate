  - fecha: "2026-05-19"
    area: "MI3 reserva stock"
    detalle: >
      En Reserva_Stock_From_MI3 para pedido EA-153305 linea 50000 item 00025004,
      la solicitud ya entra normalizada a UMBas (CantidadSolicitud=62,
      IdPresentacionSolicitud=0). La traza mostro muchas llamadas repetidas a
      Restar_Stock_Reservado sobre las mismas listas de stock (331, 179, 34/35).
      Se agrego cache por trace/bodega para los IdStock reservados y las sumas
      de Cantidad/Peso por IdStock. No usar MAX(IdStockRes) como invalidacion:
      IdStockRes es IDENTITY y esa consulta global agrega costo innecesario.
      La invalidacion debe ocurrir por evento real de insercion en stock_res y
      al cerrar el trace. La logica de seleccion no cambia.
  - fecha: "2026-05-19"
    area: "MI3 reserva stock"
    detalle: >
      Nueva traza confirmo que la cache ya estaba en Hit y las consultas batch
      duraban 0 ms, pero el proceso seguia reentrando a
      ANALIZAR_FECHAS_DE_VENCIMIENTO. La causa probable era el bloque
      INICIAR_EN_3 / zona picking: en el ElseIf de fecha mayor a la minima,
      hacia GoTo aunque ListaEstadosDeProceso ya contenia 102. El fix mueve el
      GoTo dentro de la condicion Not Contains(102), para reanalizar solo una
      vez y luego continuar con la reserva normal.
  - fecha: "2026-05-19"
    area: "MI3 reserva stock"
    detalle: >
      Corrida EA-153305 / PA-172112 proceso sin colgarse. Las trazas
      reserva-mi3-20260519-1756*.yml cubren 31 lineas en una ventana de ~12.5s;
      el tiempo total de pantalla fue 48s, por lo que NAV/picking/UI y logging
      tambien pesan. La mayor parte del costo interno restante viene de
      perf_restar_stock_reservado_fin (~5.7s acumulados en 503 llamadas). Las
      lineas OK quedaron idempotentes con stock_res_omitido_ya_existia y
      pendientes en 0. En rojos, la mayoria se explica por FEFO: hay stock en
      ALM/no-picking mas viejo y no aplica explosionar UMBas desde no-picking.
      Revisar caso 00025001 linea 40000: ALM queda con CantidadEncontrada=0 tras
      restar reservado, pero su fecha minima puede seguir bloqueando stock de
      picking disponible; posible falsa negativa por no filtrar listas de zona
      con Cantidad > 0 antes de decidir FEFO/aplicabilidad.
  - fecha: "2026-05-19"
    area: "MI3 log reserva"
    detalle: >
