notas:
  - fecha: "2026-06-04"
    area: "Brain atlas/handoffs automation-safe"
    detalle: >
      Se implemento estructura operativa para eficiencia de contexto sin romper
      flujos: brain/atlas/index.yml como discovery master, brain/handoffs/_index.yml
      como inventario reusable por sintomas/tags/dominios, y script local
      brain/tools/lint_brain_indexes.ps1 para validar rutas/metadatos/staleness.
      Se documento backlog de tercerizacion segura en
      brain/atlas/AUTOMATION-BACKLOG-2026-06-04.md y guia operativa en
      brain/atlas/README.md.
  - fecha: "2026-06-03"
    area: "BOF graficador bodega V2 forma separada"
    detalle: >
      Se agrego baseline de nueva forma aislada frmDisenoB_V2 para evolucion UX
      del graficador sin romper frmDiseñoB legacy. V2 carga empresa/bodega con
      IMS/AP, materializa estructura via clsLnBodega.Get_Estructura_By_IdBodega
      y dibuja usando clsGraficadorBodega. Incluye Debug.WriteLine de trazas
      finas con tiempos (data/render) y conteos de sectores/tramos/ubicaciones.
      Archivo: Mantenimientos/Bodega_Graficador/frmDisenoB_V2.vb.
  - fecha: "2026-06-03"
    area: "BOF frmOrdenCompra lookup producto pierde codigo al tab"
    detalle: >
      Se detecto caso en OC nueva donde el producto se seleccionaba/escaneaba,
      pero al salir de la celda Codigo el texto visible se vaciaba. Causa:
      en ShownEditor de IdProductoBodega se cargaba datasource solo al editor
      activo (GridLookUpEdit) y no al RepositoryItem del grid, por lo que al
      cerrar editor el DisplayMember no tenia mapa IdProductoBodega->Codigo.
      Fix: sincronizar ambos datasources (editor + ProductoGridLookUpEdit) y
      trazar producto_lookup_sync para diagnostico.
  - fecha: "2026-06-03"
    area: "BOF frmOrdenCompra reglas de bloqueo en modo edicion"
    detalle: >
      Se valido que el bloqueo global del grid en frmOrdenCompra NO depende
      directamente de Enviado_A_ERP. La regla principal en ModoTrans.Editar es:
      estado ANULADA/CERRADA => gvDetalleDocIngreso.OptionsBehavior.Editable=False,
      Bloquea_Objetos y botones de agregar/eliminar fila deshabilitados.
      Para estados abiertos/backorder se mantiene editable=True con validaciones
      por columna/fila y restricciones de negocio (ej: IdProductoBodega no editable
      en editar, filas hijas kit no editables por ShowingEditor). Se agrego traza
      OC_EDIT_RULES (Debug.WriteLine + OCTrace_Marca step=oc_edit_rules) en puntos
      de decision para diagnostico futuro.
  - fecha: "2026-06-03"
    area: "BOF frmOrdenCompra codigo producto/lookup en grid"
    detalle: >
      Se corrigio regresion visual en frmOrdenCompra al editar OC existente:
      el lookup de producto quedaba lazy/vacio por performance y la columna
      Codigo (IdProductoBodega con DisplayMember=Codigo) no resolvia texto.
      Fix: despues de Cargar_Detalle_OC se hidrata ProductoGridLookUpEdit con
      un datasource liviano construido desde DTGridDetalleDocIngresos
      (solo productos presentes en el documento), manteniendo carga masiva lazy.
      Se agrego traza Debug.WriteLine/OCTrace_Marca
      producto_lookup_display_detalle para diagnostico.
  - fecha: "2026-06-03"
    area: "HH recepción doble envío tras NO imprimir"
    detalle: >
      En frm_recepcion_datos se blindo el flujo de guardado de recepción para
      evitar reenvío por doble Enter después de guardar y elegir "Salir/No imprimir".
      Se agregaron estados locales de envío/guardado con tag #EJC20260603
      (recepcionInFlight/recepcionGuardada), bloqueo de input de cantidad durante
      request activa y consumo de Enter para no propagar segundo submit.
      Regla operativa: después de guardar exitosamente, la pantalla no debe
      permitir un segundo guardado sobre el mismo detalle.
  - fecha: "2026-06-03"
    area: "HH cambio ubicacion ciega - race callback/xmlresult (XMLObject Unexpected token)"
    detalle: >
      Se confirmo incidencia por concurrencia en cliente HH, no por regresion
      funcional del modelo de datos: WebService compartia callback/xmlresult y
      podia mezclar respuestas de llamadas solapadas (JSON de
      Get_Ubicacion_Sugerida_JSON con flujos que esperaban XML), provocando
      XMLObject Error 2 / Unexpected token. Fix aplicado en
      TOMHH2025/app/src/main/java/com/dts/base/WebService.java con
      serializacion por instancia (singleThreadExecutor) y snapshot por request
      de callback/xmlresult/error antes de wsFinished. Resultado esperado:
      cada wsCallBack procesa su respuesta correcta y se evita parseo cruzado.
  - fecha: "2026-06-03"
    area: "HH reemplazo verificacion/picking - trazabilidad estado reservado"
    detalle: >
      En flujo de reemplazo se valido que la lectura de stock_res para
      reaprovechar reservado en WS dependia del estado esperado. Se detectaron
      casos donde el registro quedaba en estado distinto al filtro
      historico ('UNCOMMITED HH'), generando lista vacia y error operativo.
      Se documento que el blindaje real debe priorizar coherencia de estado
      reservado HH + trazas EJC_REEMP_VERIF_WS_IN/OUT y mensajes operativos
      claros cuando no exista linea pendiente real para reemplazo.
  - fecha: "2026-06-02"
    area: "Stock en una fecha - incluir stock en despacho"
    detalle: >
      Ajuste en TOMIMSV4 para que el reporte Stock en una fecha pueda calcular
      existencia actual considerando todo el stock (incluyendo ubicaciones
      marcadas como despacho). Se agregó en clsBeStock el flag
      IncluirUbicacionesDespacho (tag EJC20260602_STOCK_FECHA), se respeta en
      clsLnStock.Get_Lista_Existencias_By_IdProductoBodega_And_DiasVencimiento
      para no excluir ubicacion_despacho cuando aplica, y se activa en
      frmStockEnUnaFecha/frmAnaliticaA.
  - fecha: "2026-06-02"
    area: "Stock en una fecha - TRAS como salida"
    detalle: >
      Fix puntual en frmStockEnUnaFecha y frmAnaliticaA: el tipo de tarea TRAS
      ahora suma a Salidas (igual que DESP) para la reconstrucción teórica de
      la bodega origen. Corrige casos como bodega fiscal donde había RECE+TRAS
      y la existencia teórica quedaba inflada (81 en vez de 0).
  - fecha: "2026-06-02"
    area: "Stock en una fecha - optimización de rendimiento"
    detalle: >
      Se aplicó optimización en 3 frentes: (1) se eliminó el patrón N+1 de
      existencias en frmStockEnUnaFecha/frmAnaliticaA usando snapshot único de
      VW_Stock_Res y diccionarios en memoria (con y sin estado), (2) en
      clsLnTrans_movimientos se cambió el filtro por fecha a sargable
      Fecha >= @FechaDel AND Fecha < @FechaAlExclusiva para métodos usados por
      el reporte, y (3) se agregó script
      tools/stock-en-fecha/001_optimize_stock_en_fecha.sql con índices de soporte
      y SPs sugeridos para snapshot/movimientos del reporte.
  - fecha: "2026-06-02"
    area: "Stock en una fecha - trazas de performance"
    detalle: >
      Se instrumentó frmStockEnUnaFecha.Generar_Reporte y Llena_Grid con
      trazas por etapa (Get_Lista_Movimientos, consolidación, snapshot,
      procesamiento de filas y cierre). Las trazas salen por Debug.Print y,
      con modo depuración activo (Ctrl+D), también se guardan en
      Application.StartupPath/Logs/StockEnFecha_Perf_yyyyMMdd.log para análisis
      de cuellos de botella en ambiente operativo.
  - fecha: "2026-06-02"
    area: "Stock en una fecha - mapper rápido movimientos"
    detalle: >
      Se creó clsLnVW_Movimientos.Cargar_StockEnFecha (sin Columns.Contains
      por campo en columnas base del query) y se conectó en los dos overloads
      de clsLnTrans_movimientos.Get_All_Movimientos_By_IdProducto usados por
      Stock en una fecha, para reducir costo por fila en el llenado de la lista.
  - fecha: "2026-06-02"
    area: "Stock en una fecha - consolidación O(n)"
    detalle: >
      En frmStockEnUnaFecha.Generar_Reporte se reemplazó la consolidación por
      FindIndex repetido sobre RepMovEnUnaFecha (patrón O(n²)) por acumulación
      en Dictionary claveado por codigo/estado/presentacion/um/lote/vence
      (patrón O(n)). Se mantiene lista final para el flujo existente del grid.
  - fecha: "2026-06-02"
    area: "SAPSYNCCUMBRE blindaje transaccional ingresos SAP"
    detalle: >
      Se aplico blindaje en SAPSYNCCUMBRE tomando como referencia el patron de
      Killios: nuevo helper Clases/clsSAPTransaction.vb con tag
      EJC20260602_SYNC_INGRESO_SAP, incluido en SAPSYNCCUMBRE.vbproj. En
      Pedido_Compra/clsSyncSAPPedidoCompra.vb, Enviar_Entrada_Mercancia_OC_SAP
      ahora abre transaccion SAP antes de crear entrada/actualizar-cerrar OC y
      confirma solo al final; en error hace rollback SAP para evitar que SAP
      quede con documento creado y TOMWMS como no enviado. En transferencia de
      ingreso, Enviar_Solicitud_Traslado_SAP valida lineas WMS, valida DocEntry
      creado con GetByKey antes de marcar i_nav_transacciones_out y usa la misma
      transaccion SAP. Se documento humanamente en
      brain/handoffs/2026-06-02-sapsynccumbre/SAPSYNCCUMBRE-FINE-TRACE-2026-06-02.md,
      seccion 16. Se amplio la idempotencia de entrada: si
      trans_re_oc.No_Erp_Docentry_Entrega ya tiene referencia, la interface hace
      GetByKey en SAP y no vuelve a crear la entrada; al crear una entrada nueva
      guarda No_Erp_Docentry_Entrega/No_Erp_Docnum_Entrega para futuros reintentos.
      Para punto 3, en Solicitud_Traslado/clsSyncSAPSSolicitudTraslado.vb se
      blindo el caso 05 -> bodega destino: si vBodega_Destino tiene valor,
      Enviar_Solicitud_Traslado_SAP es obligatorio, debe devolver DocEntry > 0
      y debe quedar No_Pase en WMS; si no, se lanza error y rollback SAP/SQL.
      El metodo destino tambien falla si no hay lineas, si SAP no valida
      GetByKey o si no logra guardar DocNum/No_Pase. Pendiente: reconciliacion
      historica cuando no exista DocEntry guardado y prueba en Visual Studio con
      SAP DI API/DevExpress instalados.
  - fecha: "2026-06-02"
    area: "SAPSYNCCUMBRE sync ingresos SAP via worker WMS"
    detalle: >
      Fase 1 aplicada localmente para parametrizar i_nav_config_enc.enviar_ingreso_sap_via_ws:
      Entity clsBeI_nav_config_enc agrega Enviar_Ingreso_SAP_Via_WS, DAL clsLnI_nav_config_enc
      lo carga/guarda con tag EJC20260602_SYNC_INGRESO_SAP, y frmConfiguracion queda
      mapeado sin tocar Designer mediante CheckEdit futuro chkSapSyncEnviaIngresosAuto.
      Script DDL canonico en repo DBA ejcalderongt/DBA: i_nav_config_enc agrega
      enviar_ingreso_sap_via_ws e i_nav_sync_request crea tabla/indices para cola.
      Fase 2 acordada: WS/BOF solo encola i_nav_sync_request y el worker WMS del servidor
      ejecuta SAPSYNCCUMBRE/MI3_Sync tipo 5; HH no requiere cambio obligatorio.
      Se agregaron Entity/DAL minimos para i_nav_sync_request bajo Interface/SyncRequest:
      encolar si no hay activa, tomar siguiente pendiente, marcar procesando/finalizado/error/ignorado.
  - fecha: "2026-06-02"
    area: "SAPSYNCCUMBRE fine-trace"
    detalle: >
      Se documento el workflow operativo de SAPSYNCCUMBRE en
      brain/handoffs/2026-06-02-sapsynccumbre/SAPSYNCCUMBRE-FINE-TRACE-2026-06-02.md.
      Hallazgo central: la interface WinForms/DI API no opera aislada; compila
      hacia TOMIMSV4 y reutiliza Entity/DAL compartidos. SAP -> WMS usa campos
      U_EnviadoWMS/U_Enviado_WMS=2 como pendientes, mapea documentos a i_nav_*
      y consolida a trans_oc/trans_pe. WMS -> SAP sale desde i_nav_transacciones_out
      agrupando ingresos, salidas, traslados, devoluciones y ajustes; al exito
      marca enviados y guarda referencias externas. No exponer valores de Conn.ini.
  - fecha: "2026-06-01"
    area: "HH progress/cancel WS concurrency"
    detalle: >
      En TOMHH2025 se analizo el patron de progress.show/cancel/dismiss en
      pantallas Java HH. El helper com.dts.base.ProgressDialog ya redirige
      show/cancel/dismiss al hilo UI; el riesgo comun no es el dialog en si,
      sino execws solapado con ws.callback mutable por pantalla y callbacks
      tardios que cierran o reabren progress contra un estado mas nuevo. Areas
      mas expuestas por volumen y entradas rapidas: Recepcion frm_recepcion_datos
      y frm_list_rec_prod, CambioUbicacion frm_cambio_ubicacion_ciega,
      Packing frm_Packing/frm_preparacion_packing, Picking frm_picking_datos/
      frm_detalle_tareas_picking, Verificacion frm_detalle_tareas_verificacion/
      frm_verificacion_datos. Mitigacion recomendada por pantalla: inFlight,
      requestToken incremental, deshabilitar trigger durante WS y cerrar
      progress en finally/catch solo si el token sigue vigente.
  - fecha: "2026-05-27"
    area: "RFID inventario fisico ILP"
    detalle: >
      Se documento fine-trace del modulo RFID en
      C:/Users/yejc2/source/repos/wms-brain/wms-brain/brain/handoffs/2026-05-27-rfid-inventario-fisico/RFID-INVENTARIO-GRAFO-TRAZA-FINA-2026-05-27.yml
      y se agrego skill local C:/Users/yejc2/.codex/skills/wms-rfid-inventory/SKILL.md.
      Hallazgo central: el inventario RFID necesita snapshot atomico al crear
      trans_inv_enc/tarea_hh, contra stock RFID separado. Revisar contradiccion
      entre Guardar_RFID (comentario "no hay stock") y el flujo actual con
      i_nav_barras_rfid_stock/trans_inv_ciclico_rfid. Antes de implementar,
      confirmar fuente canonica del congelado: i_nav_barras_rfid_stock activo
      o ING sin SAL.
  - fecha: "2026-05-27"
    area: "HH consulta existencias sin paginacion"
    detalle: >
      En WSHHRN Get_Stock_Consulta_CI_Json la firma QA/local no tiene page ni
      pageSize. La ruta debe devolver en JSON todos los registros acordes a
      filtros normales (codigo/licencia/ubicacion/bodega/nombre/detallado) en
      Items, marcando SinPaginacion=True y RegistrosDevueltos=Total. En
      clsLnStock_CI mantener consultas sin TOP/OFFSET/FETCH y con ORDER BY
      Codigo, IdPresentacion, ubicacion, LP, lote y vencimiento para que HH
      renderice totales de forma estable.
  - fecha: "2026-05-27"
    area: "HH blindaje estratégico nulos/listas"
    detalle: >
      Se priorizó blindaje en fronteras WS/estado vivo: detalle de consulta de
      existencias y verificación consolidada. Patrón: validar objeto global/lista
      compartida antes de usar items.get(0), normalizar strings WS antes de
      isEmpty/trim/contains/parseDouble, y cerrar con mensaje operativo de recarga
      cuando el contexto quedó obsoleto. Tags usados en HH: #EJC20260527.
  - fecha: "2026-05-27"
    area: "HH consulta existencias estado UI"
    detalle: >
      En TOMHH2025 frm_consulta_stock, preparar la vista con "Consultando..."
      antes de execws exige restaurar footer/foco si execws no arranca o si el
      render falla. Los callbacks stale deben ignorarse sin cerrar el ciclo WS
      activo, porque el finally puede cruzar estados y dejar la pantalla sin
      foco o con el footer ocupado.
  - fecha: "2026-05-27"
    area: "HH recepción finalizar firma null"
    detalle: >
      En TOMHH2025, al finalizar recepción desde frm_list_rec_prod,
      gl.gBeRecepcion.Firma_piloto puede venir null. No llamar isEmpty()
      directo; tratar null como firma vacía para abrir la pantalla de firma
      y continuar el flujo normal. Se agregó guarda también para encabezado
      de recepción no cargado antes de Finalizar_Recepcion.
  - fecha: "2026-05-27"
    area: "HH lint cleanup seguro"
    detalle: >
      En TOMHH2025 se validó una ruta segura para bajar lints sin cambiar
      contratos HH/WS: corregir primero errores bloqueantes de API Android,
      luego DefaultLocale en normalizaciones internas con Locale.ROOT/US,
      raw List locales, isEmpty para cadenas, printStackTrace por Log y
      CutPasteId evidentes contra layout. Evitar hacer masivo HardcodedText,
      SetTextI18n, ScrollViewSize/TextViewEdits o layouts sin revisar pantalla,
      porque pueden cambiar texto o visual operativo.
  - fecha: "2026-05-26"
    area: "DB identity trans_movimientos (plan cross-layer)"
    detalle: >
      Se confirmó en TOMWMS_MAMPA_QA que dbo.trans_movimientos.IdMovimiento no
      es identity y depende de MaxID()+1 en DAL VB, WSHHRN/HH y WMS.DALCore.
      Se dejó script de migración con preservación de IDs históricos en
      tools/diagnostics/20260526_fix_trans_movimientos_idmovimiento_identity.sql
      y árbol de impacto faseado en
      brain/handoffs/2026-05-26-trans-movimientos-ididentity/README.md.
  - fecha: "2026-05-26"
    area: "HH picking reemplazo/no encontrado cantidad_solicitada"
    detalle: >
      En QA La Cumbre (TOMWMS_LA_CUMBRE_QA) el constraint
      Stock_NonNegative_20250228_CKFK de trans_picking_ubic valida
      cantidad_solicitada > 0. Se detecto que los flujos de reemplazo/no
      encontrado evaluaban parcial con "Cantidad_Solicitada <> 0", por lo que
      cantidades negativas caian en UPDATE y rompian el check. Fix aplicado en
      clsLnStock_res_Partial y clsLnTrans_picking_ubic_Partial: condiciones de
      parcial cambiadas a > 0 y caminos de cierre/eliminacion a <= 0 para
      evitar updates con cero/negativo en escenarios de merma/no encontrado.
      Se identifico caso adicional en Reemplaza_Producto_Dannado_Menor donde
      cuando CantidadPendiente = 0 la cantidad dañada quedaba en 0 por no
      entrar a ramas >0/<0; se corrigio para asignar pCantLinea en igualdad.
      Tambien se agrego guard clause en Modificar_PickingUbic_By_Reem para
      omitir update cuando CantSol <= 0 y evitar violacion del check.
  - fecha: "2026-05-26"
    area: "HH menu roles"
    detalle: >
      En TOMHH2025 el mapeo del menu principal debe resolver permisos por
      nombre normalizado y, si el nombre viene vacio o con variante, usar
      IdMenuSistemaOP numerico antes de IdTipoTarea. Esto evita que roles
      productivos pierdan opciones como Implosion para pickeador o Empaque
      para recepcion cuando el contrato de menu llega con nombre distinto.
  - fecha: "2026-05-26"
    area: "JIRA WMS - resumen correcciones del dia"
    detalle: >
      Se corrigieron incidencias en HH/WS/DAL de QA La Cumbre. 1) Picking
      reemplazo/no encontrado: con el check
      Stock_NonNegative_20250228_CKFK (cantidad_solicitada > 0), se ajustaron
      rutas para evitar updates con cantidad <= 0 en
      clsLnStock_res_Partial/clsLnTrans_picking_ubic_Partial. 2) Se detecto
      ruta adicional en Reemplaza_Producto_Dannado_Menor y flujo Sin_Exist:
      cuando CantidadPendiente=0 la cantidad dañada quedaba en 0; se corrigio
      asignando pCantLinea en igualdad y guard clause CantSol<=0 en
      Modificar_PickingUbic_By_Reem. 3) Existencias HH: error SQL
      "Incorrect syntax near 'Of'" corregido en clsLnStock_CI
      cambiando Convert(Of Date,...) por Convert(Date,...) y parametrizando
      filtros pNombre/lote. 4) Verificacion HH fuera de lista general: escaneo
      no navegaba a confirmacion por enviar gIdPedidoEnc en lugar de
      pIdPedidoEnc; se corrigio request y matching por CodigoSKU en
      frm_detalle_tareas_verificacion.
  - fecha: "2026-05-25"
    area: "WebAPI salidas anulacion bajo demanda"
    detalle: >
      Se agrego endpoint POST /api/sync/salidas/anular-salida para anular un
      documento de salida desde WebAPI con reglas equivalentes al flujo WMS de
      frmPedido: requiere IdPedidoEnc o Referencia, motivo de anulacion,
      valida que no exista picking activo asociado, permite estados Nuevo,
      Incompleto, Pendiente, Pickeado y Verificado, libera stock_res por
      IdPedido y marca trans_pe_enc.estado='Anulado' con
      IdMotivoAnulacionBodega en una sola transaccion; si la bodega es fiscal,
      tambien desactiva trans_pe_pol.activo para la poliza del pedido. La
      respuesta usa codigos tipificados: ANULACION_OK, REQUEST_INVALID, PEDIDO_NO_ENCONTRADO,
      PEDIDO_AMBIGUO, PEDIDO_YA_ANULADO, ESTADO_NO_ANULABLE, PICKING_ASOCIADO,
      ANULACION_FALLIDA y ERROR_INTERNO.
  - fecha: "2026-05-23"
    area: "WSHH consulta stock ubicacion JSON estable"
    detalle: >
      Se agrego endpoint backend dedicado Get_Stock_Por_Producto_Ubicacion_CI_Json_v2
      en WSHHRN/TOMHHWS.asmx.vb para ruta HH de consulta por ubicacion.
      La salida es siempre JSON uniforme {Error,Mensaje,Total,Items,TraceId}
      mediante EscribirJsonHHSeguro (TrySkipIisCustomErrors + CompleteRequest),
      evitando que IIS/ASMX reemplace respuestas por XML/HTML en errores.
      El endpoint v2 incluye TraceId opcional para trazabilidad server-side.
  - fecha: "2026-05-23"
    area: "HH wrapper JSON global + recepcion scan"
    detalle: >
      Se movio la compatibilidad de colecciones JSON a capa base
      (com.dts.base.WebService) con normalizacion recursiva generica. Cualquier
      propiedad que llegue como arreglo ahora se transforma a wrapper compatible
      para modelos *List de HH sin parches campo-por-campo, manteniendo doble
      clave ("items" y nombre original) para clases con @SerializedName.
      frm_lista_tareas_recepcion ya no hace normalizacion local y consume
      ws.xmlresult directo.
  - fecha: "2026-05-23"
    area: "Recepcion HH/WS flujo Lite"
    detalle: >
      Se agrego ruta ligera para apertura de recepcion por escaneo:
      GetSingleRec_JSON_Lite en WSHHRN, con cache corto servidor. DAL incluye
      GetSingleHH_Lite (encabezado recepcion), GetSingleLite (trans_re_oc) y
      Get_Encabezado_OC_HH_Lite (OC sin detalle pesado/lotes/imagenes). En HH,
      frm_lista_tareas_recepcion intenta Lite y cae a GetSingleRec_JSON como
      fallback. frm_list_rec_prod carga detalle OC bajo demanda via execws(15)
      cuando el payload Lite llega sin lineas.
  - fecha: "2026-05-22"
    area: "HH recepcion scan producto - traza parseo JSON"
    detalle: >
      Diagnostico reproducido sin cambios funcionales para error al escanear
      producto en frm_lista_tareas_recepcion (processIdRecepcion). El flujo HH
      llama GetSingleRec_JSON y hace Gson.fromJson(ws.xmlresult,
      clsBeTrans_re_enc). En ambiente 26.2.183.105/wcftom4 se verifico que el
      payload real devuelve OrdenCompraRec.OC.DetalleOC como arreglo JSON
      (DetalleOC:[...]); la HH actual modela DetalleOC como
      clsBeTrans_oc_detList (objeto wrapper), por eso Gson lanza
      IllegalStateException Expected BEGIN_OBJECT but was BEGIN_ARRAY en la ruta
      $.OrdenCompraRec.OC.DetalleOC. Evidencia local: request POST
      /tomhhws.asmx/GetSingleRec_JSON con pIdRecepcionEnc=8431 confirma
      DetalleOC=ARRAY. Cambio pendiente: alinear contrato HH con arreglo JSON o
      agregar adaptador de deserializacion compatible objeto/arreglo.
  - fecha: "2026-05-22"
