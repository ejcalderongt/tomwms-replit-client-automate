# Catalogo maestro de paquetes de contexto del brain
# Lectura: el coordinador matchea la tarea contra `triggers` de cada paquete
# y carga solo los que aplican.
meta:
  version: 1
  fecha: 2026-05-20
  autor: Replit Agent
  ratificado_por: Erik Calderon
  branch: wms-brain
  modelo: coordinador-central + paquetes-de-contexto

coordinator:
  slug: coordinator
  archivo: brain/agents/coordinator.yml
  rol: Recibir tarea, decidir paquetes, orquestar respuesta.

domains:
  - slug: domain-bof
    archivo: brain/agents/domain-bof.yml
    proposito: Backend VB.NET TOMIMSV4 (winforms + DAL + Entity + reglas negocio)
    triggers:
      keywords: [frmPedido, frmRecepcion, frmAjuste, TOMIMSV4, winforms, VB.NET, m_Global, Conn.ini]
      paths: [TOMIMSV4/, DAL/, Entity/]
      tareas_tipicas: [bug-ui-bof, ajuste-stock-export, indicador-pedido, regla-negocio-vb]

  - slug: domain-integration-services
    archivo: brain/agents/domain-integration-services.yml
    proposito: Superficies de integracion (WSHHRN .asmx, WMSWebAPI Core, MI3 legacy, SAP, NAV, DMS)
    triggers:
      keywords: [WSHHRN, WebService, WMSWebAPI, MI3, SyncSalidas, SyncSAP, NAV, DMS, .asmx, controller, endpoint, Process_Result]
      paths: [WSHHRN/, WMSWebAPI/, MDynamicsNavInterface/, WMS.DALCore/, WMS.EntityCore/]
      tareas_tipicas: [nuevo-endpoint, integracion-erp, sync-sap, sync-nav, json-xml-migracion]

  - slug: domain-hh-android
    archivo: brain/agents/domain-hh-android.yml
    proposito: Aplicacion Handheld Android Java (TOMHH2025, com.dts.tom)
    triggers:
      keywords: [HH, handheld, Android, activity, WebService.java, recepcion, picking-hh, verificacion-hh, ZPL]
      paths: [TOMHH2025/, app/src/main/java/com/dts/tom/]
      tareas_tipicas: [bug-hh, nueva-pantalla-hh, parsing-soap-hh, presentacion-cantidad]

  - slug: domain-database
    archivo: brain/agents/domain-database.yml
    proposito: Esquema SQL Server, SPs, views, perfiles por cliente, scripts DBA
    triggers:
      keywords: [SQL Server, schema, SP, view, stored procedure, VW_, trans_, stock_, query, tabla, columna, drop, alter, cliente_bodega, integridad]
      paths: [DBA/, scripts/sql/]
      tareas_tipicas: [diagnostico-sql, vista-nueva, script-auditoria, regularizacion-data, performance-query]

  - slug: domain-reserva
    archivo: brain/agents/domain-reserva.yml
    proposito: Motor de reserva MI3 (legacy VB 8337 lineas) y motor Core .NET con paridad
    triggers:
      keywords: [reserva, stock_res, MI3, Reserva_Stock_From_MI3, ReservationFailureCode, FEFO, Clavaud, no reserva, picking zone, ReservationContext]
      paths: [DAL/Transacciones/Stock_Reservado/, WMS.DALCore/Reserva_Stock/]
      tareas_tipicas: [no-reserva-mi3, diff-paridad-legacy-core, performance-reserva, log-reserva, fefo-vencimiento]

  - slug: domain-portal
    archivo: brain/agents/domain-portal.yml
    proposito: WikiHub Portal tomwms-wikidev.replit.app (catalogo humano + API REST)
    triggers:
      keywords: [portal, wikihub, /api/release-notes, /api/modules, /api/stats, /jira, /changelog, /db-changes, /tech-docs]
      paths: [tomwms-wikidev/, portal/]
      tareas_tipicas: [endpoint-portal, kpi-portal, reverse-engineer-portal, release-notes]

  - slug: domain-indicadores
    archivo: brain/agents/domain-indicadores.yml
    proposito: KPIs operativos cross-dominio (dashboard, by-month, by-cliente) - Modo B sobre WMSWebAPI
    triggers:
      keywords: [KPI, indicador, dashboard, by-month, by-cliente, reservas-fallidas, outbox-stuck, tareas-hh, danos-vs-ajustes]
      paths: [WMSWebAPI/Indicadores/, portal/api/stats/]
      tareas_tipicas: [kpi-nuevo, dashboard-operativo, agregacion-multi-cliente]

clients:
  # NO se duplican aca - viven en brain/client-index/*.yml con shape propio (cliente, bd, estructura, bugs, etc)
  # El coordinator carga el .yml del client-index segun el slug.
  index_path: brain/client-index/
  archivos:
    - { slug: becofarma, archivo: brain/client-index/becofarma.yml, estado: PRODUCTIVO, rama: dev_2023_estable }
    - { slug: byb,       archivo: brain/client-index/byb.yml,       estado: HISTORICO,  rama: dev_2023_estable }
    - { slug: cealsa,    archivo: brain/client-index/cealsa.yml,    estado: QAS,         rama: dev_2023_estable }
    - { slug: killios,   archivo: brain/client-index/killios.yml,   estado: PRODUCTIVO, rama: dev_2023_estable }
    - { slug: mampa,     archivo: brain/client-index/mampa.yml,     estado: PRUEBAS,     rama: dev_2028_merge }
    - { slug: mercopan,  archivo: brain/client-index/mercopan.yml,  estado: PRODUCTIVO, rama: dev_2028_merge }
    - { slug: merhonsa,  archivo: brain/client-index/merhonsa.yml,  estado: PRE-PRODUCTIVO, rama: dev_2028_merge }
  faltantes:
    - { slug: lacumbre,  rama: dev_2028_Cumbre, motivo: "Rama dedicada HH; YAML pendiente de crear" }
    - { slug: mhs,       rama: dev_2028_merge,  motivo: "Cliente B2B nuevo via WMSWebAPI; no en EC2 - su propio entorno" }
    - { slug: idealsa,   rama: pendiente,       motivo: "Holding; opera directo CD Escuintla GT sin BD propia en EC2" }

cross_dominio:
  # Tareas que requieren multiples paquetes cargados a la vez
  - tarea: no-reserva-mi3-en-cliente-X
    cargar: [coordinator, domain-reserva, domain-database, client-<X>]
  - tarea: nuevo-endpoint-kpi
    cargar: [coordinator, domain-indicadores, domain-integration-services, domain-database]
  - tarea: bug-hh-recepcion
    cargar: [coordinator, domain-hh-android, domain-integration-services, domain-database, client-<X>]
  - tarea: feature-cliente-nuevo
    cargar: [coordinator, domain-bof, client-<X>]
  - tarea: kpi-portal
    cargar: [coordinator, domain-portal, domain-indicadores]
  - tarea: incidente-operativo-repetitivo
    cargar: [coordinator, domain-hh-android, domain-bof, domain-integration-services, domain-database, client-<X>]
    preflight_extra:
      - brain/handoffs/2026-06-06-operativo-reusable-map/README.md
      - brain/handoffs/2026-05-22-codex-performance-bof-hh/TRAZAS-FINAS-OPERATIVAS-INDEX-2026-05-26.yml
      - brain/handoffs/2026-06-05-hh-concurrencia-cache-sync/README.md
  - tarea: pedido-mi3-cliente-no-visible
    cargar: [coordinator, domain-bof, domain-integration-services, domain-database, client-<X>]
    preflight_extra:
      - brain/handoffs/2026-06-10-pedido-mi3-cliente-bodega-guardrail/README.md

triggers_conflicto:
  # Cuando un keyword puede pertenecer a varios dominios, regla de desempate.
  - keyword: stock_res
    primario: domain-reserva
    secundario: [domain-database]
  - keyword: Process_Result
    primario: domain-integration-services
    secundario: [domain-reserva]
  - keyword: trans_pe_det
    primario: domain-bof
    secundario: [domain-database, domain-reserva]
  - keyword: WSHHRN
    primario: domain-integration-services
    secundario: [domain-hh-android]
