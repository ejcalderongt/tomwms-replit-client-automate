version: 1
updated: "2026-06-15"
domain: bof
scope: "Legacy VB.NET/WinForms context for WMS reservation and interface work."

rules:
  - Do not edit Reference.vb; generated SOAP proxies are not implementation.
  - Keep VB files as UTF-8 with BOM.
  - Debug first and preserve existing business branches.
  - When enriching WinForms UI, keep operational logs useful and avoid hiding failure detail.

reservation_ui_notes:
  frmEjecucion:
    file: DynamicsNavInterface/Formas/frmEjecucion.vb
    method: Importar_Envio_Almacen_Desde_Tabla_Intermedia_A_Tabla_TOMIMS
    visual_feedback: >
      RichTextBox progress can be colored by reservation result: green for
      complete, red for under-reserved/error, neutral for informational steps.
      The visual layer must not replace Process_Result or DB logs.
  progress_helper:
    note: >
      Reuse the existing progress state/helper pattern when available instead
      of embedding ad-hoc RichTextBox coloring in business logic.

legacy_as_oracle:
  - If Erik marks a legacy reservation as correct, snapshot it before deleting.
  - Capture interface lines, trans_pe_det and stock_res with per-line reservation detail.
  - Use that snapshot as the oracle for Core parity.

verification_movements:
  veri_duplicate_case:
    handoff: "brain/handoffs/2026-05-19-codex-learning-bof-veri-movimientos-duplicados"
    symptom: "Exact duplicate VERI movements and VERI quantity stored in presentation instead of UMBAS."
    guardrail: >
      VERI insert logic must stay idempotent by business key before inserting
      trans_movimientos. When a verification quantity is distributed across
      multiple trans_picking_ubic rows, movement quantity must use the applied
      line quantity (CantPendiente), not the original remaining request.
    quantity_rule: >
      trans_movimientos.cantidad for VERI must be stored in UMBAS. Callers that
      already pass UMBAS must declare it explicitly; presentation quantities are
      normalized in the common VERI insert path.

mampa_interface_notes:
  ajuste_talla_color:
    handoff: "brain/handoffs/2026-06-15-mampa-interface-learning/README.md"
    rule: >
      For MAMPA ajuste/interfaz work, prefer the typed product-talla-color
      dataset and keep the contract consistent across BOF and interface code.
      Do not infer TC from display labels when the source query already exposes
      IdTalla/IdColor, and do not copy destination TC into borrador records
      before confirmation.
  ingreso_contract:
    rule: >
      If the interface caller already constructs the request object, validate
      the contract at the true entry point and avoid redundant guards that hide
      the upstream failure path. Preserve the real error when the payload is
      malformed.

implosion_notes:
  sku_resolution_and_umbas:
    updated: "2026-06-30"
    rule: >
      In frmImplosion, treat the scan as a two-step validation: first resolve
      the SKU against the master service, then match the local grid by
      IdProductoTallaColor or IdProductoBodega before falling back to an exact
      CodigoSKU compare. The objective quantity is UMBAS (CantidadUMBas with
      CantidadPresentacion as fallback), so other BOF screens that scan or
      compare stock should reuse the same exact-match-first pattern instead of
      guessing by partial code or display text.

vb_encoding_guardrail:
  updated: "2026-07-01"
  rule: >
    When editing VB files in TOMWMS, keep them as UTF-8 with BOM. The helper
    script lives in wms-brain/tools/wms-context/check-vb-bom.ps1 and should be
    used to validate only the changed VB files by default. Use -All only for
    explicit repo-wide audits; the legacy tree contains many historical files
    outside BOM standard and should not be mass-converted without a dedicated
    cleanup plan.
