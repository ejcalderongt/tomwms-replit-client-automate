diferencias_clave_genealogias:
  IMS4MB:
    - "No tiene tipo_documento varchar (legacy: IdTipoDocumento int 1/2/3)"
    - "BDs: BECOFARMA, BYB, CEALSA, MERCOPAN, MERHONSA, (MAMPA NO - es nueva)"
  nueva:
    - "Schema moderno con tipo_documento varchar"
    - "BDs: TOMWMS_KILLIOS_PRD, TOMWMS_KILLIOS_PRD_2026, TOMWMS_MAMPA_QA"

familias_de_tablas:
  stock:
    - stock              # stock fisico actual
    - stock_res          # reservas activas (regla UMBAS)
    - stock_min          # stock minimo por bodega/producto
  transacciones:
    - trans_pe_enc, trans_pe_det                                    # pedido
    - trans_pe_det_log_reserva                                      # log de reserva
    - trans_oc_enc, trans_oc_det                                    # orden compra
    - trans_re_oc                                                   # recepcion OC
    - trans_picking_ubic                                            # picking
    - trans_ajuste_enc, trans_ajuste_det                            # ajuste
    - trans_movimientos                                             # log movimientos (auditoria)
    - trans_despacho_enc                                            # despacho
  interface_nav:
    - i_nav_config_enc, i_nav_config_det      # 69 flags configurables
    - i_nav_ped_traslado_enc, i_nav_ped_traslado_det
    - i_nav_transacciones_out                  # FK sentinela 0 (L-017)
  handheld:
    - tarea_hh, tarea_hh_estado                # ver catalogo en brain/reference/
  outbox:
    - tabla_outbox_*                            # patron outbox para ERP sync

views_relevantes:
  - VW_Stock_Res          # trabajo en curso (rama ejcalderongt/DBA)
  # falta inventariar las demas

