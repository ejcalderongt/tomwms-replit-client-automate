  - "REGLA 9: Estatus OC MI3 por trans_oc_enc.Referencia, NO IdOrdenCompraEnc"
  - "REGLA 6: Cantidad UMBAS en stock/movimientos/stock_res"
  - "Integridad cliente-bodega: si un cliente ya tiene trans_pe_enc en una bodega, evitar DELETE físico de cliente_bodega para esa combinación sin saneamiento previo."
  - "Outliers conocidos: trans_ajuste_det idajustedet=638 (4.8B UM mayo-2021, observacion 'sa') - excluir de agregados"

