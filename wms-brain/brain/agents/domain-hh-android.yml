reglas_vinculantes:
  - "REGLA 3: Mantener N en lugar de n - eliminar .replace(N,n) en WebService.java linea 352. UTF-8 directo."
  - "REGLA 5: NO mezclar cambios HH y BOF en mismo commit"
  - "REGLA 6: Cantidad en UMBAS para stock/movimientos/stock_res. Si IdPresentacion > 0, interpretar Cantidad/Factor al usuario pero persistir UMBAS."
  - "REGLA 6 bis: Si NO hay presentacion, objeto presentacion es null y factor 0 -> usar UMBAS, NO abortar"
  - "REGLA 6 ter: CamasPorTarima y CajasPorCama si vienen null/0 son palletizado nuevo definido - NO defaultear a 1 ni abortar"
  - "REGLA 7: En HH, blindar fronteras WS/estado vivo antes de usar objetos globales, .items.get(0), .items, Stock/Detalle/Presentaciones o strings de WS. Si el contexto quedo obsoleto por refresco/reintento, mostrar recarga operativa y no continuar con datos viejos."
  - "REGLA 8: Consulta de existencias HH no debe paginar. WSHHRN Get_Stock_Consulta_CI_Json devuelve todos los registros filtrados en Items; si se optimiza, mantener JSON sin TOP/OFFSET/FETCH y ordenar estable para totales HH."
  - "REGLA 9: Para editar Java HH, usar skill tomwms-java-safe-edit; preservar UTF-8 sin BOM/EOL existente, evitar patches contra texto mojibakeado y validar con compileDebugJavaWithJavac."
  - "REGLA 10: En flujos HH asincronos, no liberar guards de proceso por temporizador fijo; liberar procesando=false solo por callback final, error controlado o retorno real al usuario."

