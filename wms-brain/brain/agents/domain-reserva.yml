  diff_paridad: "Leer brain/code-changes/BOF/PATTERNS-RESERVA-PARIDAD-LEGACY-VS-CORE.md. Mapa cobertura legacy 8337 lineas vs Core."
  performance_reserva: "Trace YAML reserva-mi3-YYYYMMDD-*.yml (pendiente convencion)"
  fefo: "PATTERNS-RESERVA-PARIDAD-LEGACY-VS-CORE.md seccion 5"
  cantidad_umbas: "PATTERNS-RESERVA-MI3-UMBAS.md"

