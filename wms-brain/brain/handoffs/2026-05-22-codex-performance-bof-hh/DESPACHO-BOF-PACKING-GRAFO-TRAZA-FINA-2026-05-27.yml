hallazgos_2026_05_27:
  causa_visual:
    descripcion: "La validacion agregaba Summary.Add sobre columnas del grid cada vez que se presionaba Guardar."
    efecto: "El footer de Ubicacion Picking mostraba filas/summaries duplicados, dando apariencia de columnas o totales acumulados."
    ubicacion: "frmDespacho.vb::Existe_Diferencia_Despacho_vrs_Packing"
  causa_silencio:
    descripcion: "Cuando la comparacion total fallaba, el metodo retornaba True y Datos_Correctos retornaba False sin mensaje al usuario."
    efecto: "Guardar parecia no hacer nada."
  riesgo_detectado:
    descripcion: "La validacion vieja leia columnas por indice 18 y 20 del GridView."
    efecto: "Cambio de orden/visibilidad de columnas podia producir lectura equivocada."
  riesgo_de_carga:
    descripcion: "Llena_Packing mezclaba DTPacking con Merge y agregaba GroupSummary sin limpiar la carga previa del mismo pedido/despacho."
    efecto: "Reentradas de carga podian duplicar filas o summaries del grid Packing."

patch_2026_05_27:
  archivo: "TOMIMSV4/TOMIMSV4/Transacciones/Despacho/frmDespacho.vb"
  cambios:
    - "NormalizarResumenesDespachoPacking limpia summaries de cantidad_bultos_packing, Cant_Veri_UMBas y Cant_Desp_UMBas antes de validar."
    - "Existe_Diferencia_Despacho_vrs_Packing suma desde DTStockRes/DTPacking por nombre de columna y por pedido."
    - "El bloqueo por diferencia ahora muestra detalle: verificado, despachado previo, a despachar y packing."
    - "Llena_Packing/Llena_Packing_By_Despacho remueven la carga previa del mismo picking/pedido/despacho antes de Merge."
    - "Los GroupSummary de Ubicacion Picking y Packing se limpian antes de volver a agregarse."
  no_tocado:
    - "HH Android"
    - "SPs/tablas SQL"
    - "Reference.vb"

checklist_regresion:
  - "Abrir despacho La Cumbre con packing finalizado."
  - "Entrar a Ubicacion Picking y confirmar que el footer no crece al presionar Guardar repetidas veces."
  - "Comparar total Cant_Veri_UMBas - Cant_Desp_UMBas contra Packing/cantidad_bultos_packing."
  - "Si hay diferencia real, validar que aparezca mensaje con pedido y totales."
  - "Si no hay diferencia real, Guardar debe continuar y generar despacho."

blindaje_integridad_2026_07_17:
  caso: "La Cumbre pedido 5874 / picking 2542 / despacho 7815"
  objetivo: "Impedir commit de DD/OUT cuando pedido, picking, stock o stock_res no reflejan el mismo delta."
  tags:
    - "#EJC20260717_DSP_TX_READCOMMITTED"
    - "#EJC20260717_DSP_GUARD_SNAPSHOT_FRESCO"
    - "#EJC20260717_DSP_GUARD_DELTA"
    - "#EJC20260717_DSP_FIX_ACUMULADOR"
    - "#EJC20260717_DSP_FIX_DELTA_RESERVA"
    - "#EJC20260717_DSP_GUARD_EXECUTE"
    - "#EJC20260717_DSP_GUARD_STOCK_EXECUTE"
    - "#EJC20260717_DSP_GUARD_PRECOMMIT"
    - "#EJC20260717_DSP_TRACE_CORRELACION"
  reglas:
    - "La transacción BOF propia usa ReadCommitted; UPDLOCK/HOLDLOCK se limita a picking_ubic, pedido_det, stock_res y stock involucrados."
    - "Antes de insertar despacho se refrescan desde BD los campos persistidos que gobiernan el delta; no se confía en el snapshot de pantalla/HH."
    - "Delta por ubicación = verificada - despachada en unidad operativa: presentación si IdPresentacion<>0, UMBAS si IdPresentacion=0."
    - "trans_despacho_det conserva la unidad operativa del PickingUbic; trans_pe_det acumula en la unidad del documento."
    - "stock_res.cantidad se trata siempre en UMBAS; la conversión por factor ocurre una sola vez al cruzar desde una ubicación con presentación."
    - "stock.cantidad se valida en la unidad persistida por la fila; no se compara ciegamente contra UMBAS, sólo se exige rebaja o eliminación dentro de la transacción."
    - "Actualizar stock/reserva debe afectar la fila esperada o lanzar excepción; no se permiten Exit Sub ni reserva ausente silenciosos."
    - "Antes de retornar/commit se valida DD por PickingUbic, PickingUbic post, delta de pedido, rebaja/eliminación de stock_res, disminución/eliminación de stock y DD=OUT."
    - "Las comparaciones usan delta y conversión por factor para soportar parciales/presentaciones."
  auditoria_readonly: "DBA/20260717_auditoria_coherencia_despacho_readonly.sql"

ajuste_snapshot_solo_verificado_2026_07_17:
  caso: "La Cumbre pedido 8484 / picking 4107"
  evidencia:
    - "27 ubicaciones de picking: 19 con delta verificado pendiente y 8 todavía sin cantidad verificada."
    - "IdPickingUbic 699893 tiene cantidad_verificada=0 y cantidad_despachada=0; debe excluirse, no abortar el despacho."
    - "trans_pe_det.IdPresentacion puede ser NULL; semánticamente equivale a sin presentación/UMBAS."
  reglas:
    - "El snapshot incluye únicamente ubicaciones cuyo delta cantidad_verificada-cantidad_despachada sea mayor que cero."
    - "Las ubicaciones no verificadas o ya despachadas se omiten silenciosamente porque no participan en la operación actual."
    - "Sólo una ubicación despachable exige IdPedidoEnc, IdPedidoDet, IdStock, IdStockRes e IdProductoBodega válidos."
    - "IdPresentacion y cantidades/pesos NULL se normalizan a cero antes de evaluar el delta; no se realizan casts directos de DBNull."
    - "Si ninguna ubicación queda elegible, se informa que no existen ubicaciones verificadas con saldo pendiente."
  tags:
    - "#EJC20260717_DSP_GUARD_SOLO_VERIFICADO"
    - "#EJC20260717_DSP_GUARD_SNAPSHOT_NULL"

fecha_despacho_picking_ubic_2026_07_17:
  caso: "La Cumbre despacho 10931 / pedido 8484"
  evidencia:
    - "19 ubicaciones quedaron con cantidad_despachada>0 pero fecha_despachado=1900-01-01."
    - "DD, movimientos y OUT cuadraron en 19 filas / 984 UMBAS; el defecto era de trazabilidad temporal."
  fix:
    - "Cada variante de Guarda_Trans_Despacho_Stock asigna una única fecha del servidor a las ubicaciones que confirma."
    - "La guarda precommit exige fecha_despachado válida junto con cantidad_despachada coherente."
  tag: "#EJC20260717_DSP_FECHA_PICKINGUBIC"
  stock_res_identity:
    - "La Cumbre QA: IdStockRes es IDENTITY(1,1), PK única."
    - "DAL compilado omite IdStockRes del INSERT, usa SQLIdentity y devuelve el ID generado."
    - "Los MaxID hallados están en una copia huérfana de frmAjusteStock fuera del árbol incluido por WMS.vbproj."
