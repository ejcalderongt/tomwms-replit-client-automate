meta:
  nombre: "Despacho BOF - validacion packing contra despacho"
  fecha: "2026-05-27"
  origen: "Incidente La Cumbre: diferencia no real entre Packing y Ubicacion Picking; Guardar no genera despacho ni muestra mensaje."
  alcance:
    - "BOF WinForms frmDespacho"
    - "Grid Ubicacion Picking"
    - "Grid Packing"
    - "DAL packing/picking solo lectura para diagnostico"

flujo_operativo:
  entrada:
    formulario: "TOMIMSV4/TOMIMSV4/Transacciones/Despacho/frmDespacho.vb"
    accion: "Guardar despacho"
  datos_visuales:
    ubicacion_picking:
      fuente_memoria: "DTStockRes"
      columnas_clave:
        - "Pedido"
        - "Cant_Veri_UMBas"
        - "Cant_Desp_UMBas"
