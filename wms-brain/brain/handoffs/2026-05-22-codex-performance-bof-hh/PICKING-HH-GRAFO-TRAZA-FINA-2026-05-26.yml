  - "HH.PIK.DETALLE"
  - "HH.PIK.CONFIRMAR_CANTIDAD"
  - "HH.PIK.REEMPLAZO_NO_ENCONTRADO"
  - "WS/DAL actualiza trans_picking_ubic + movimientos + stock"

