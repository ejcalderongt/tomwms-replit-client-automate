meta:
  nombre: "Picking HH - Grafo y traza fina"
  fecha: "2026-05-26"
  objetivo:
    - "Mapear flujo de picking HH para diagnóstico rápido de bugs y lentitud."
    - "Aterrizar puntos de reemplazo y no encontrado dentro del mismo circuito."
  alcance:
    hh: "frm_detalle_tareas_picking, frm_picking_datos, frm_list_prod_reemplazo_picking"
    ws: "WSHHRN/TOMHHWS.asmx.vb"
    dal: "TOMIMSV4/DAL/Transacciones/Picking/*, Stock/*"

flujo:
  - "HH.PIK.LISTA_TAREAS"
  - "HH.PIK.DETALLE"
  - "HH.PIK.CONFIRMAR_CANTIDAD"
  - "HH.PIK.REEMPLAZO_NO_ENCONTRADO"
  - "WS/DAL actualiza trans_picking_ubic + movimientos + stock"

nodos:
  - id: "HH.PIK.LISTA_TAREAS"
    capa: "HH"
    archivo: "app/src/main/java/com/dts/tom/Transacciones/Picking/frm_detalle_tareas_picking.java"
  - id: "HH.PIK.DATOS"
    capa: "HH"
