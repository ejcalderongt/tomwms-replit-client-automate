meta:
  nombre: "Picking HH - Grafo y traza fina"
  fecha: "2026-05-26"
  objetivo:
    - "Mapear flujo de picking HH para diagnóstico rápido de bugs y lentitud."
    - "Aterrizar puntos de reemplazo y no encontrado dentro del mismo circuito."
  alcance:
    hh: "frm_detalle_tareas_picking, frm_picking_datos, frm_list_prod_reemplazo_picking"
    ws: "WSHHRN/TOMHHWS.asmx.vb"
    dal: "TOMIMSV4/DAL/Transacciones/Picking/*, Stock/*"

flujo:
