patron_recomendado_v1:
  objetivo: "blindar sin romper contratos WS ni refactor transversal"
  piezas:
    - "requestInFlight boolean por pantalla"
    - "requestToken incremental por operación crítica"
    - "disable inputs trigger (enter/botón/scanner) durante request"
    - "re-enable en success/error/timeout"
    - "descartar respuesta si token != token actual"
    - "progress con mensaje por fase y cierre garantizado en finally/catch"
  no_incluir_aun:
    - "reestructura completa de WebService base"
    - "cambio de contrato callback int a promesas/coroutines"

plan_circular_sugerido:
  ronda_1:
    - "frm_verificacion_datos.java"
    - "frm_lista_tareas_recepcion.java"
  ronda_2:
    - "frm_detalle_tareas_picking.java"
    - "frm_preparacion_packing.java"
  ronda_3:
    - "frm_picking_datos.java"
    - "frm_list_rec_prod.java"
  ronda_4:
    - "frm_recepcion_datos.java (intervención mayor con patrón consolidado)"

checkpoints_por_ronda:
  - "doble Enter no duplica llamadas"
  - "UI no queda bloqueada al fallar WS"
  - "no hay regresión de navegación"
  - "logcat con traza de requestToken para diagnóstico"

casos_relevantes_recientes:
  - fecha: 2026-05-26
    modulo: "CambioUbicacion"
    activity: "frm_cambio_ubicacion_ciega"
    sintoma: "Desde recepción con ubicación automática, el cursor no quedaba listo para escanear ubicación destino."
    causa: "Competencia de foco entre txtLicPlate y txtUbicDestino durante encadenamiento ws 1->18->5->..."
    fix:
      - "Nueva rutina enfocarUbicDestino() (post + requestFocus + selectAll)."
      - "Ruta desde recepción prioriza setLicPlateCUR() y deja foco final en destino."
    prueba_manual_minima:
      - "Recepción (con cambio automático activo) -> abrir cambio ciega -> validar cursor en txtUbicDestino."
      - "Cambio ciego normal (sin recepción) -> validar que sigue iniciando por licencia/origen según flujo legacy."
  - fecha: 2026-05-26
    modulo: "InventarioCiclico"
    activity: "frm_conteo_caja_master / frm_inv_cic_conteo"
    sintoma: "Riesgo de crash por listas vacías en flujo Caja Master y escaneo por código de barras."
    causa: "Uso de get(0) sin validar tamaño en listas retornadas por UI/WS."
    fix:
      - "Guard clauses null/empty en frm_conteo_caja_master (Load/Guardar)."
      - "Validación !items.isEmpty() en processProductoPorCodigoBarra."
      - "Checkbox Caja Master condicionado de nuevo a Control_Talla_Color por decisión funcional."
    nota_negocio:
      - "Pendiente validación funcional: en contexto cliente, Caja Master puede estar conceptualmente ligado a Control_Talla_Color."
      - "Revisar documento de estado del arte antes de consolidar regla final."

