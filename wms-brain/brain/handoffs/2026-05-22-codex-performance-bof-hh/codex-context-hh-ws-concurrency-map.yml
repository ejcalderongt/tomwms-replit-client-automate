meta:
  proyecto: TOMHH2025
  fecha: 2026-05-26
  objetivo: "Mapeo de riesgo de pisado de llamadas WS (request overlap) por flujo HH"
  criterio_priorizacion: "5 = mejor candidato para iniciar (alto impacto + bajo riesgo de refactor)"
  ultima_actualizacion:
    caso: "Foco en ubicación destino al entrar desde Recepción -> Cambio Ubicación ciega"
    archivo: "app/src/main/java/com/dts/tom/Transacciones/CambioUbicacion/frm_cambio_ubicacion_ciega.java"
    tag: "#EJC20260526"
    resumen:
      - "Se retiró ajuste de foco en recepción detalle (no era el punto correcto del flujo)."
      - "El foco operativo se asegura en Cambio Ubicación ciega con enfocarUbicDestino()."
      - "En processUbicOrigen(), cuando gl.CambioUbicRecepcion=true, se evita forzar foco en licencia antes del auto-proceso."

metodologia:
  patrones_busqueda:
    - "execws("
    - "ws.callback"
    - "KEYCODE_ENTER"
    - "setOnClickListener("
    - "guardas de concurrencia (isLoading/isBusy/enProceso/inFlight/skipNext/bloquear)"
  lectura_funcional:
    - "entrada por scanner/enter"
    - "encadenamiento de callbacks"
    - "bloqueo/desbloqueo de UI y progress"
  nota:
    - "Este mapeo es para estabilización incremental (blindaje circular), no refactor masivo."

flujo_hallazgo_global:
  sintomas_recurrentes:
    - "doble Enter o taps rápidos disparan requests solapadas"
    - "progress queda visible por callback no esperado o fuera de orden"
    - "respuestas tardías pisan estado de pantalla más reciente"
  causa_tecnica_base:
    - "modelo callback-int + ws mutable compartido por pantalla"
    - "falta de request gate (inFlight) en múltiples formularios"
    - "falta de token de respuesta (descartar respuestas viejas)"

