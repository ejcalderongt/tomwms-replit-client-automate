      - importacion de inventario inicial lenta
      - DAL_DETALLE_LOOP consume minutos en MsProductoDetalle
      - grid o UI aparenta colgarse luego de validar/cargar inventario
      - necesidad de TVP/SP para lookups masivos de producto
