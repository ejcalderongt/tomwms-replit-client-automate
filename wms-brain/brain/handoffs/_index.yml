  - id: mampa-interface-learning
    path: brain/handoffs/2026-06-15-mampa-interface-learning/README.md
    date: "2026-06-15"
    domains: [bof, database]
    tags: [mampa, interface, ajuste, talla_color, ingreso, sapsyncmampa]
    symptoms:
      - ajuste mampa pierde consistencia de talla y color en borrador
      - interface de ingreso requiere validar contrato en el punto correcto
      - contrato de producto_talla_color no debe depender de etiquetas visuales
    confidence: high
    stale_after_days: 60
load_rules:
  - Si el incidente coincide con sintomas/tags, cargar solo 1 handoff principal.
  - Si hay cruce de capas (VB + SQL o API + SQL), permitir 2 handoffs maximo.
  - Si el handoff esta stale, usarlo solo como referencia historica y revalidar.

maintenance:
  required_fields:
    - id
    - path
    - date
    - domains
    - tags
    - symptoms
  add_new_handoff_checklist:
    - Registrar en este indice el mismo dia.
    - Definir sintomas concretos reutilizables.
    - Definir stale_after_days segun volatilidad del tema.

