version: 1
updated: "2026-06-15"
purpose: >
  Indice de handoffs para carga selectiva de evidencia operativa. Cada entrada
  define cuando conviene cargar el handoff y cuando tratarlo como historico.

default_policy:
  load_by_default: false
  max_handoffs_to_load: 2
  sort_priority:
    - relevance
    - recency

entries:
  - id: fetch-impacto-cruzado-dev2028
    path: brain/handoffs/2026-05-22-bof-dev2028-fetch-impacto-cruzado/ANALISIS_FETCH_DEV2028_MERGE_BOF.md
    date: "2026-05-22"
    domains: [bof, database]
    tags: [fetch, impacto, merge, dev_2028]
    symptoms:
      - cambios cruzados en fetch
      - dudas de impacto por merge
      - trazabilidad de impacto VB
    confidence: medium
    stale_after_days: 90

  - id: trans-movimientos-identity
