  - id: operativo-hh-bof-etiquetas-reemplazo-tc
    path: brain/handoffs/2026-06-11-operativo-hh-bof-etiquetas-reemplazo-tc/README.md
    date: "2026-06-11"
    domains: [hh, bof, database]
    tags: [etiquetas, licencia, fardo, reemplazo, talla_color, tc, json, soap]
    symptoms:
      - talla y color no cargan al escanear licencia en hh
      - reemplazo registra sin talla y color
